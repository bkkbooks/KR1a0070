body:
  text: 周易本義啓蒙翼傳中篇元胡一桂撰一代易三易周禮春官太卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四案杜子春謂連山伏羲歸藏黃帝鄭玄謂夏曰連山商曰歸藏周曰周易説者謂夏商周易首卦不同蓋寓三統之義夏正建寅為人統故首艮艮寅位也人生於寅艮寅雖後天之卦夏時已符此象矣商正建丑為地統故首坤坤地也地闢於丑周正建子為天統故首乾乾天也天開於子所建之正不同故於易之首卦各見其義孔穎達曰案世譜等羣書神農一曰連山氏亦曰列山氏黃帝一曰歸藏氏既並是代號則周易稱周取岐陽地名易緯云因代以題周是也諸家説不同如此東萊先生深善連山歸藏同是代號之説且曰下繫十三卦制器尚象神農黃帝嘗有取於易而夏商則無考以為孔氏之説無足疑者而程可久曰孔子曰我欲觀夏道是故之把吾得夏時焉此連山所以首艮也又曰我欲觀商道是故之宋吾得坤乾焉此歸藏所以首坤也見周易古占法下豈自伏羲畫易之後代代有易連山歸藏在神農黃帝則為代號在夏商則為艮為坤也耶是亦未可知也若周易與周禮稱周義同自别於前代爾連山易連山十卷見唐藝文志司馬膺注自唐以前並無其書隋儒林傳云牛洪奏求天下遺逸之書何用劉光伯遂造偽書百餘卷題為連山易魯史記等録上送官取賞而去後有人訟之坐除名則唐之連山似隋世偽書歸藏易歸藏易十三卷見隋經籍志晉太尉薛貞注長孫無忌等論次其書以為歸藏漢初已亡案晉中經有之唯載卜筮不似聖人之旨以本卦尚存故具於周易之首以備周易之缺宋崇文總目載歸藏三卷云隋世十三篇今但存初經齊母本蓍三篇文多缺亂莫詳歸藏初經見李西溪易解序説初乾其爭言云云初坤榮犖之華云云初艮徼徼鳴狐云云初兊其言語敦云云初犖為慶身不動云云初離離監監云云初釐燂若雷之聲云云初巽有鳥將至而垂翼云云案漢上朱氏叢説謂考之歸藏之書其初經者包羲氏之本旨也卦有初乾初􅮀坤也初艮初兊初犖坎也初離初釐震也初巽八卦其卦皆六畫周禮所謂經卦皆八則初經之卦也歸藏齊母經同上田舊言之擇新言之念云云歸藏六十四卦名同上乾屯蒙溽訟師比少毒畜履泰否同人大有很釐大過頤困井革鼎旅豐小過林禍觀萃稱僕復母亡大毒畜瞿散家人節奐蹇荔貟誠欽恆規夜巽兊離犖兼分歸妹漸晉明夷岑未濟􅋟大壯蜀馬徒闕四卦古易周易古初本漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經十翼故十二篇案經則伏羲卦文王卦下辭周公爻下辭翼則孔子傳上下彖上下象上下繫辭文言説卦序卦雜卦共為十翼之辭經分上下則二篇矣翼而有十則十篇矣故總曰易經十二篇施讎孟喜梁丘賀三家皆然也但自費氏至鄭王亂經之後古經失其傳而十翼之次説者亦多不同今唯當以朱文公本義為據古易之變費氏易周易上經案此吳斗南本所載費直易也豈古易上下二篇只如此歟朱子答吳氏書云古易既畫全卦繫以彖辭又再畫本卦分六爻而繫以爻辭似涉重復且覆卦之法不知何所考據如此則朱子已嘗見其書不能不疑之矣今恐其或有所據姑録于此斗南名仁傑傳大哉乾元止萬國咸寧乾下乾上天行健君子以自強不息乾初九濳龍勿用陽在下也止用九天德不可為首也案吳氏曰此省去彖傳象傳繫辭傳等篇目但總以一傳字加於彖傳之首王弼王肅易皆存傳字蓋本於此吳氏於經只載乾卦以著六十四卦之例於傳自傳大哉乾元以下亦只載乾傳以著十翼之例十翼之篇皆蒙此一傳字矣西漢儒林傳雖但謂費直以彖象繫辭文言解説上下經初不言其分傳以附經然而將彖傳大小象傳逐卦自聚成一類統置於上下經二篇之後僅存一傳字於彖傳之首以别經悉去彖象繫辭文言等篇目則是古經已變亂於此矣卒至有鄭王之紛更聖經何其不幸歟鄭康成易乾下乾上乾元亨利貞初九濳龍勿用止用九見羣龍無首吉彖曰大哉乾元止萬國咸寧象曰天行健君子以自強不息濳龍勿用陽在下也止用九天德不可為首也案吳氏曰康成省去六爻之畫又省用九用六覆卦之畫移上下體於卦畫之下又移初九至用九爻位之文加之爻辭之上又合彖傳象傳於經於彖傳加彖曰字於象傳加象曰字魏博士淳于俊曰康成合彖傳於經者欲學者尋省易了爾詳見孔子十翼辭下吳氏只載乾卦著六十四卦例今王弼本乾卦存康成本之例也王弼易周易上經乾傳第一案王弼乾卦一同鄭氏但移文言附其後加文言曰字吳氏故不重載但從坤卦起坤下坤上坤元亨止安貞吉彖曰至哉坤元止應地無疆象曰地勢坤君子以厚德載物初六履霜堅冰至象曰履霜堅冰止至堅冰也止用六利永貞象曰用六永貞以大終也文言曰坤至柔而動也剛止天玄而地黃案吳氏曰王弼注易用康成本謂孔子贊爻之辭本以釋經宜相附近乃各附當爻每爻加象曰以别之謂之小象又取文言附於乾坤二卦加文言曰三字於首若繫辭説卦序卦雜卦等篇則仍其舊别自為卷自是世儒知有弼易不知有所謂古經矣又曰原三家之學初欲學者尋省易了日趨於簡便而末流之弊學者遂廢古經使後世不見此書之純全與聖人述作之本意可勝歎哉愚嘗謂羲文周孔聖人也卦爻十翼皆易書也費氏以傳解經未為非是鄭王以傳附經亦何不可况各從其類最便觀覽而好古君子每不能無恨豈聖人之書不可混而一之乎蓋夫子雖曰述而不作然自為一書非世儒傍文生義分行注腳之比故周爻已不盡同於文王而孔翼亦豈盡同於文王周公比而同之非特使學者猝莫區别而吾夫子制作初意亦不復可見矣朝氏曰劉牧云小象獨乾不繫於爻辭尊君也石守道曰孔子作彖象於六爻之前小象繫逐爻之下唯乾悉屬之於後者讓也嗚呼他人尚何責哉若是者可不懼乎愚故録吳氏所載三家變易論之繼以先儒所復古易還先聖之舊云朱子答吳氏書曰吕伯恭頃嘗因朝氏本更定古易十二篇考訂頗詳然據淳于俊之説便以今王弼易為鄭康成易嘗疑其未安今得所示分别鄭王二本乃有歸著甚善然不知别有何證據也古易之復周易古經吕氏微仲本上經第一下經第二上彖第三下彖第四上象第五下象第六繫辭上第七繫辭下第八文言第九説卦第十序卦第十一雜卦第十二右周易古經者彖象所以解經始各為一書王弼専治彖象以為注乃分綴卦爻之下學者於是不見完經而文辭次第貫穿之意亦缺然不屬豫因案古文而正之凡經二篇彖象繫辭各二篇文言説卦序卦雜卦各一篇總十有二篇元豐壬戌十月既望汲郡吕大防序案龍侍郎袤字延之與吳氏仁傑書云頃得吕東萊所定古易一編朱元晦為之跋嘗以板行乃與左右所刋吕汲公古經無毫髮異而東萊乃不及微仲嘗編豈偶然同耶愚謂此朱吕二先生皆偶未及見東萊決非掩襲觀文公與吳氏書則後來必就吳氏本見之矣但跋東萊本在前其時必未之見也今觀所次序經傳本末並與東萊定本同但東萊只分上經下經而無第一第二字又東萊稱彖上傳第一至雜卦傳第十小有不同爾古周易朝氏以道本卦爻第一不分上下經混同為第一彖傳二不分上下彖混同為第二象第三不分大小上下象混同為第三文言第四合乾坤文言為第四繫辭第五不分上下繫混同為第五説卦第六序卦第七雜卦第八周易卦爻一彖二象三文言四繫辭五説卦六序卦七雜卦八謹第如上案晉太康初發汲縣舊冢得古簡編科斗文字散亂不可訓知獨周易最為明了上下篇與今正同别有隂陽説而無彖象文言繫辭杜預疑於時仲尼造之於魯尚未播之逺國而漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳於漢歟先儒謂費直専以彖象文言參解易爻以彖象文言雜入卦中者自費氏始其初費氏不列學官唯行民間至漢末陳元方鄭康成之徒皆學費氏古十二篇之易遂亡孔穎達又謂輔嗣之意象本釋經宜相附近分爻之象辭各附當爻則費氏初變亂古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏而卒大亂於王弼惜哉奈何後之儒生尤而效之杜預分左氏傳於經宋衷范望輩散太玄贊與測於八十一首之下是其明比也揆觀其初乃如古文尚書司馬遷班固序傳揚雄法言敘篇云爾今民間法言列敘篇於其篇首與學官書不同槩可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也今悉還其初庶幾學者不執彖以徇卦不執象以徇爻云昔韓宣子適魯見易象是古人以彖爻統名之曰象也故曰易者象也其意深矣豈若後之人卦必以象明象必以辭顯紛紛多岐哉嗚呼學者曽未之知也劉牧云小象獨乾不繫於爻辭尊君也石守道亦曰夫子作彖象於六爻之前小象繫逐爻之下唯乾悉屬之於後者讓也嗚呼他人尚何責哉若夫文字之傳始有齊楚之異音卒有科斗籀篆𨽻書之四變因而訛謬者多矣劉向嘗以中古文易經較施孟梁丘經至蜀李撰又嘗著古文易則今之傳者皆非古文也安得覩夫劉李之書乎如古者竹簡重大以經為二篇今又何必以二篇成帙哉謹録而藏諸以俟博古君子建中靖國元年辛巳五月二十四日嵩山朝説之題古易考程沙隨本經傳一十二篇宋藝文志序云孝宗時程迥所作易考十二篇别為章句不與經相亂沙隨曰迥作古易考曰上篇曰下篇曰彖上曰彖下曰象上曰象下曰文言曰繫辭上繫辭下曰説卦曰序卦曰雜卦凡十有二篇與康節百源易次序同見古易章句外篇案邵氏聞見後録云古易卦爻一彖二象三文言四繫辭五説卦六序卦七雜卦八其次第不相雜也豫家藏大父康節手寫百源易實古易也百源在蘇門山下康節讀易之地舊祕閣亦有本沙隨蓋本諸此而篇第與二吕氏合只以文言在繫辭之前為不同爾若夫邵氏八篇與朝以道本無以異也古易吕東萊本與微仲篇次一同而微仲自一至十二之序小異爾周易上經第一周易下經第二周易彖上傳第一周易彖下傳第二周易象上傳第三周易象下傳第四周易繫辭上傳第五周易繫辭下傳第六周易文言傳第七周易説卦傳第八周易序卦傳第九周易雜卦傳第十漢興言易者六家獨費氏傳古文易而不立於學官劉向以中古文易經校施孟梁丘經或脫去無咎悔亡唯費氏經與古文同然則真孔氏遺書也東京馬融鄭玄皆為費氏學其書始盛行今學官所立王弼易雖宗莊老其書固鄭氏書也費氏易在漢諸家中最近古最見排擯千載之後巋然獨存豈非天哉自康成輔嗣合彖象文言於經學者遂不見古本近世嵩山朝氏編古周易將以復其舊而其刋補離合之際覽者或以為未安祖謙謹因朝氏書參考傳記復定為十二篇篇目卷集一以古為斷其説具於音訓云淳熙八年五月望日東萊吕祖謙謹書案如前吳氏所載費氏古易已自不能不小有變動而東萊謂費氏經真孔氏遺書豈吳氏考之猶未的歟又曰王弼雖宗老莊其書固鄭氏書也此蓋指其未變亂古本以前之書然鄭字恐是費字之誤蓋康成正分傳以附經其書豈足引為據乎右古文周易經傳十二篇亡友東萊吕祖謙伯恭父之所定也某嘗以謂易經本為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子子作傳亦略舉其一端以見凡例而已然自諸儒分經合傳之後學者便文取義往往未及玩心全經而遽執傳之一端以為定説於是一卦一爻僅為一事而易之為用反有所局而無以通乎天下之故若是者某蓋病之是以三復伯恭父之書而有發焉非特為其章句之近古而已也云云淳熙九年夏六月庚子朔旦新安朱某謹書又辨朝氏吕氏得失云某案正義曰夫子所作象辭元在六爻經辭之後以自卑退不敢干亂先聖正經之辭及王輔嗣之意以為象本釋經宜相附近其義易了故分爻之象辭各附其當爻下言之此朝氏引以證王弼分合經傳者然其言夫子作象辭元在六爻經辭之後則孔氏亦初不見十二篇之易矣又不於彖及大象發之似亦有所未盡又曰某案詩疏云漢初為傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文而藝文志所載毛詩故訓傳亦與經别及馬融為周禮注乃云欲省學者兩讀故具載本文而就經為注據此則古之經傳本皆自為一書故髙貴鄉公所謂彖象不連經文者十二篇之古經傳也所謂注連之者鄭氏之注具載本經而附以彖象如馬融之周禮也朝氏於此固不如吕氏之有據案吕氏音訓謂鄭康成始合彖象於經則魏志之言甚明此義為得然吕氏於乾卦經傳之次第所以與他卦不同者則無説焉愚恐朝氏所謂初亂古制時猶若今之乾卦而卒大亂於王弼者似亦未可盡廢也因記於此周易本義朱文公本古易經傳一十二篇即因東萊所定本作為本義明象占之教行於世者也愚嘗論所謂古易者孔子翼易不遽自附於先聖之後伏羲畫卦文王卦辭周公爻辭自合為上下經二篇孔子所作十翼則自分為十篇是為古易十二篇也至前漢費直以彖象繫辭文言解説上下經東漢鄭康成傳費直易又以彖象文言本解易卦爻宜相附近始以附入其初猶若今乾卦彖象文言統附卦之末至三國魏王弼又傳鄭學以彖與大象之辭附卦辭下分爻小象之辭各附當爻辭下加彖曰象曰以别之朱子曰王弼注本之乾卦蓋存鄭氏所分之例也坤以下六十三卦又弼之所自分也古經始變亂於鄭氏卒大亂於王弼惜哉原其初二家但欲學者尋省易了日趨於簡便自是以來古易十二篇遂亡不復可見於後世而後之讀易者但知有王弼本猝莫别其何者為文王周公之易何者為孔子之易殽亂千有餘年而聖人制作謙退之盛心與夫示學者以盈科而後進之意皆影響無傳至吕氏微仲始為復古易之倡朝氏繼之東萊吕氏復因朝氏書定為十二篇文公本義則因東萊所定本揭十二篇以教天下且發明象占大旨真洗光咸池之日為學者之一大快矣今世儒解易又復仍王弼本而莫覺其非是何古易難諧於俗而康成輔嗣欲速好徑之心使人骨醉魂迷而不返推是心以往捨範我馳驅而為之詭遇不由其道而鑽穴隙相窺踰墻相從亦何所憚而不為也哉嗚呼數聖人之經何其變之易而復之難復之難而再變之愈易也由是觀之亂經本末康成輔嗣之罪為尚小以其未見正於文公也世儒之罪為尤大以其既見正於文公故為而叛之也康成輔嗣三聖之罪人世儒其又康成輔嗣之罪人歟或曰斯無庸論矣今編次古易數家孰優曰微仲既為之倡東萊已暗與之合朝氏雖無失但省去三篇亦未為當今唯當以文公本義所從者為定尚何容喙傳授韓嬰景帝時太傅孫商韓生蓋寬饒景帝時韓嬰燕人以詩經授之燕趙間亦以易授人推易意為之傳燕趙好詩以故其易微案西漢儒林傳云自魯商瞿子木受易孔子以授魯橋庇子庸子庸授江東馯音韓臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子裝何以齊田徙杜陵號杜田何及秦禁學易為卜筮書獨得不禁故傳授者不絶漢興言易者本之田何何授東武王同子中雒陽周王孫梁丁寬子襄齊服生皆著易傳數篇王同授淄川楊何叔元何至太中大夫齊即墨成至城陽相廣川孟但太子門大夫魯周霸莒衡胡臨淄主父偃皆以易至大官初梁項生從田何受易時丁寬為項生從者讀易精敏材過項生遂事田何學成何謝寬寬東歸何謂門人曰易以東矣寬至雒陽復從周王孫受古義號周氏傳景帝時寬為梁孝王將軍距吳楚號丁將軍作易説三萬言訓故舉大義而已今小章句是也寬授同郡碭音唐梁郡縣名田王孫田王孫授沛沛與碭近施讎長卿蘭陵孟喜長卿喜父號孟卿善禮春秋使喜從王孫受易琅邪諸人梁丘賀長翁由是易有施孟梁丘之學施讎授張禹丞相琅邪魯伯會稽太守張禹授淮陽彭宣大司空沛戴崇子平九卿禹宣皆有傳由是施家有張彭之學魯伯授太山毛莫如少路常山太守琅邪邴丹曼容著清名孟喜好自稱譽得易家候隂陽災變書詐言師田生將死時枕喜膝獨傳喜諸儒以此耀之梁丘賀疏通證明之曰田生絶於施讎手中時喜歸東海安得此事又蜀人趙賔好小數書為易飾易文以為箕子明夷隂陽氣亡箕子箕子者萬物方荄兹也注荄滋言根荄方滋茂也賔持論巧慧易家不能難皆曰非古法也云受孟喜喜為名之注名之者承取其名云實授也後賔死莫能持其説喜因不肯仞古字仞認通以此不見信喜舉孝亷為郎博士缺衆人薦喜宣帝聞喜改師法遂不用喜喜授同郡白光少子沛翟牧子兄讀曰況皆為博士由是有孟翟白之學梁丘賀初從大中大夫京房受易别一京房非延壽弟子房楊何弟子也房出為齊郡太守賀更事田王孫宣帝時聞京房為易明求其門人得賀賀時入説善之以筮有應得近幸官至少府少府事多乃遣子臨分將門人張禹從施讎學薦讎為博士上信重賀賀年老終子臨亦入説為黃門郎甘露中奉使問諸儒於石渠上選髙才郎十人從臨講臨學精熟専行京房法琅邪王吉通五經聞臨説善之使其子郎中駿上疏從臨受易駿至御史大夫臨代五鹿充宗為少府充宗授平陵士孫張仲方至給事中沛鄧彭祖子夏真定太傅齊衡咸長賔王莽時講學大夫由是梁丘有士孫鄧衡之學洪容齋云晉永嘉之亂梁丘之易亡京房君明東郡頓丘人受易梁人焦贛延壽贛嘗曰得我道以亡身者京生也其説長於災變分六十四卦更直日用事以風雨寒溫為候各有占驗房用之尤精贛為外黃令以占捕盜致治考滿父老請留卒以令終京房最後出為魏郡太守得以考功課吏法治郡月餘為石顯五鹿所毁徴下獄棄市贛云嘗從孟喜問易會喜沒房以為延壽易即孟氏學翟白不肯曰非也成帝時劉向校書考易説以諸家皆祖田何楊叔丁將軍大義略同唯京氏為異黨焦延壽獨得隱士之説託之孟氏不相與同房授東海殷嘉河東姚平河南乘𢎞皆為郎由是易有京氏學費直長翁東萊人治易為郎至單父令長於卦筮亡章句徒以彖象繫辭十篇文言解説上下經授琅邪王璜其本皆古字號古文易案石介守道云治易至漢遂為田焦費三家田焦廢已久費授王璜故有費氏易行於民間髙相沛人治易與費公同時其學亦無章句専説隂陽災異自言出於丁將軍傳至子康康以易為郎及蘭陵母將永為髙氏學永至豫章都尉王莽居攝時康候知東郡有兵私語門人門人上書言之後數月東郡太守翟誼舉兵誅莽莽召問門人對以受師髙康莽惡之以為惑衆斬康由是易有髙氏學施孟梁丘京氏四家皆立博士費髙二家未得立此西京授受大略也案儒林傳贊云自武帝立五經博士初易唯有楊孝宣復立施孟梁丘易元帝復立京氏易所以罔羅遺失兼而存之是在其中矣愚嘗謂自商瞿受易孔子六傳興於田何何之學又盛於丁寬寬師何而復師其同門之友以受古義可謂見善如不及者矣然所謂易説三萬言不過訓故大義又曰小章句竊意其學只是文義章句象數之學恐非所及也寬再傳而盛於施孟梁丘施授張禹禹雖為帝者師然依阿淟涊持祿保位真鄙夫之事君禹授彭宣位為上公見險而止避莽異於茍患失之者差強人意耳孟既師田又不擇所從復受之於趙趙死而遂倍之以至不見信於友不獲用於上亦其宜矣梁丘初師京大中大夫後雖更事田卒以京顯至其子臨専行京法可見也再傳得王駿經明行修無忝所學而五鹿結黨小人石顯傾排君子京房延壽弟子纍纍若若之歌兼官據勢受譏無恥三傳而衡咸為莽講學大夫梁丘氏易至此掃地矣焦氏卦變卓然自為一家而又托於孟者惡其無傳也是雖見擯於當時卒顯於京房以其學事元帝力排閹宦石顯忠君憂國之懷悃悃為帝言之雖陷譛毁以歿顯五鹿譛亦可暴白其心於千載之下矣費髙當時雖行民間猶未顯也西京易學槩聞如此往往自二京以前文辭勝自二京以後占數勝如斯而已愚獨於趙孟之事見古人崇重師法朋友扶持於下天子綱維於上其嚴至可畏也獨惜趙不足以為人師喜枉負倍師之名於後世而古人之意則厚矣慨木水本源之義後之學者宜知所戒東漢陳以下五家皆傳費氏易者自馬融授鄭玄外餘皆未知所傳授之次第案東漢儒林傳云光武中興愛好經術未及下車先訪儒雅雲會京師於是立五經博士各以家法教授易有施孟梁丘京氏學傳施氏者陳留劉昆桓公梁孝王之胤建武元年光武除為江陵令遷𢎞農太守至騎都尉王莽時教授弟子五百人昆受易於沛人戴賔每春秋饗射備列典儀以素木匏葉為爼豆桑弧蒿矢以射菟首注昆懼禮之廢故引以匏葉為爼實射則歌菟首之詩為節也傳孟氏者南陽窪丹窪音圭子玉建武初為大鴻臚作易通論七篇世號窪君通易家宗之稱為大儒及廣漢任安定祖綿竹人兼通數經辟除不就窪丹時觟陽姓鴻名孟孫字亦以孟氏易教授有名永平中為少府傳梁丘氏者京兆楊政子行從代郡范升受易善説經京師語曰説經鏗鏗楊子行嗜酒不拘小節然篤於義時帝壻梁松皇后弟隂就皆慕其聲名請與交友政每共言論常切磋懇至不為屈撓嘗詣陽虛侯馬武武難見政稱疾不起政入徑升牀排武把臂責之曰卿蒙國恩備位藩輔不思求賢以報殊寵而驕天下英材此非養身之道今日動者刀入脅武諸子及左右皆大驚以為見劫操兵滿側政顔色自若會隂就至責武令為交友其剛果任情皆如此范升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道傍候車駕持章扣頭大言曰范升三取惟有一子三嵗孤之可哀武騎虎賁懼驚乘輿舉弓射之猶不肯去旄頭又以戟義政傷胸猶不退哀泣辭請有感帝心詔曰乞楊政師即尺一出升政由此顯名官至左中郎將及潁川張興君上官太子少傅顯宗數訪問經術弟子逺至著録且萬人為梁丘家宗傳京氏者汝南戴憑次仲年十六舉明經光武召上殿令與諸儒難説憑多所解釋帝善之拜侍中正旦朝賀帝命羣臣能説經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席及濟隂孫期仲彧又習古文尚書家貧事母至孝牧豕大澤中以奉養焉逺人從學者皆執經壟畔以追之里落化其仁讓黃巾賊起過期里陌相約不犯孫先生舍郡舉方正遣吏齎羊酒請期期驅豕入草不顧戴憑時南陽魏滿叔牙亦以京易教授永平中官至𢎞農太守又曰建武中范升傳孟氏易以授楊政而陳元長卿蒼梧人鄭衆仲師開封人父興皆傳費氏易其後馬融季長扶風人亦為其傳融授鄭玄康成北海髙密人玄作易注朱漢上曰康成傳馬融學多論互體荀爽慈明又作易傳潁川人自是費氏興而京氏遂衰愚謂聖經雖五聖道則一五經博士固所當置也一經之中乃令各以家法教授是雖取其専門之學而心心有主喙喙爭鳴未免啓自開户牖之弊矣聖真何由而統一也哉四家之學得失已不可復知而桓公懼禮之廢定祖辟除不就子行之篤於義仲彧之寧貧寧賤不願乎其外孝以養母讓以化俗至使巨盜斂手戒勿犯舍此固學易之餘事亦足以見秉彛好德之良心雖盜賊不容泯滅灑然可喜者也漢末四家卒以湮微而費氏獨存其學又無章句惟以彖象繫辭文言參解上下經先儒至謂凡以彖象文言參入卦中者皆祖費氏古經變亂實已權輿於此卒大壞於康成輔嗣之徒又可為之一慨矣魏吳晉元魏唐費直鄭玄王弼韓康伯孔穎逹王弼受授可考餘王肅管輅虞翻郭璞皆莫可知魏東海郯人王肅子雍將軍撰定其父成侯朗所作易傳列於學官本義所引有曰王肅本者是也魏山陽王弼輔嗣尚書郎注易上下經孫盛論曰易之為書窮神知化非天下之至精其孰能與於此况弼欲籠統玄旨者乎故其敘浮義則麗辭溢目造隂陽則妙賾無間至於六爻變化羣象所效日時嵗月五氣相推弼皆擯落多所不關雖有可觀者焉恐將泥夫大道魏書注曰弼注易往往有髙麗言朱漢上曰弼盡去舊説雜以老莊之言於是儒者専尚文辭不復推原大傳天人之道自是分裂不合進易解表朝氏曰名公武號德昭有郡齋讀書志自序東京荀劉馬鄭皆傳費氏學王弼最後出或用鄭説則弼亦本費也石守道曰王弼多取康成舊説為之訓解今之易蓋出於費學也金君卿亦曰弼出於馬鄭馬鄭出於費氏太原王濟曰弼為人淺不識物情初與王黎荀融善黎奪其黃門郎於是恨黎與王亦不終正始十年曹爽廢以公事免秋遇厲疾亡時年二十四晉穆帝時范寧常謂王弼何晏之罪深於桀紂或以為貶之太過寧曰王何滅棄典文幽沉仁義遊辭浮説波蕩後生使搢紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國為後世戒豈能回百姓之視聽哉故吾以為一世之禍輕厯代之禍重自喪之罪小迷衆之罪大也魏平原管輅公明精於卦筮窮極幽微占言吉凶禍福無毫髮爽雜以覆射説相一皆神妙難以枚舉姑即一事言之吏部尚書何晏請之鄧揚在晏許晏曰君著爻神妙為作一卦知至三公否又曰連夢青蠅數十來鼻上驅之不去有何意故輅曰昔元凱弼重華宣慈惠和周公翼成王坐而待旦故能流光六合萬國咸寧此乃履道休應非卜筮所能明也今君侯位重山嶽勢若雷電而懷德者少畏威者衆殆非小心翼翼多福之仁又鼻天中之山髙而不危所以長守貴今青蠅臭惡而集之位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮勿履未有損己而不光大行非而不傷敗願君侯上追文王六爻之旨下思尼父彖象之義然後三公可決青蠅可驅也揚曰此老生之常談過嵗更當相見未幾晏揚等果遇禍正始元年十二月二十八日明年正月曹爽敗晏等亦誅愚謂此正所謂不假卜筮而知吉凶者也初輅還具以語其舅舅大怒以為狂及敗謂輅曰爾何以知何鄧之敗前見已有凶氣未也輅言與禍人共會然後知神明交錯鄧之行步筋不束骨脈不制肉起立傾倚若無手足謂之鬼躁何之視候魂不守宅血不華色精爽煙浮容若稿木謂之鬼幽鬼躁者為風所收鬼幽者為火所燒自然之符不可蔽也此又其相法之妙處吳會稽虞翻仲翔自稱五世習孟氏易卜筮亦應晉河東郭璞景純本傳云好經術博學髙才受業郭公得青囊書九卷遂洞五行天文卜筮之術禳災轉禍通致無方京房管輅不能過也嘗撰前後筮驗六十餘事名為洞林愚案洞林上中下三卷斷法用青龍朱雀勾陳騰蛇白虎玄武六神及太嵗諸煞神時日旺相等推靈驗無比又抄京費諸家要撮更撰新林十篇卜韻一篇大抵只用卦爻不假文字然雜以説相葬法行符厭勝之術往往流於技藝而易道日以支離卑下矣璞嘗為王敦記室明帝太寧二年敦疾篤將反使璞筮之璞曰無成敦素疑璞助溫嶠庾亮及聞卦凶乃問璞曰卿更筮吾壽幾何璞曰思向卦明公起事必禍不久若住武昌壽不可測敦大怒曰卿壽幾何曰命盡今日日中敦乃收璞斬之而反果大敗敦尋死黨與悉平或曰景純一死可以暴白其心矣乎曰何為不可想當是時景純之為敦記室欲為溫太真而不可得者也事勢至此惟有一死爾夫豈不知徒諫不足以回敦之聽徒死不足以為國家之益然與其偷生茍免宛辭以對曷若明目張膽速亡之為幸乎此其所以得乎義理之正本心之安深有可取焉也或又曰景純初焉何以不擇所從也曰當元帝永昌改元敦以璞為記室參軍璞善筮亦知敦必為亂已預其禍甚憂之矣敦既與朝廷乖離録朝士有時望者置幕府景純雖欲不從之奈何不可得也元魏徐遵明傳康成學自徐氏再傳至郭茂其後北朝言易者多出郭茂之門此條見車萊吕氏家孰論稱徐為元魏大儒唐儒學傳云世稱左氏有文逺徐曠字文逺禮有禇徽詩有魯達易有陸德明皆時冠云今案國子博士陸德明蘇州吳人名元朗以字行僅有周易音義一十篇而已國子祭酒孔頴達字仲達冀州人奉敕與顔師古籀字也司馬才章王恭馬嘉運趙乾協王惔于志寧等同撰五經正義四門博士蘇德融趙𢎞志覆審大槩因王弼韓康伯注為之解釋敷演於義理象數之學未能卓然自有所見者也然則唐家一代之易學從可知矣案東萊吕氏云漢以後惟王鄭易行世江左及青齊多講王易河汾諸儒則習鄭易弼出康成康成出費氏者也又曰自孔氏正義取王弼故先代諸儒専門之學並廢可勝歎哉愚謂管郭授受雖不可考要亦京學未泯孔疏而後惟弼單行餘皆掃滅究而論之王雜玄管郭雜技技易流於戲郭符豆事然管忠告鄧揚丁謐之徒郭諌王敦以死猶卓卓名世玄溺空談卒敗壞風俗禍人國家流弊不可勝言矣至如穎達王韓驅使庸奴耳劣哉無以議為也案邵氏伯溫經世書辨惑云陳摶字圖南亳州真源人唐末進士負經綸之才厯五季亂離遊行四方志不遂入武當山後隱居華山周世宗召拜諌議大夫賜號白雲先生宋太宗亦召拜諌議大夫賜號希夷先生其易學主於意言象數四者不可闕一其理具見於聖人之經不煩文字解説止有一圖先天方圓圖以寓隂陽消長之數與卦之生變圖亦非創意以作孔子繫辭述之明矣嗚呼真窮理盡性之學也世但以為學神仙善述人倫風鑒而已非知圖南者也獨先君康節先生知之為詳數數有詩及之圖南以上傳授雖不可考蓋自伏羲文王周公孔子以來世世相傳或隱或顯未嘗絶也圖南授汶陽穆修伯長後居蔡州為潁州文學𠫭軍少豪放性褊少合尹師魯兄弟從之學古文又傳其春秋之學伯長授青社李之才挺之挺之為殿中丞授之先君初先君築室衛州蘇門山百源之上丁母夫人李氏憂布衣蔬食三年時挺之為衛州共城令聞先君好學苦心志自造其廬問曰子何所學曰為科舉進取之學耳挺之曰科舉外有義理之學子知之乎曰未也願受教挺之曰義理外有物理之學子知之乎曰未也願受教挺之曰物理外有性命之學子知之乎曰未也願受教於是先君傳其學先君嘗曰吾學於挺之也忘寒暑忘晝夜忘寢食忘進取挺之有所言吾必曰願略開端無竟其説請退而思之幸得之以為然方敢自言或未也歸而再思之得之而後已又曰先君之學雖有傳授而微妙變通蓋其所自得也兼明意言象數之藴而知易之體用成卦立爻之所自然其學卒無所傳平時未嘗妄以語人故當時人亦鮮克知之者惟以自樂而已案童蒙訓邵康節以十二萬四千五百年為一會自開闢至堯時正當十二萬年之中數故先生名雍字堯夫名雍取黎民於變時雍也其居洛陽亦取天地之中字堯夫取堯時中數也先生著述有皇極經世書有漁樵問對有擊壤詩多明易學者也辨惑又曰种放明逸亦傳圖南象學授廬江許堅許堅授范諤昌由此一枝傳於南方也濓溪先生周子名敦頤先生初諱敦實後避英宗舊名改敦頤字茂叔舂陵人老於九江著太極圖及圖説及通書闡明道學之祕而朱漢上震又謂陳摶以先天圖傳种放放傳穆修修以太極圖傳敦頤而朱文公辨之曰嘗讀朱內翰進易説表謂此圖之傳自陳摶种放穆修而來夫以先生之學之妙不出此圖以為得之於人則決非种穆所及又有曰先生不由師傳默契道體建圖屬書根極領要先生為南安軍司理時年少不為守所知洛人程公珦攝通守事視先生氣貌非常人與語知先生學知道也因與為友且使二子皓頤往受學焉即明道先生伯淳伊川先生正叔也卒皆唱明道學以繼孔孟不傳之緒伊川先生易傳一書大抵多發明理義之奧以覺來學朱子所謂邵傳羲畫程演周經是也橫渠先生張載子厚大梁人著正蒙十餘萬言多發明易道之要遊定夫書程氏行實曰先生聞道甚早夫子張子厚友而師之則橫渠之學有得於二程夫子信矣尹和靖語録云橫梁昔在京師坐虎皮説周易聽徒甚衆一夕二程先生至論易次日橫渠撒去虎皮曰吾平日為朱公説者皆亂道有二程近至深明易道此吾所不及汝輩可師之橫渠乃歸陜西又吕與叔撰橫渠行實云嘉祐初見程伯淳正叔於京師又明道先生行狀云神宗嘗使推擇人才所薦父表弟張載及弟頤為首案此橫渠程夫子表叔也伊川授之龜山先生楊時中立龜山授之豫章先生羅仲素豫章授之延平先生李侗願中延平授之晦菴先生朱子先生於易有周易本義復古易十二篇之舊發明象占之學有易學啓蒙四篇發明圖書卦畫蓍䇿變占之要又有蓍卦考誤有論濓洛諸儒易學有辨蘇氏易有論魏伯陽參同契先生嘗為之注解及辨麻衣子華子關子明諸家易學之偽先生嘗謂程先生易傳義理精字數足無一毫欠闕只是於易本義不相合易本是卜筮之書程先生只説得一理故先生解易只以卜筮為主就象數上理義自見而立卦生爻之因先天後天之别一本之康節邵子使人得窺四聖人心傳之祕者其功甚大也先生之友東萊先生吕祖謙伯恭父定古易經傳十二篇一卷音訓二卷繫辭精義二卷古易本義依之南軒先生張栻敬夫著繫辭説卦序卦雜卦解其於麗澤講習之益深矣愚觀前宋一代之易學自分為三節希夷先天一圖開象數之門至邵氏經世書而碩大光明周子太極一圖洪理義之源至程子易傳而浩博𢎞肆然邵乃推步之法或問易與經世同異朱子曰易是卜筮經世是推步一分為二二分為四節節推去程子不言象數至朱子斷然以易為卜筮作且就象占上發明義理以示教而後一代之易理數大明體用兼該使天下後世識易之所由作不迷於吉凶悔吝之塗而能適乎仁義中正之歸不其幸歟噫朱夫子於易學傳授其亦可謂金聲玉振集大成者矣傳注略舉所知愚合唐宋藝文志唐五行志朝氏公武德昭郡齋讀書志鄭氏樵漁仲通志所載易經注解及愚收拾所得在諸志外者互相𠫭訂件列於左通計三百餘家有見之者曰其間往往固多有其義而亡其辭愚應之曰豈唯是哉辭義俱亡者且不止過半矣然而儒先苦心勞思神交羲文周孔於數千百載之上而為之辭者固不幸影響無存至於今日乃復得彚登簡册將昭示海內使觀者景慕慨想欲一伏誦而不可得者甚於其書之存者焉豈不猶愈於人與辭義俱湮沒而無傳者哉謹類次如左周漢卜子夏易解十卷朝氏曰公武漢藝文志已無子夏書此書約王弼注為之者止雜卦景迂云張弧偽作又案孫氏曰坦世有子夏傳以為親得孔子之藴觀其辭略而不甚粹間或取左氏春秋傳語證之晚又得十八占稱天子則曰縣官嘗疑漢杜子夏之學及讀杜傳見引明夷對䇿疑始釋然不然班固敘儒林何以止言始於商瞿子木而遽遺卜商也哉見李衡易雜論沙隨程氏曰子夏易傳京房為之箋先儒疑非卜商也近世有陋儒用王弼本為之注鄙淺之甚亦托云子夏凡先儒所引子夏傳此本皆無之熙寧中房審權萃訓詁百家凡稱子夏乃取後贋本見外編東萊吕氏曰崇文總目剟去子夏名以祛誤惑最為有理愚又嘗讀杜鄴傳鄴字子夏事武成元哀間觀其説王商引東鄰殺牛不如西鄰禴祭之義亦足為證今朝孫之論姑兩存之沙隨説亦不可不知也孟喜章句十卷漢曲臺長唐志費直漢單父長周易注四卷章句出於民間不列學官鄭氏通志云至唐其書始出見隋志唐同馮厚齋云直傳徒以彖象繫辭十篇之言解説上下經崇文總目云以彖象文言雜入卦中自費始蓋誤以彖象為文言且鄭康成易猶以文言説卦序卦雜卦合為一篇則不始於直明矣彖象繫辭之名一沒而汨亂古經則始於此又周易逆刺占災異十二卷周易林二卷唐五行志馬融周易章句十卷漢南郡太守唐志鄭康成注周易九卷隋志唐十卷馮氏云並厚齋下同不知何緣增一卷崇文總目止有一卷唯文言説序雜合四篇餘皆逸指趣淵確本去聖人之未逺也中興亡許慎叔重周易異義又作説文汝南召陵人案容齋洪氏續筆云許叔重在東漢與馬融鄭康成輩不甚相先後而所著説文引用經傳多與今文不同如所引周易百榖草木麗乎土為草木麗乎地服牛乘馬為犕音備牛乘馬夕惕若厲為若夤其文蔚也為斐也乘馬班如為驙如天地氤氲為天地一一繻有衣袽為衣袽書晉卦為晉巽為顨艮為他經皆然荀爽周易章句十卷又集九家易解十卷漢司空鄭志劉表周易注五卷漢荆州牧唐志宋衷周易注十卷魏吳王肅注周易十卷隋志唐志同崇文總目乃十一卷題王肅傳云後人纂陸德明釋文所取者附益之非肅本書王弼注上下經六卷分上經乾傳第一泰傳第二噬嗑傳第三下經咸傳第四夬傳第五豐傳第六而無卷字弼門人韓康伯晉太常注繫辭説卦序卦雜卦共三卷東萊吕氏曰韓康伯謝方荀柔之蕭子政等為繫辭注解義疏甚多今行於世韓一家耳又載弼略例一卷通為周易略例卷第十稅與權古易下論曰易經羲文周孔之手可謂最古而篇第最不明蓋漢魏以來諸儒之罪而王弼韓康伯尤其罪之魁也魏志謂鄭康成始合彖象於經厥初猶如今乾卦附之於後至王弼則自坤以下各爻聫綴之標題乃以上經乾傳至下經豐傳為六卷已不知於義何居及韓康伯又以上下繫為七八卷説序雜為第九卷略例為第十卷使羲文周公上下二篇之經不成二篇而孔子十翼不成十翼漢魏迄今幾千餘年列於學官専置博士無一人能辨其非者惑世誣民抑何甚哉或曰噫其甚矣易非王韓何以傳至今子獨不見先正嘗黜與注疏異説者乎豫曰不然易更三聖雖暴秦焚書易以卜筮獲免此殆天未喪斯文也弼尚老莊仕正始而以曹爽兄弟為主卒坐曹爽黨而擯康伯雖孔穎達言其親受學於王弼然詆序卦非易之藴已無忌憚本朝接五代道喪文弊之後一時名卿姑以注疏不可倍而矯士習之輕浮遂使世之父詔其子師詔其弟子錮成風俗牢不可破不知易經數聖人之手豈弼仕操懿者可汙篇端而擅古注之筆哉矧弼踰弱冠而廢死康伯踰四十惑於日者而病死乃敢干亂文王周公之經而輕訾孔子十翼證以春秋斧鉞誅絶不貸三聖遺經豈待若人而傳千百年間僅有范寧聲其罪而討之子以豫言為過豈是非好惡果異乎我心之所同然者哉與權蜀人魏鶴山門人董遇周易注十卷魏大司農唐志鍾會周易盡神論一卷鄭志荀輝周易注十卷魏常侍唐志姚信周易注十卷吳太常鄭志陸績周易注十三卷唐志虞翻周易注九卷吳侍中唐志晉晉易髓八卷卦及繫辭題晉人撰馮氏曰前志無之中興得於民間阮嗣宗易通論一卷凡五篇宋志干寶周易傳十卷寶字令升新蔡人晉常侍復别出爻義一卷宣和四年蔡攸上其書曰其學以卦爻配月如坎卦為十一月乾爻九三為正月之類或以配日時如蒙爻初六為戊寅平明時之類傳諸人事而以前世已然之迹證之訓義頗有所據若大有九三本左傳訓宴享乃與古合房審權亦采録董頴周易注十卷儒林從事唐志欒肇周易象論三卷尚書郎宋岱周易通論一卷荆州刺史楊又卦序論一卷司徒右長史鄒湛周易統略論三卷少府卿顧夷等難王弼一卷李顒周易卦象數旨一卷李軌周易音一卷尚書郎謝萬周易繫辭注二卷中郎將袁宏略譜一卷宋齊梁陳元魏宋明帝集周易義疏二十卷集羣臣講義張該等講疏二十卷宋臣周顒周易論十卷齊中書郎梁武帝周易講疏三十卷大義二十一卷繫辭義疏一卷禇仲都周易講疏十六卷梁五經博士蕭偉周易發義一卷幾義一卷梁南平王蕭子政周易義疏十四卷繫辭義疏二卷梁都官尚書何胤周易注十卷梁處士宋褰繫辭注二卷梁太中大夫周𢎞正周易義疏十六卷陳左僕射張譏周易講疏三十卷陳𠫭軍並唐志崔浩周易注十卷魏司徒盧景裕周易注魏人字仲孺唐五代附孔穎達仲達冀州衡水人周易正義十四卷又撰玄談六卷初奉敕撰五經義訓號義贊太宗詔改名正義亦稱疏陸德明釋文一卷論見傳授周易文句義疏二十卷文外大義二卷見鄭氏通志張𢎞道周易傳疏十卷薛仁貴周易新注本義十四卷王勃周易發揮五卷魏證周易義六卷口訣六卷鄭志玄宗大衍論三卷李鼎祚集解十卷唐藝文志作十七卷皆避唐諱又取序卦各冠逐卦之首所集有子夏孟喜京房馬融孫爽鄭康成劉表何晏宋衷虞翻陸績干寶王肅王弼姚信王廙張璠向秀王凱沖侯果蜀才翟玄韓康伯劉瓛何妥崔憬沈麟士盧士崔覲孔頴達三十餘家又引九家易乾鑿度義蜀才者顔之推云范長生也其序云自卜商之後傳注百家唯王鄭相沿頗行於代鄭則多參天象王乃全釋人事易豈偏滯天人哉東鄉助周易物象釋疑一卷自序略云易以乾象龍以馬明坤隨事義而取象是故春秋傳辭多因物象而六十四卦三百八十四爻之文觸類而長洎甲子以六十為運而卦則六十四為周六十四而參六十合九百六十年為一元紀助今採於注疏未釋後學滯懵者標出目為周易釋疑屬象比事約辭伸理云爾朝散大夫守江陵少尹柱國賜紫金魚袋東鄉助上案宋徽廟時蔡攸上其書論之曰昔者聖人之作易也始畫八卦而象在中象與卦並生以寓天下之賾故曰易者象也蓋俯仰以觀逺近以取神明之德可通鬼神之情狀可得而况於人乎况於萬物乎及因而重之發揮於剛柔而生爻則擬諸形容者其變不一而象亦為之滋矣故邑屋宫庭舟車器械服帶簪屨下至鳥獸蟲魚金石草木之類皆在所擬至纎至悉無所不有所謂其道甚大百物不廢者此也其在上古尚此以制器其在中古觀此以繫辭而後世之言易者乃曰得意在忘象得象在忘言一切指為魚兔之筌蹄殆非聖人作易前民用以教天下之意也助之作書盡推互體變卦之法以明爻象可謂有意於此矣而學之不明言之不擇往往傅會牽合先後抵牾學者蓋疑焉雖然後之學易而觀象者必自助發之故著其書以示來者愚案助説象好處亦多已采入本義纂注云沙門一行周易傳十二卷朱漢上云一行所集京房易論卦氣納甲五行之類又曰孟喜京房之學其書槩見於一行所集大槩皆自子夏傳出唐藝文志云一行周易論卷亡又大衍玄圖一卷義決一卷大衍論二十卷崔良佐易忘象元載周易集注一百卷李吉甫注一行易髙定周易外傳二十二卷郢子參軍裴通易書一百五十卷字又玄士淹子文宗訪以易義命進所撰書盧行超易義五卷字孟起六合丞陸希聲易傳十卷自序云豫乾符初任右拾遺嵗莫端居夢在大河陽曠野數百里有三人偃卧東首長各數十丈有告者曰上伏羲中文王下孔子也三聖皆無言意中甚愕寤而震悸伏而思之河與天通圖之自出三聖衡列乾之象也天道無言示人以象天將以易道畀豫乎由是考核少小以來所集諸家注説貫以自得之理著易傳十篇傳上經為第一下經為第二所以列彖象之微辭測卦爻之奧義第三篇演文言之純精以顯聖人之賾第四篇伸繫辭之微意以彰易道之神第五篇原作易之始述列卦之序第六篇釋説卦之義辨反對之相資第七篇窮畫卦象之由生著竒偶之極第八篇明權輿律吕之本制作禮樂之原第九通天下之理第十成天下之務别撰作易圖一卷指説一卷釋變一卷微旨一卷又以易經文字古今謬誤又撰證一卷云云朝氏曰陸大順中棄官居陽羡自號君陽遁叟馮氏曰本蘇州吳縣人近世之名家云郭京唐蘇州司户作周易舉正略三卷今依洪氏所載二十處具於左坤初六履霜堅冰至象曰履霜隂始凝也今本霜字下增堅冰二字屯六三象曰即鹿無虞何以從禽也今本脫何字師六五田有禽利執之無咎元本之字行書向下引腳類言字今誤作言注義亦不作言字解比九五象曰失前禽舍逆取順也今本誤倒其句賁亨不利有攸往今本不利誤作小利剛柔交錯天文也注云剛柔交錯而成文焉天之文也今文脫剛柔交錯四字坎習坎上脫坎字姤九四包失魚今本誤作無魚注二有其魚故失之也蹇九三往蹇來正今本作來反困初六象曰入于幽谷不明也今本谷字下多幽字鼎彖聖人亨以享上帝以養聖賢今本多而大亨三字震彖曰不喪匕鬯出可以守宗廟社稷以為祭主也今本脫不喪匕鬯一句漸彖曰君子以居賢德善風俗今文脫風字豐九四象曰遇其夷主吉志行也今本脫志字中孚彖豚魚吉信及也今本及字下多豚魚二字小過彖柔得中是以可小事也今本脫可字事字下誤增一吉字六五象曰密雲不雨已止也今本止字誤作上字既濟彖曰既濟亨小小者亨也今本脫一小字繫辭二多譽四多懼注云懼近也今本誤以近也字為正文雜卦蒙稚而著今本誤作雜字右見洪容齋隨筆録郭京有舉正三卷云得之王輔嗣韓康伯手寫注定傳授真本凡一百三節與今流行本不同豫頃於福州道藏中見此書而傳之又見朝公武所進易解多引用之世罕有其書今略取其明白者二十處載於此右蜀士楊鼎卿作六經圖載此於易圖上故具載於此愚後得其全本閲之其他多釐正王弼注不若此二十處之為明白也史文徴周易口訣義六卷河南人馮氏云直抄孔氏疏以便直講故題曰口訣成玄英周易流演窮寂圖五卷蔡廣成周易啓源十卷唐太子左諭德皆問對語以德常德言德膚德翰分為四目王隱周易要削三卷題丘園子王隱自序云總康成輔嗣輩所説曰要削者言撮其要也稱天寶庚寅知為唐人傅氏周易注十四卷王覬沖周易注十卷張璠周易集解十卷略論一卷謝平周易繫辭注二卷何妥周易講疏十三卷國子祭酒梁蕃周易文句義疏二十卷易開題義十卷開題論序疏十卷釋序義三卷劉巘乾坤義疏一卷繫辭義疏二卷字子圭范氏周易論四卷應吉甫明易論一卷阮長成阮仲容難答論二卷宋處宗通易論一卷宣聘通易象論一卷沈熊易譜一卷雜音三卷任希古周易十卷以上藝文志崔篆周易林十六卷張滿周易林七卷許峻周易雜占七卷尚廣周易雜占八卷武氏周易雜占八卷徐苖周易筮占二十四卷伏曼容周易集林十二卷伏氏周易集林一卷杜氏新易林占三卷梁運周易雜占筮訣文二卷宋陳摶易龍圖一卷自序云且夫龍馬始負圖出於羲皇之代在太古之先今存已合之位或疑之况更陳其未合之數耶然則何以知之答曰於仲尼三陳九卦之義探其旨所以知之也况夫天之垂象的如貫珠少有差則不成次序矣故自一至於盈萬皆纍纍然如絲之縷也且夫龍圖本合則聖人不得見其象所以天意先未合而形其象聖人觀象而明其用是龍圖者天散而示之伏羲合而用之仲尼默而形之始龍圖之未合也惟五十五數上二十五天數也中貫三五九外包十五盡天三天五天九并五十之用後形一六無位上位去一下位去六又顯二十四之為用也兹所謂天垂象矣下三十地數也亦分五位言四方中央也皆明五之用也上位形五下位形六十分而為六五位六五三十數也形地之象焉坤用六也六分而幾四象成七九八六之象也地六不配謂中央六也一分在南邊六幾少陽七二分在東邊六幾少隂八三分在西邊六幾老陽九惟在北邊六便成老隂數更無外數添也所謂不配也在上則一不用形二十四在下則六不用亦形二十四上位中心去其一見二十四下位中心去其六亦見二十四以一嵗三百六旬周於二十四氣也故隂陽進退皆用二十四後既合也天一居上為道之宗地六居下為氣之本一六上下覆載之中進四十九數為造化之用也天三幹地二地四為之用此更明九六之用謂天三統地二定四幾九為乾元之用也凡幹五行幾數四十是謂大衍之數五十其用四十有九也三若在陽則避孤隂在隂則避寡陽成八卦者三位也謂一三五之三位二與四只兩位兩位則不成卦體是無中正不為用也二與四在陽則為孤隂四二是也在隂則為寡陽七九是也三皆不處之若避之也大矣哉龍圖之變岐分萬途今略述其梗槩焉愚案龍圖序希夷正以五十五數為河圖則劉牧乃以四十五數為圖托言出於希夷者蓋亦妄矣王昭素撰易論三十三卷其書以注疏同異互相難詰蔽以已意愚謂此書専辨注疏同異往往只是文義之學而朱文公語録云太祖一日問王昭素乾九五飛龍在天利見大人常人何可占得此爻昭素曰何害若臣等占得則陛下是飛龍在天臣等利見大人是利見陛下此説得最好以此觀之解中説象占必有可觀者開封酸棗人麻衣道正易心法宋志四十二章章四句句四言題希夷先生受并消息李壽翁刋於當塗乾道間南康戴師愈孔文始為之跋以行未可據也案朱子云麻衣心易如所謂雷自天下而發山自天上而墜之類皆無理之妄談所謂一陽生於子月而應在卯月之類乃術家之小數所謂由破體煉之乃成全體則爐火之末技所謂人間萬事悉是假合又使者之幻語爾其他比比非一不容悉舉要必近年術數末流道聽塗説掇拾老佛醫卜諸説之陋者以成其書夫麻衣為方外之士然其為希夷所敬如此則其為説必有竒絶過人者豈若是之庸瑣哉跋麻衣易節文又曰豫為此説後二年假守南康有前湘隂主簿戴師愈者來謁即及麻衣易説其言暗澀殊無倫次問其師傳所自則曰得之隱者彼不欲世人知其姓名不敢言復問之邦人皆曰書獨出戴氏莫知所自來後至其家見几間有所著雜書一編讀之則辭語氣象宛然麻衣易也豫以是始疑偽作者即此老既歸取觀則最後跋語固其所為而一書四人之文體製規模乃出一手然後始益信所疑之不妄矣再跋節文又云戴既死某在他家借得渠所作易圖看皆與麻衣相應將逐卦牽合取象畫成圖子需卦畫作共食之象以坎卦一畫作卓子兩隂爻作飲食乾三爻作三人向之食訟卦則三人背飲食坐蒙卦以筆牽合六如此小兒范諤昌大易源流圖一卷其説先定納甲之法以見納音之數又撰證墜簡一卷謂諸卦彖象爻辭小象乾坤文言並周公作自文言以下孔子述也朱漢上周易叢説極辨其非諤昌建溪人朝公武云如震卦彖辭內云脫不喪匕鬯四字程正叔取之漸上六疑陸字誤胡翼之取之自謂其學出湓浦李處約李得於許堅其書類郭京舉正天禧中毗陵從事胡旦周易演聖通論十六卷其説多引記跋及王昭素論為之商確旦字周父濵州人知制誥胡瑗周易口義十卷繫辭説卦二卷授其弟子記之為口義大抵祖王弼字翼之號安定先生國子監直講泰州人愚案語録或問天行健朱子曰惟胡安定説得好因舉其説曰天者乾之形乾者天之用天形蒼然南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸謂之一息一息之用天行八十餘里人一晝一夜有三萬三千六百餘息故天行九十餘萬里天之行健可知觀此則先生解中好處甚多也又案朝公武云此解甚詳或云門人倪天隱所纂非其自著也無繫辭等解石介周易口義十卷馮氏曰建本作解義説本王弼旨字守道號徂徠先生傳孫明復學直集賢院阮逸作易筌六卷凡三百八十四筌太常丞歐陽修易童子問三卷愚案歐公不信圖書以為怪妄又因圖書之疑并與繫辭不信以為非夫子作見於童子問中朱子嘗謂此是歐公無見處王安石易解十四卷宋志案朝氏曰王安石三經義皆頒學官獨易解二十卷自謂少作未嘗以取士故紹聖後復有龔原耿南仲注易各二十卷并介甫易三書行場屋又案程氏遺書介甫以武王觀兵為九四大無義理兼觀兵之説亦無此事又曰介甫以知至至之為九三知九五之位可至而至之太煞害事使人臣常懷此心大亂之道亦自不識湯武知至至之只知至其道也司馬溫公光易説一卷繫辭説二卷案朱子云嘗得溫公易説於洛人范仲彪炳文盡隨卦六二之半其後缺焉炳文言使人就謄公手藁適至而興亡之故所存止此後數年乃得全書云好事者於北方互市得版本始亦喜其復全今不無疑然亦無以考真偽也伊川先生程頤易傳六卷朝氏曰朱震言頤之學出於周敦頤敦頤得之穆修亦本陳摶與邵雍本同然考其辭不及象數頗類胡瑗耳景迂云胡武平周茂叔同師潤州鶴林寺僧壽涯其後武平傳其學于家茂叔則授二程與震言不同馮氏曰先生示門人曰止説得七分後人更須自體究也康節先生邵雍皇極經世書十二卷朱文公語録曰經世以元經會以會經運以運經世又曰邵子之學只把元會運世四字貫盡天地萬物又作敘篇系述二卷觀物外篇六卷門人張岫記雍言觀物內篇解二卷雍之子伯溫作辨惑一卷伯溫作朝公武云經世起於堯即位之二十二年甲辰終於周顯德六年己未編年紀興亡治亂事以符其學又有觀物篇系於後其子伯溫解橫渠先生張載易説三卷馮氏曰坐虎皮講易不知此書子厚晚年以所得刪正耶或好學者以門人所記偶與正蒙類為此書也多所發明二程有所未到處蘇軾易傳九卷朝氏謂東坡毗陵易傳十一卷其學出於父洵且謂卦不可爻别而觀之其論卦必先求其所齊之端則六爻之義未有不貫者未嘗鑿而論也馮氏曰洵作此傳未竟疾革命軾卒其業愚案文公有辨蘇氏易即此書也嘗觀聞見録朝以道問東坡曰先生易傳當傳萬世曰尚恨其不知數學耳東坡亦可謂不自欺者矣劉牧周易解十二卷朝氏志作十五卷又撰卦德通論一卷宋志有又撰鉤隱圖一卷朝志作三卷案朝氏曰仁宗時言數者皆宗之慶厯初吳祕獻其書於朝田況為序此易解也又曰鉤隱圖五十四圖并遺事九歐公序其文不類愚嘗見其鉤隱一書自易置河圖洛書二圖外餘皆破碎穿鑿江西李覯泰伯只存其圖書及八卦三圖餘盡刪去且云牧又注易所謂新意者合牽象數而已其餘則援輔嗣之意而往往改其辭此即所謂易解十五卷是也宋咸易補注十卷易訓三卷王劉易辨二卷至和中咸以既補注易以其餘百餘篇大可疑者三十有六題曰易訓謂訓其子而已康定元年自序易辨曰近世劉牧既為鉤隱圖以畫象數盡刌文王直用己意代之業劉者實繁謂劉可専門王可焚竄咸聞駭之摘乾坤二卦中王劉義及鉤隱圖以辨之也凡二十篇為二卷題曰王劉易辨云案宣和四年蔡攸上其書曰咸引正義以辨然頴達専以弼為宗非所以辨二家之得失至謂孔子不繫小象於乾卦以尊文王周公不知易本各自為篇豈孔子旨哉咸嘗注揚子法言糾李軌之誤五百餘義蓋亦工於訶人者白雲子述周易元統十卷不著名氏其書成於慶厯乙酉嵗大略謂乾坤隂陽之根本坎離隂陽之性命坎為乾之遊魂離為坤之遊魂仲尼云遊魂為變神機泄矣易道明矣乃作元統其一明混元其二明五太其三明天地其四述乾坤其五示龍圖其六畫八卦其七衍揲蓍其八明律候其九敷禮樂之元其十説序卦之由凡二十八宿五行十日十二辰四時八節六律六吕三統五運以至一人之身五藏六氣皆總而歸之於易故備存之以廣異聞云臣蔡攸謹上徐庸周易意藴凡例總論一卷周易卦變解二卷庸東海人皇祐初撰以注疏漶漫故著論九篇始於易藴終於大衍又卦變序云皇祐初述周易凡例粗驗彖辭然未罄萬事之變閲唐李氏所集諸儒易注遂成周易卦變解二卷益明卦有意象爻有通變以矯漢魏諸儒旁通互體推致之失鮮于侁周易聖斷七卷字子駿朝氏云本王弼劉牧時辨其非云衆言殽亂折諸聖故曰聖斷吕大臨易解一卷有統論數篇無詮次未成書也藍田人學出程氏字與叔號藝閣先生微仲親弟遊廣平易説學出程氏酢字定夫建安人楊龜山易説學出程氏時中字中立諡文靖公延平人朱震集傳十一卷易卦圖三卷叢説一卷字子發號漢上居蒙泉宋藝文志序易云漢以來言易者局於象數王弼始據理義為言李鼎祚宗鄭玄排王弼國朝邵雍亦言象數及程頤傳出理義彰明而弼學淺矣張載遊酢楊時郭忠孝雍皆祖頤髙宗時朱震為集傳其學以頤為宗和會雍載之論合鄭王之説為一兼取動爻卦變互體五行納甲至鄭剛中為窺餘兼象義馮氏曰毛伯玉力詆其卦變互體伏卦反卦之失謂如乾五為坎坎變離離為飛故曰飛龍之類切中其膏肓云愚謂變互伏反納甲之屬皆不可廢豈可盡以為失而詆之今觀其取象亦甚有好處但牽合走作處過多且是文辭煩雜使讀者茫然不能曉會朱文公嘗謂漢上解如百衲襖相似以此進讀教人主如何曉看來漢上自是一老儒無書不讀無事不曉只是不善作文窒塞不通爾漢上進表謂起政和丙申成於紹興甲寅首尾十九年噫亦難矣讀者未可甚忽諸郭忠孝易解二卷四學淵源論三卷凡四十篇曰總論曰諸卦論曰諸卦雜説字立之號兼山先生河南人郭雍易説字子和號白雲山人兼山子也馮氏曰雍放浪長楊山谷間嘗詔不起亦著易説自序云其先人受業伊川二十餘年念其學殆將泯絶於是濳稽易象以述舊聞紹興辛亥嵗序不以彖為卦辭而直循王弼之名以為孔子自言其彖泥於卦變毛伯玉不以為然竊謂郭氏雖嘗學於程門而其學不著至其子自相祖述為一家之學未為無得於易而非伊洛之舊聞和靖云忠孝自黨事起不與程先生往來卒亦不致奠鄭汝諧周易翼傳二卷蓋謂孔子翼文王之經此則翼伊川之傳字舜舉自號東谷陳希亮制器尚象論一卷長於易謂韓康伯著十三象徒釋名義莫得尚象之制故作論以明之蜀人天聖中第進士仕至太常少卿又辨劉牧易一卷鄭志陳良獻周易發隱二十卷嘉祐中自序云第一卷首序乾坤至十二卷有疑義者輒著於篇所以尊卦德也自第十三卷至末明天地之數隂陽五行之變所以終其要也石汝礪乾生歸一圖十卷嘉祐中撰取乾為生生之本萬物歸於一也畫圖著論朝氏志作二卷云先辨卦彖爻象之别後列數圖頗雜釋老之説英州人鮑極周易重注十卷治平中撰右司諌鄭獬表進祕閣校理錢藻序宣和祕書少監孫近重行改定取贊附經之末以全一家之書極建昌軍司户王逢易傳十卷學宗王弼為介甫客號廣陵為國子直講龔原易續解義十七卷朝志云二十卷一十五卷後乃雜義有釋卦釋彖釋象辨重卦辨上下位辨上下繫等學者多師之字深之工部侍郎括蒼人耿南仲周易講義十卷馮氏曰建本題進周易解義南仲字晞道為國子祭酒開封人鄒浩易繫辭義二卷字志完兵部侍郎常州人陳瓘易説一卷馮氏曰竊嘗從其孫大應見了翁有易全解不止一卷也多本卦變與朱子發之説相類字瑩中號了翁諌議大夫南劍人愚案刋本只題云了翁易説亦不分卷其子正同紹興十二年知常州刋於官舍李覯易論十三篇自序云援輔嗣注以解義急乎天下國家之用而已又刪定劉牧易圖復詳説成六論愚謂不過文義之學象數槩乎其未有聞也覯字泰伯旴江人此解與鉤隱圖同刋宋志不載黃黎獻略例義一卷又室中記師隱訣一卷獻學於劉牧採摘其綱宗以為略例又以易學於牧筆其隱訣目為室中記又鄭氏通志云有續鉤隱圖一卷常豫易源一卷范陽盧涇序云易之藴數世莫得傳劉既窺其端常乃善紀其緒總斯大旨著乎六篇命曰易源劉謂牧也字伯起太常博士葉昌齡周易圖義二卷治平中撰以劉牧鉤隱圖之失遂著此凡四十五門職方員外郎錢塘人鄭夬時用書二十卷明用書九卷易傳辭三卷易傳辭後語一卷朝氏曰夬字揚庭姚嗣宗謂劉牧之學授之吳祕祕授之夬夬又作明數明象明傳道明次例明範五篇康節子言夬竊其父學於王豫沈括亦言夬之學似雍云愚案邵伯溫辨惑云夬江東人客遊懷衛欲受教先君先君以其志在口耳又多慕外不許秦玠在河內玠字伯鎮知懷州長於先君一嵗亦自稱門人先亦從先君學以其好任數未詳嘗語夬以王天悅名豫傳先君學有所記録夬力求之天悅惡夬浮薄不與不幸天悅感疾且卒夬賂其僕就卧內竊得之遂以為己學初著易傳易測宋範五經明用數書皆破碎穿鑿後以卦變圖示秦價沈存中筆談云夬書皆荒唐獨此卦變説未知是非其説曰乾坤大父母復姤小父母乾一變生復得一陽坤一變生姤得一隂乾再變生臨得二陽坤再變生遁得二隂乾三變生泰得四陽坤三變生否得四隂乾四變生大壯得八陽坤四變生觀得八隂乾五變生夬得十六陽坤五變生剝得十六隂乾六變生歸妹本得三十二陽坤六變生漸本得三十二隂乾坤錯綜隂陽名三十二生六十四卦後因見兵部員外郎秦價論之價駭然曰夬何處得此法又謂自得之異人玠曽遇一異人授此數厯推往古興衰運厯皆驗西都邵某聞其大略已洞吉凶之變此人乃形之於書必有天譴此非世人得聞也夬竊書秦實知之乃為此言亦近乎自欺矣夬入京師補國子監得解省試䇿問八卦次序夬以所得説對擢優等登第調太原府司録以贓敗遇赦復事遊謁卒以窮死房審權集易義海一百卷集鄭玄至王安石凡百家摘取其専明人事者為一編或諸家説有異同輒加評論附之篇末宋志不載馮氏謂熙寧間蜀人李衡易義海撮要十二卷愚案婺州教授周汝能樓鍔識其書曰乾道間江都李公衡屬意於易得蜀房生義海刪之以為撮要經繫辭説序雜集解凡五始以家名者百公略其半以卷計亦百今十有一第十二卷雜論一是又創於公手以補房生之闕者公自御史來守婺鋟諸版教授周某劉某識之乾道六年十一月望日也今宋志載撮要而不登房生百卷使湮沒無傳亦可惜哉然曰義海専明人事則象數之學必非所備矣張汝明易索十三卷每卦以索曰釋經外有觀象觀變玩辭玩占叢説通十三卷字舜文登元祐壬申第知嶽州卒遊定夫志其墓其説支離蓋以意逆之也吉州左利人張汝弼易解十卷紹聖中撰字舜元泉州教授莆陽人馮氏曰案紹聖二年章惇劄進其周易解義九卷今建本二十五卷賜葆光處士三年授福州司户𠫭軍充泉州州學教授黃裳龔原皆序之稱其明於象數古今之説閲之殆盡未能當意默誦繫辭二十年一日釋然而悟得大例幾百條毛伯玉云其易専主輔嗣今觀其義亦主卦變如朱子發王晢周易衍注四卷周易綱旨二十篇名卦在第二謂伏羲作八卦則八卦之名伏羲所制也因而重之則六十四卦蓋亦然也或假其象或舉其義或以一言而定或以二字而成隨義象名之也蔡攸上其書曰晢著易衍注又撮綱要成此書其論名易之義信能不惑於多岐者末有脫誤一篇大率稽述郭京范諤昌之説間出已意斷以去取晢兵部郎中集賢校理太學十先生易解林疑獨慎微吳子進袁志行李元量劉仲平路純中洪成季陳子明鄭正夫閻彥升共成一書凡十二卷又有説卦以後論三卷亦有發明處四李先生周易全解十卷説卦以後三卷李彥章元達李端行聖與李舜由彥安李士表元卓合成一書宣和四年序者不著其名謂四人者俱有職於庠序則大學講義也太學周易新講義三十七篇統例一卷不著其人紹聖丁丑中都本太學直解繫辭十二卷不著其名右四書皆三舍時學舍講義也劉鄭注周易六卷集劉牧鄭夬二家所著集者不知名李平西河圖一卷政和中牛師德撰先天易鈴太極寶局兩卷自云傳康節學於溫公而説近術數宋志不載朝説之撰古周易八卷已見前太極傳五卷朝志作六卷因説一卷太極外傳一卷其學本康節自云初學京房後遇楊寶寶得其傳初著商瞿傳亡之建炎中再作此又有玄星紀譜一卷撰溫公玄厯及康節太玄凖易圖合而譜之以見雄以首凖卦非出於私意蓋有星候為之機栝且辨古今諸儒之失並朝氏讀書志朝氏名説之字以道號景迂濟北人得康節學東坡以著述科薦之官至徽猷閣待制兼侍讀乃公武之從父也朝公武易故訓傳十八卷宋志名公武字子政彭城人髙孝朝官至尚書直敷文閣張根解義九卷序論五卷雜説泰論字知常號吳園先生鄱德興人夏休周易講義九卷馮氏曰其説以言動制器卜筮四尚之説綜而通之以乘承比應為例會稽人中興時紹興府進士李授之周易經解通義三十卷每卦之首各著論一篇以言一卦之大要又著論十篇明易之旨趣紹興初知簡州李莊簡易詳説十卷名光字秦發諡莊簡紹興初謫嶺南著書自號讀易老人淮漕錢沖之序其後云其學自劉元城名安世字器之元城學於司馬君實沈該易小傳六卷每卦别為一論案宋藝文志序云該本春秋左氏傳占法論爻變檜黨之鷹犬者以主和議紹興中檜死髙宗首召相該為左僕射字元約湖州人都潔周易變體十六卷宋志馮氏作周易説義十四卷馮氏曰潔父為一邦師法尤粹於易以所聞於父者為之傳先於理而次以象義每卦終又為統論程可久云都聖與少卿作周易變體推廣沈丞相小傳如觀之九五不言觀我生君子無咎獨論剝六五貫魚以宫人寵推廣過當亦不皆然也潔字聖與知德慶府其父郁字子文終惠州教官丹陽人胡銓周易拾遺十卷宋志馮氏作周易傳十卷字邦衡號淡菴敷文閣直學士吉州人鄭東卿大易約解九卷又易説二卷宋志馮氏作周易疑難圖解三十卷馮氏曰一本稱合沙漁父紹興丁巳自序云為朋友講習而作始得富沙丘先生告東卿曰易理皆在畫於是日畫一卦置坐右周而復始厯五期而得有所入醫算卜筮之書神仙丹竈之説經傳子史凡與易相涉者皆博覽之不泥其文字而一味其旨意以求吾之卦畫丘先生嘗有詩云易理分明在象中誰知易道畫難窮不知畫意空箋注何異丹青欲畫風東卿字少梅丘先生名程字憲古建陽人憲古之學傳鄭東卿東卿之學傳潘冠英潘説十三卦處內象極當而少梅所撰無之蓋聞之鄉人于公梁國輔于親受之潘也劉翔易解六卷宋志馮氏作易卦解義二卷馮氏曰紹興二五年表進監學官看詳云通達經旨附近人情間出新意議論不詭旁涉史傳援證明白特差福州教授書藏禁中洪邁景盧序翔福州水口人閭丘昕易二五君臣論馮氏曰昕字逢辰與胡寅明仲在三舍為交同出胡文定公之門此書明仲多潤色之其説謂卦以六爻而成二臣也五君也二五君臣正體也若以陽居隂為九二則臣有時而失之強以隂居陽為六五則君有時而失之弱蓋作於紹興間意有所屬也乾道辛卯嵗張栻序其書胡五峰先生易外傳自屯至剝多引史事苦無經旨名宏字仁仲文定公安國之子張浚紫巖居士易傳十卷內第十卷係讀易雜記主劉牧説紹興三年四月六日定本成嘉定庚辰曽孫獻之刋於舂陵郡齋張南軒先生栻易説十一卷學出五峰以周程為宗廣平李椿觀畫所見上下魏鶴山序案朱文公跋李壽翁遺墨云侍郎李公玩心於易以沒其身平居未嘗深斥異教而見獨深為上言天地變化萬物終始君臣父子夫婦之道性命之理幽明之故死生之説盡備於易不當求之無父無君之言以傷俗化易所謂默而成之不言而信其公之謂歟沙隨云張魏公罷督府使屬官李侍郎椿筮之遇頤之賁李曰雖不再用却無他慮以之卦有終莫之陵也椿字夀翁吏部侍郎洛州人劉清之題云李公尉衡山時遊胡文定公之門鶴山序云公名椿字夀翁師友淵源之自則文定胡公父子云紹定戊午序愚案書名觀畫多逐卦摘解蘭廷瑞漁樵易解十二卷自序稱白云溪箋釋上下經六卷繫辭二卷説序雜一卷圖説二卷外編一卷自謂於先儒未嘗蹈襲未嘗求異唯其是而已始於紹興己卯成於淳熙己酉三十餘年又撰日月運行二圖説一編無階自進於九重欲傳諸方册則漏泄神機必致天禍未免與糞土俱腐云廷瑞字惠卿程大昌易原十卷鄭剛中周易窺餘十五卷宋志紹興壬申自序云集今昔易學編次尊乾坤不論起自屯蒙大要以象求爻因爻識卦易自商瞿至漢魏不可勝計大槩象義二者李鼎祚専明象變集三十餘家而不及義王弼盡掃象變不用古注専以意訓二者最不合然有象則有義訓義者不可遺象義不由象出是猶終日論影而不知形之所在近世程正叔易傳朱子發集解二者頗相彌縫但易道廣大有可窺之餘吾兼而取之此其大旨也剛中字亨仲孫份周易先天流衍圖十二卷紹興中張行成元包數總義二卷述衍十八卷通變四十卷愚案宋藝文志所載知此嘗觀張氏進易書狀云臣自成都府路鈐轄司幹辦公事丐祠而歸杜門十年著成述衍十八卷以明伏羲文王周孔之易翼元十二卷以明揚雄之易元包數義二卷以明衛元嵩之易潛虛衍義十六卷以明司馬光之易皇極經世索隱二卷觀物外卷衍義九卷以明邵雍之易通變四十卷取自陳摶至邵雍所傳先天卦數等四十圖敷演解釋以通諸易之變始若殊塗終歸一致上件書七種總二十六册分九十九卷謹隨狀上進以聞觀此則七易之目及其所以作之之意可得而識矣李椿年易解八卷疑問一卷宋志稱直院李公馮氏曰門人吳説之編集易解八卷又有吳説之問疑二卷其説専主王輔嗣字仲永嘗直學士院饒州浮梁人淳熙乙未龍圖閣學士胡銓序王大寶周易證義十卷多是文義間亦及象雖明白而甚淺近孝宗時嘗以諌議大夫兼侍講上語公曰髙宗謂卿邃於易故有是除潮州人官至禮部尚書字元龜曽穜大易粹言十卷裒二程橫渠廣平龜山兼山白雲七先生集為一書淳熙二年自序略云伏羲以前理具而畫未形伏羲而後畫形而理遂晦至文王周孔始有辭後人當使言與心通理因辭見明道行事然後為得甚者以象為本以數為宗以卜筮為尚吁可怪也大要主理義不及象數穜字獻之宋人劉彞易注一部字執中福州人沙隨外篇云解解九二田獲三狐云狐者性伏而情姦晝伏夜動小人道也程迥沙隨古周易章句十卷周易古占法并圖一卷外編一卷古易考一卷宋志沙隨外編云隆興甲申迥易傳成占遇巽之恆宋州人號沙隨晦菴先生朱子周易本義十二篇淳熙四年丁酉嵗成易學啓蒙二卷淳熙十三年丙午成先是先生乙巳嵗復丐祠差主管華州雲臺觀故啓蒙序稱雲臺真逸手記吳仁傑周易圖説三卷集古易一卷宋志平江吕東萊先生祖謙定古易十二篇一卷音訓二卷周易繫辭精義二卷楊萬里誠齋易傳二十卷淳熙戊申自序其子長孺云自戊申至嘉定甲子脫藁閲七年而後成嘉定元年臣寮申請得旨給劄其家抄録宣付祕閣其説本之程氏而多引史傳事證李過西溪易説十二卷慶元戊午自序謂幾二十年前有序説馮氏云其説多所發明然以毛漸三墳謂信誤矣晚喪明棄科舉授徒過字季辨興化人愚觀西溪易説已多采入纂注但其於乾卦彖辭下便掇入彖傳彖傳下便掇入文言釋彖處繼以大象又分爻辭附入小象又附入文言今姑載初九一爻於此初九潛龍勿用象曰潛龍勿用陽在下也文言曰潛龍勿用下也潛龍勿用陽氣潛藏初九曰潛龍勿用何謂也子曰龍德而隱者也止是以君子勿用也坤文言亦然王弼本乾卦存鄭氏初亂古易之例至此又汨亂無餘矣吁欲速好徑之弊一至於此乎王童溪易傳三十二卷名宗傳字景孟撰童溪其自號淳熙丙午林焞序由太學上舍免省臨安人林栗周易經傳集解三十二卷文言説卦序卦雜卦本文共為一卷河圖洛書八卦九疇大衍總會圖六十四卦立成圖大衍揲蓍解共為一卷淳熙十二年乙巳表進付祕書其説每卦必兼互體約象覆卦為太泥爾字黃中直寶文閣權發遣潭州愚謂林於説象及文義處多有可采只是於象數之源畫卦之大綱領自不能曉云李善譽易説二卷馮氏曰趙自謂一意孔子之易本畫卦命名之意參稽卦爻彖象之辭以貫通六爻之義而為之説趙嘗為寺丞將漕湖隂宋朝宗室前此未有推明易學者蓋自善譽始李舜臣周易本傳十三卷宋志愚案淳熙己亥其自序大槩謂易元起於畫有畫故有卦與辭隨辭釋義泛論事理不復推之於畫以驗古聖人設卦命辭之本意失之逺矣故今所著皆因畫論心主文王孔子之必以推衍大易之用此其大旨也其間發明好處甚多説象有功但絶不及占舜臣字子思號隆山先生蜀人馮時行易論三卷馮氏曰著於篇首止六十四卦常言易之象在畫易之道在用其學傳仙井李舜臣孫男興祖編時行字當可號縉雲先生蜀人朱文公曰馮當可字時行名字未知孰是蜀人博學能文其集中有封事云願陛下逺便佞疏近習清心寡欲以臨事變此興事造業之根本洪範所謂皇建其有極者也其論至極深合鄙意然則余前所謂千有餘年無一人覺其謬而正之者亦近誣矣案此句乃先生皇極辨中語但専經之士無及之者而文士反能識之豈汨沒傳注者不免於因陋踵訛而平心誦味者有時而得之文字之外耶慶元丙辰臘月甲寅東齋南窗記愚謂縉雲有易解多好豈先生未及見耶然則専經之士固不為傳注所汨沒矣馮椅厚齋易輯五十卷愚案宋藝文志序云寧宗時嘉定十年馮椅為輯注輯傳外猶以迥熹未及盡正孔傳名義乃改彖曰象曰為贊曰以繫卦之辭即為彖繫爻之辭即為象王弼彖曰象曰乃孔子釋彖象與商飛卿説同又改繫辭上下為説卦上中以隋經籍志有説卦三篇云馮去非周易二篇通故圖説又有易象通義其文専解上下經大象去非厚齋子吕氏奎學易管見上下經五卷及繫辭上下二卷専取隂陽對卦並論如乾坤作一論夬剝作一論之類發明多好蔡節齋周易經傳訓解經二篇以孔子大象置逐卦辭之下彖傳又置大象之後小象置各爻辭之後皆低一字以别卦爻辭繫辭文言説序雜卦皆低一字書又有卦爻辭指論六十四卦大義易象意言雜論卦爻十翼象數餘論雜論易大義開禧乙丑陽月自序劉彌邵易藁一部其猶子後村諱克莊為之序略曰初余為建陽令季父訪余縣齋因質易疑於蔡隱君伯靜後二十年而書成大旨由朱程以求周孔由周孔以求羲文其篤守師説雖譙天授袁道潔無以加也季父名彌邵字壽翁中嵗棄科舉閉門著書行義為鄉先生家貧食於學卒年八十二項安世周易玩辭十六卷宋志王炎讀易筆記十卷宋志總説象例在前經傳皆有解紹熙慶元間吳博士周易詳解四十卷只是敷演文義為時文之學全不及象數紹興丁丑書成名黻字元綴毛璞易傳十一卷馮氏曰瀘川毛璞字伯玉嘗持潼川憲節嘉泰元年自序始涉其流稍出已見𠫭以諸家之長讀之三十年知先儒之説與前日所見皆未也觀象畫卦以定其名因卦分爻以盡其變此名與此卦相當此辭與此爻相得而因以得羲文周孔之心又有外傳易辨厯詆先儒之失似亦有理然所略取者王弼二蘇蓋所學異也袁樞易學索隱一卷宋志劉列虛谷子解卦周易傳三卷隆興初宋志葉適周易述釋一卷柴中行説卦以後解字與之齋名強恕由太學上舍登第終祕書監饒州餘干人易袚易學舉隅四卷嘉定四年三月朔自題其書長沙人戴端明周易總義上下二卷不具卦及卦爻辭只每卦説一大段嘉定癸未其子料院桷刋於秣陵郡學陳隆山大易集傳精義六十四卷無繫辭以後讀易綱領上中下三卷通十門案隆山所集王輔嗣孔頴達周濓溪司馬涑水邵康節程明道程伊川張橫渠蘇東坡遊廣平楊龜山郭兼山郭白雲朱漢上朱文公張南軒楊誠齋馮縉雲又兩家失姓名但稱先正先儒别之自序於寶祐甲寅年綱領三卷甚正大可觀所集解詳贍時及象數學齋史繩祖序云學者不可曰易論理不論數數非易所先善易者必當因羲圖之象數而明周經之彖象方能得其門而入也誠哉是言楊簡慈湖已易一卷宋志愚嘗見其書只作一大篇自包羲氏一畫陽一畫隂論起至八卦六十四卦爻辭大要謂易者已也以易為書不以易為己不可也桐江詹阜民子南刻之新安郡齋或曰林黃中文字可毁朱文公曰却是楊敬仲文字可毁往往謂已易也錢時周易釋傳二十卷其説謂伏羲文王周公之經既孔子為之傳後學何可容喙敬於傳下略釋本旨而曰周易釋傳焉案其書文辭雖明而意義亦淺略不及象數釋物理間有可采者嘉熙二年喬丞相薦進其書稱其山居讀書理學淹貫嘗從故寶謨閣學楊簡遊蓋其所深許與以祕閣校勘嚴州人姓錢名時融堂扁也湯建周易筮傳名建字達可號藝堂先生溫州樂清人交楊慈湖門人知惠州趙汝馭作序淳祐四年刋於郡齋魏文靖公周易集義六十四卷案集義自周子邵子二程子橫渠張子程門諸大儒吕藍田謝上蔡楊龜山尹和靖胡五峰遊廣平朱漢上劉屏山至朱子張宣公吕成公凡十七家內一家少李隆山子秀巖心傳他易不預如郭氏父子以背程門出之鶴山嘗曰辭變象占易之綱領而繇彖爻之辭畫爻位虛之列互反飛伏之説乘承比應之例有不知則義理闕焉方虛谷回跋紫陽書院重刋本曰僉書樞密院事魏文靖公鶴山先生了翁華父前乙酉嵗以權工部侍郎坐言事忤時相謫靖州取諸經注疏摘為要義又取濓洛以來諸大儒易説為周易集義六十四卷仲子太府卿靜齋先生克愚明己壬子嵗以軍器監丞出知徽州刋要集義置於紫陽書院至丙子嵗書院以兵興廢書版盡毁尋草創新書院於城南門內獨集義僅有存者今戊子嵗山長吳君夢炎首先補刋會江東詳刑使者大原郝公良弼深嗜易學謂聖人之經得濓洛而後明五經論孟之原非此諸大儒明之則終於不明又非有如文靖公囚縶間僻類聚成編則世之學者亦無從盡知之也欣然割資相工得回所藏墨本率總府郡頖協助兩山長及書院職事生員醵泉訖役半年而畢甚矣易道之難明也漢至今説易何啻千家王弼孔穎達注疏單行朱文公嘗深闢之讀者亦鮮李鼎祚易百家解義間見子夏京房虞翻陸績蜀才之説及鄭玄互體殆無復續之者天棐斯文濓洛有作周元公曰無極而太極謂太極無形而有理以明易有太極之有不可以迹求而翼之以通書為臨川陸學者肆為強辨則不可與讀易邵康節始因大傳分言伏羲先天文王後天如兩儀四象乃伏羲畫卦次第陽一隂二為兩儀太陽一少隂二少陽三太隂四為四象惟文公獨得其傳為永嘉葉學三山林學者别為臆説葉適正則著習學記言於易謂其為三陽也天也此易之始畫也已不識伏羲畫卦次第云云葉説淺而陋全不識儀象之義林則林栗也則不可與讀易程純公正公師元公其説易張橫渠撒臯比以遜之正公嘗教人讀王弼胡瑗王安石易伊川易傳出則已削三家之疵而極其粹茍猶泥於三家而不求之程傳者則不可與讀易純公正公皆嘗聞康節加一倍法而正公易傳不屑於象數惟専於義理故文公謂邵明羲易程演周經蓋欲學者合邵程而為一也豈惟邵程當合為一藍田吕與叔初師橫渠後與上蔡謝顯道廣平遊定夫龜山楊中立在程門為四先生乾用九坤用六凡例惟與叔歐陽文忠公及文公三人知之漢上朱子發本程傳而加象數和靖尹德充登正公門最後將易簀授以易傳其論生卦惟許康節五峰胡仁仲得之上蔡傳之南軒張宣公而東萊吕成公與文公宣公相友文公於是集諸儒之大成易本筮占乃述本義啓蒙圖説多得之邵學者不於此混融貫通焉則亦不可與讀易文靖公之在渠陽欲以東萊讀詩記為讀易記謂辭變象占乃易綱領而繇彖象爻之辭畫爻位虛之别互反飛伏之説乘承比應之例一有不知則義理闕焉是書濓流洛派凡十六家合為一觀之而易道備矣先是溫陵曽穜刋易粹言七家中有郭兼山易文靖公謂忠孝易書去程門逺甚自黨論起絶迹程門歿不設奠故并其子雍曰白雲易者黜之臨卭張行成文靖公鄉人為邵易注解通變經世觀物等書世稱七易疑文公未之見别為一支以備旁考今文靖公集百卷明易之義者二百三十章有竒易學最精嘗與參知政事西山先生真德秀希元文公門人輔廣漢卿相講磨渠陽山中苦於書不備友難得是書猶欲有所裨益而未為序引者此也雖然聖如仲尼天不使之居周公之位大儒如濓洛諸老天亦不使之得路於一時而使之立言於萬世其有以夫權逺柄國二十七年窮貪極謬屏文靖公卧五溪窮處踰七稔不如是後世焉得是書而讀之至元二十五年十月既望後學方回謹跋潘夢旗周易解姑蘇人嘉定辛未自序楊文煥易解集之楊文煥五十家易解四十二卷字彬夫釋褐狀元秦州人徐古為易解六卷初特補迪功郎咸淳三年進易解後除正言江東憲名直方字立大號古為先生嘗諱元杰紹定壬辰狀元從董槃澗學只上下經前有進表及圖象趙虛舟易通六卷或問類例圖象四卷名以夫字用父理宗朝尚書侍郎其易大槩論九六七八變與不變或靜吉動凶則勿用動吉靜凶則不處動靜皆吉隨寓皆可動靜皆凶無所逃於天地間此聖人所以樂天知命不憂也易山齋周易總義名芾字彥章號山齋門人陳章序云以總義名者總卦爻之義而為之説也紹定間侍經筵日常以是編陪講孫嶸叟讀易管見一部首列圖書先後天等圖及説仍逐卦爻解説不著經文末有繫辭舉易會稽人咸淳丙寅倅新安刋於郡齋宋不記何朝者皇甫泌周易述聞一卷隱訣一卷補解一卷精微三卷又有紀師説辨通為八卷泌一作佖湯渙周易講義三卷宋志顧思叔周易義類三卷以先儒論易不同因取其辭説同者分目而聚之凡九十五條思叔一作叔思凌唐佐周易集解六卷朝奉大夫劉槩周易繫辭解十卷有論以括其大意字仲平陳禾周易傳十二卷中興書目宋朝正言陳禾撰陳君周易六十四卦賦一卷黃宗旦云潁川陳君不知其名林德祖易説九卷任奉古周易發題一卷成都鄉貢林倏易説十二卷右迪功郎變易八卷變卦纂集一卷馮氏曰其説考甲子通數以八卦定八方並以乾坎艮震巽離坤兊為序吳沆易璇璣三卷每卷九篇雜論易義又有易禮圖説前有或問六條圖説十二軸字德逺號環溪先生臨川人環溪其所居也朱氏三宫易一卷其説分圓宫方宫交宫以初二中四終為序李遇刪定易圖序論六卷陳髙八卦數圖二卷宋志鄭克揲蓍古法一卷宋志李中光易説十卷宋志洪興祖易古經考異釋疑一卷宋志李宏三家易解三十卷有進表合小舟藝閣三家解刋之宏於雜卦後又有餘意一卷潼州府路轉運判官蜀人李開易解三十卷合李宏藝閣三家題小舟先生李開去非撰尹天民易論要纂一卷又易説拾遺二卷陸秉周易意學十卷云欲撰易決藴難就今祇成此書亦如前代傳易之説自題曰齊魯後人案秉字馮氏作東字吳祕周易通神一卷劉文郁易宏綱八卷宋志王日休龍舒易解一卷宋志鄒巽易解六卷宋志胡有開周易解義四十卷宋志林至易裨傳一卷宋志商飛卿易講義一卷宋志王洙周易言象外傳十卷馮氏曰集諸儒易説折衷其理依卦變為類自序云論次舊義傳以新説以弼傳為內摘其異者表而正之故云外傳字原叔應天人以通經侍講天章閣睢陽人藝文志不載姓氏者有書名無姓氏羲文易論微六卷周易解微三卷言八卦象辭周易外義三卷多案諸經傳釋注疏之言周易卦類三卷本王弼注分八卦畫以類相從周易傳四卷自乾至益周義口義六卷書多殘闕周易樞十卷釋六十四卦繫辭要旨三卷周易正經明疑録一卷設問對二十九鄭氏通志不載何代者姚規易注七卷勾微易廣疏三十六卷縱康會同正義三十二卷陳皋易論十卷劉不疑易卦正名論一卷廣論一卷大義疑問二十卷大義一卷發義一卷劉遵易異議論十卷外義三卷黃晞聱隅先生易義十卷黃通易義一部李賁易義二卷周孟陽易義二卷張簡易義略九卷又易問難二十卷李覺大衍義一卷沈季長易義上下二卷葉子長易義二卷張元易發題一卷明疑録一卷啓玄一卷沈濟河圖洛書解一卷伏羲俯仰畫卦圖一卷丘鑄周易卦斷一卷王錡周易口訣六卷史之證周易口訣六卷楚泰周易析微通説三十卷又周易質疑卜傳三十卷郭思永周易明文十卷孫坦周易析藴一卷易箝精義二卷周易通神二卷周鎮周易精微三卷窮理盡性經一卷周易義證總要二卷莊道名略例疏一卷桂詢略例一卷周易編例十卷顧棠周易義類三卷經類卦類雜纂各一卷雜見旁證此三十一家不載代與書名馮厚齋易解載在雜見旁證下今附此房玄齡龍昌期盧穆代淵薛溫其陳文佐楊繪元素汪沿于弇見房審權權義海白氏集氏范氏虞喜王符王嗣宗徐邈荀悅崔憬劉子政劉歆劉昞向秀子期劉賔張晏張軌侯果孟康崔子玄服虔見朝以道古易虔薛音注見陸德明引皇甫謐見正義愚嘗觀東漢儒林傳曰光武遷洛陽其經牒祕書載之二千餘兩自此以後參倍於前靈帝世又詔諸儒正定五經刻於石碑為古文篆𨽻三體書法注古文孔子壁中書篆始皇時程邈所作𨽻亦邈所獻者以相參檢樹之學門後董卓移都吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典册文章競共剖散及王允所收而西者載七十餘乘道路艱逺復棄其半矣後長安之亂一時焚蕩莫不泯盡嗟夫使有天下國家者誠垂意斯文嘉惠承學取五經善本及諸家傳注有足採者又推及子史傳記有所關繫者或鐫金石或刻梨棗摸印頒降州縣學校又詔許經生學士得關假謄録以相教授則家有其書人講其學尚何至有一時泯盡之憂哉計不出此徒知為祕府之藏而不知藏於普天之下使老師宿儒容有聞名未見之書盡付諸烈焰可勝惜哉然聖經大道如元氣周流宇宙間初未嘗間斷或托之於其人或寄之於其書或藏之廣谷大川或淪之遐陬僻壤或散之燈火弦誦紬繹著述於頽簷敗屋之下若有神物護持終不使泯沒無傳者誠以斯文有關於天典民彛之重世道升降生民休戚山川草木鳥獸魚鱉慘舒皆繫焉有非偶然之故者矣愚家藏周易傳注自程朱外僅十餘家聞吾州桂巖戴君夢薦晉翁伯仲城居滕君羽山􅋯家多書踵門而請獲觀數十餘家繼又訪諸前集賢學士鄱陽初菴傅公左孰邂逅王君希旦葵初初菴同里人最嗜談易多見所未嘗因得件列於此其間有宋志朝記所不載者通計若干家往往古今撰述未止是也姑以所見例之大抵義理文辭勝發揮卦爻象數變占者寥寥間見魏晉以下談玄無庸論矣猶幸先代周程張邵諸大賢勃興其於象數理義之學直接千載不傳之祕而集厥大成於我朱夫子作為本義啓蒙二書以繼往聖開來學先君子又有師傳之的研精覃思遂成啓蒙通釋一編窮極奧妙發揮無隱而一桂愚不肖又嘗附録纂注本義書梓行有年尚恨孤陋寡聞象釋疏略嵗在戊申復謀之先同志鄱陽汪君標國表得其手編諸家易解一巨集其書名經傳通解以馮厚齋易解為祗本又博求今古解增入如愚説間亦蒙采取合理義象占為一若干卷今藏於家鄱陽銀峰人入太學登第歸附後曽宰鄉邑後隱居著述舊與先世為懿戚云又自搜訪二十餘家重加纂輯毗於附録用潰於成然由今觀之安得盡閲前書取其有補於卦爻象占者以翼聖經以存講習之為得哉螢磷增輝於太陽亦區區之志焉爾小子狂簡先覺之士幸進而誨諸周易本義啓蒙翼傳中篇
