body:
  text: 周易啓蒙翼傳易類提要臣等謹案周易啓蒙翼傳四卷元胡一桂撰一桂之父方平嘗作易學啓蒙通釋一桂更推闡而辨明之故曰翼傳自序稱去朱子才百餘年而承學漸失如圖書已釐正矣復仍劉牧之謬者有之卜筮之數灼如丹青矣復祖尚元旨者又有之因于本義附録纂疏外復輯為是書一曰舉要以發明變占之義二曰明筮以考史傳卜筮卦占之法三曰辨疑以辨河圖洛書之同異皆發明朱子説者也外篇一卷則易緯候諸書以及京房飛候焦贛易林揚雄太元司馬光潛虛以至邵子皇極經世諸法亦附録其槩以其皆易之支流故别之曰外大致與其父之書互相出入而方平主於明本旨一桂主於辨異學故體例各殊焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易啓蒙翼傳原序朱子于易有本義有啓蒙其書則古經其訓解則主卜筮所以發明四聖人作經之初旨至于專論卦畫蓍䇿則本圖書以首之考變占以終之所以開啓蒙昧而為讀本義之階梯大抵皆易經之傳也先君子懼愚不敏既為啓蒙通釋以誨之愚不量淺陋復為本義附録纂疏以承先志今重加增纂之餘又成翼傳四篇者誠以去朱子才百餘年而承學浸失其真如圗書已釐正矣復仍劉牧之謬者有之本義已復古矣復循王弼之亂者有之卜筮之教炳如丹青矣復祖尚玄旨者又有之若是者詎容于得已也哉故日月圗書之象數明天地自然之易彰矣卦爻十翼之經傳分羲文周孔之易辨矣夏商周之易雖殊而所主同于卜筮古易之變復雖艱而今終不可逾于古傳授傳注雖紛紛不一而專主理義曷若卜筮上推理義之為實夫然後舉要以發其義而辭變象占尤所當講明筮以稽其法而左傳諸書皆所當備辨疑以審其是而河圗洛書當務為急凡此者固將以羽翼朱子之易由朱子之易以參透夫羲文周孔之易也若夫易緯焦京玄虛以至經世皇極內篇等作自邵子專用先天卦外餘皆易之支流餘裔茍知其槩則其列諸外篇固宜而朱子之易卓然不可及者又可見矣抑又有説朱子嘗曰易只是卜筮之書本非以設教然今凡讀一卦一爻便如筮斯得觀象玩辭觀變玩占而又求其理之所以然者施之身心家國天下皆有所用方為善讀是故于乾坤當識君臣父母之分於咸恆當識夫婦之别於震坎艮巽離兌當識長幼之序於麗澤兌當識朋友之講習以至謹言語節飲食當有得於頤懲忿窒欲遷善改過當有得于損益不諂不瀆以謹上下之交安其身而後動易其心而後語定其交而後求以為全身之道當有得于大傳即此而推隨讀而受用焉是則君平依孝依忠之微意也雖日端䇿而筮其根底所在亦何以尚此請申之
