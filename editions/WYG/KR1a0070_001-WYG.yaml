body:
  text: 周易啓蒙翼傳上篇元胡一桂撰天地自然之易日月為易易大𫝊曰日月運行一寒一暑陰陽之義配日月懸象著明莫大乎日月日月之道貞明者也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歳成焉太虚中天地山澤雷風水火飛潛動植何莫非易之呈露豈但日月圖書特日月繼照真天地自然之易圖書迭出真天地自然之數作易之原雖肈於圖書而易之為義尤著明於日月故揭以為首鄭氏厚曰易從日從月天下之理一竒一偶盡矣天文地理人事物類以至性命之㣲變化之妙否泰損益剛柔失得出處語黙皆有對敵故易設一長畫一短畫以總括之所謂一隂一陽之謂道者此也陸氏秉曰易字篆文日下從月取日月交配而成是日往月來迭相為易之義説文日實也太陽之精不虧從一象形通論天无二日故於文一為日古文作徐氏曰隂不可抗陽臣不可敵君於文闕者為正義曰日譬之火月譬之水火外光水含景故月生於日之所照魄生於日之所蔽當日為光就日則明明盡謂之一月愚謂於文日中有一竒也月中有二偶也一而二二而三三才道立萬物生生變化無窮矣或曰日月特坎離二象何以得専易之名曰易有爻與位九六為爻之隂陽九陽而六隂也初二三四五上為位之隂陽初三五陽而二四上隂也以爻之隂陽言唯坎離二卦當日月之象以位之隂陽言初二三為位之離四五上為位之坎六十四卦之位皆坎離則六十四卦之位皆日月之象也況日月陰陽之精天地功化皆寄在大光明中日之功又大於月月特受日之光大哉日乎出則晝入則夜行南陸則暑行北陸則寒萬萬古生殺慘舒皆日功用不然八表同昬父母諸子亦且奈何哉或又曰離陰卦乃日象坎陽卦乃月象何也陰陽之精互藏其宅也又况離雖陰卦實生於陽儀坎雖陽卦實生於陰儀陽中有陰陰中有陽也然則離日坎月厥義彰矣按蜀彭曉參同論云日者陽内含陰象故日中有烏月者陰内含陽象故月中有兔愚謂卯屬兔月生西乃有兔酉屬雞烏屬日生東乃有雞此亦互藏其宅處即楚辭顧莬烏羽之論朱子不謂然此姑以其有互藏其宅之象而及之爾河圖洛書易大𫝊曰河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也此統論河圖洛書也又曰天一地二天三地四天五地六天七地八天九地十按此簡本在第十章之首本義從程子說移在第九章之首天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也按此簡木在大衍之後本義移在天九地十之下又按班固律厯志唐衛元包二簡皆是連書此専明河圖之數也古今言數學者蓋始於此天地間只有一十數衍而為百千萬億之无筭者此十之積也十數又只始於一數自二至十皆此一之積也一之上更有何物理而已矣此所謂易有太極是也太極之理雖超乎數之外而實行乎數之中也自天一至地十細積之已自具天地五十有五之數一與二為三三與三為六六與四為十十與五為十五十五與六為二十一二十一與七為二十八二十八與八為三十六三十六與九為四十五四十五與十為五十五數備矣其下文不過申明此十數而已其義先人啓蒙通釋備矣天地人物古往今來萬事萬變與夫鬼神之情状皆在此數包羅中矣今以圖觀之天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之然天一生水必待地六而後成以至天五生土必待地十而後成者以五行之生皆不能離乎中五之土以成形質天一生水矣水非土則原泉從何出故一得五則成六是地六成之也地二生火矣火非土則歸宿於何所故二得五則成七是天七成之也天三生木矣木非土亦无所培植故三得五則成八是地八成之也地四生金矣金固土之所滋長故四得五則成九是天九成之也天五生土矣生而必成則積之深厚故五得五則成十是地十成之也一二三四五者生之之序也六七八九十者皆因五而後得非真藉六七八九十之數以成之也春屬木居東方而三八生成木在東在十干則為甲乙十二支則為寅卯在人則為五臟之肝夏屬火居南方而二七生成火在南在十干則為丙丁十二支則為己午在人則為五臟之心秋屬金居西方而四九生成金在西在十干則為庚辛十二支則為申酉在人則為五臟之肺冬屬水居北方而一六生成水在北在十干則為壬癸十二支則為亥子在人則為五臟之腎四季屬土居中宫而五十生成土在中在十干則為戊己十二支則為辰戌丑未在人則為五臟之脾若配以五常則東屬仁南屬禮西屬義北屬智中宫屬信而貫乎四者五行質具於地氣行於天以質言則曰水火木金土取天地生成之序也以氣言則曰木火土金水取春夏秋冬運行之序也故圖之左旋自東而南南而中中而西西而北合四時之序焉此圖不過龍馬負之出於河爾而數之所具包括如此其可以人力彊為也哉易大𫝊雖以河圖與洛書並言却未嘗明言洛書之數如所論河圖之詳者今以洛書觀之其為數也一居北六居西北三居東八居東北五居中與河圖之位數合至於九自居南四自居東南七居西二自居西南二方之數視河圖實相易置焉何哉朱子謂陽不可易而陰可易其義精矣愚又自其粗者觀之蓋圖書之數雖不相襲然而天地間東西南北中不過一水火木金土之位一二三四五六七八九十不過一水火木金土之數自二圖並觀河圖五行之數各協五方之位洛書之數三同而二異焉其居中者不可易矣縱使東北二方之數相易亦不過有相生而无相克至西南二方之數相易則金乘火位火入金鄉有相克制之義焉此造化所以必易二方之數者正以成其相克之象也自二方既易之後書皆右轉相克北方一六水克南方二七火南方二七火克西方四九金西方四九金克東方三八木東方三八木克中央五土五土復克北方水焉若使東北二方之數亦易非但无相克之象又且於右轉之序紊其位次而无復自然之法象矣此造化之所以巧妙也河圖主左旋相生洛書主右轉相克造化不可无生亦不可无克不生則或幾乎熄不克則亦无以為之成就也五行相克子必為母報讎如土克水水之子木又克土水克火火之子土又克水火克金金之子水又克火金克木木之子火又克金木克土土之子金又克木其循環相克亦无已焉今有人忘父母之大讎而不報者可以觀諸此矣或曰克必有報而生未之酬何也蓋生者理之常數之順如天之生物本无求於報而受生者固亦不屑屑以報為事其河圖之謂乎克者理之變數之逆為受克之子者豈容坐視而不報哉其洛書之謂乎體常盡變則子必為母報讎乃造化自然之象人事當然之理而不可易者也至於中央視河圖惟有五而無十然一九二八三七四六之合環而向之未甞无十焉正造化之妙處合圖書之數悉計之為數者百如犬牙之相制牝牡之相銜其巧又有如此者蓋甞論之河圖雖授羲以畫八卦竊意伏羲見是圖竒偶之數卦便可畫初非規規然模倣其方位與數也卦畫既成隱然自與圖之位數合洛書雖云授禹以叙九疇然九疇自初一五行之外次二五事以下與洛書之位數初不相關今合二圖以觀先後天之易且以伏羲先天八卦乾兌生於老陽之四九離震生於少陰之三八巽坎生於少陽之二七坤艮生於老陰之一六其卦未甞不與洛書之位數合文王後天八卦坎一六水離二七火震巽三八木乾兊四九金坤艮五十土其卦未甞不與河圖之位數合先人之説見啓蒙通釋上卷末所以然者豈伏羲之時圖書既皆並出禮緯亦曰伏羲徳合上下天應以鳥獸文章地應以河圖洛書伏羲則以畫卦其後天復以錫禹邪九疇蓋亦本洛書九數也二圖精奥朱子備見啓蒙先人通釋詳矣今姑就其粗者與夫一二未𤼵之要者講之然後進於啓蒙亦易易也四聖之易伏羲易伏羲始作八卦圗易大𫝊曰古者包羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情又曰易有太極是生兩儀兩儀生四象四象生八卦又曰八卦成列象在其中矣此明伏羲始畫八卦也八卦為小成之卦三畫之卦乾一兊二離三震四巽五坎六艮七坤八伏羲不是逐卦如此畫只是自太極理也生兩儀為第一畫者二陽儀一􅅀陰儀二􅄲兩儀生四象為第二畫者四四象者陽儀之上生一陽為太陽一生一陰為少陰二陰儀之上生一陽為少陽三生一陰為太陰四太陽少陰少陽太陰即所謂四象也四象生八卦為第三畫者八太陽之上生一陽為乾生一陰為兊少陰之上生一陽為離生一陰為震少陽之上生一陽為巽生一陰為坎大陰之上生一陽為艮生一陰為坤所謂始畫八卦者此也朱子曰爻之所以有竒偶卦之所以三畫而成者皆是自然流出不假安排此易學之綱領開卷第一義然古今未見有識者至康節先生始𫝊先天之學而得其説且以為伏羲氏之易也蔡西山要㫖曰自太極判而為陰陽陰陽之中又自有陰陽出於自然不待智營力索也愚觀河圖洛書皆木數居東方伏羲畫卦自下而上即木之自根而榦榦而枝也其畫三木之生數也其卦八木之成數也重卦則亦兩其三八其八爾三八木數大備而後六十四卦大成一六水二七火四九金五十土皆在包羅中矣吁木行春也春貫四時木德仁也仁包四端大哉易也斯其至矣易大𫝊曰八卦成列象在其中矣因而重之爻在其中矣此明伏羲於前八卦上因而重之為六十四卦大成之易也伏羲重卦亦不是連將三畫安頓在上只是因八卦既成又自八卦上逐卦各生一陽一陰則八分為十六卦十六卦上又各生一陽一陰則十六分為三十二卦三十二卦上又各生一陽一陰則三十二分為六十四卦而六畫卦成矣以六十四卦横圖觀之其卦亦首乾終坤重乾居一重兊居二重離居三重震居四重巽居五重坎居六重艮居七重坤居八乾一坤八之序亦不易焉且前三十二卦一畫陽便對後三十二卦一畫陰前三十二卦一畫陰便對後三十二卦一畫陽陰陽兩邊各各相對莫非自然之序此伏羲先天之易邵子謂一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四是也朱子曰某看康節易了都看别人底不得他説箇太極生兩儀兩儀生四象又都无甚𤣥妙只是從來更无人識又答林黄中曰邵子之前論重卦者多只是説并累三陽以為乾連疊三陰以為坤然後以意交錯而成六子又先畫八卦於内復畫八卦於外以旋相加而後得為六十四卦其出於天理之自然與人為之造作葢不同矣説卦曰天地定位山澤通氣雷風相薄水火不相射八卦相錯右伏羲八卦方位圎圖不過以前八卦横圖掲陽儀中乾兊離震居東南揭陰儀中巽坎艮坤居西北圖旣成後乾南坤北離東坎西以四正卦乾坤離坎反覆只是一卦八卦中以此四卦為四正卦居四方之正位震東北巽西南艮西北兊東南以二反卦震反為艮巽反為兊本只震巽二卦反而成四卦八卦中以此四卦為震巽之變卦居四隅不正之位合而言之天位乎上地位乎下日生於東月生於西山鎮西北澤注東南風起西南雷動東北自然與天地大造化合先天八卦對待以立體如此其位則乾一坤八兌二艮七離三坎六震四巽五各各相對而合成九數其畫則乾三坤六兊四艮五離四坎五巽四震五亦各各相對而合成九數九老陽之數乾之象而无所不包也造化隱然尊乾之意可見方八卦之在横圖也則首乾次兊次離次震次巽次坎次艮終坤是為生出之序及八卦之在圎圖也則首震一陽次離兌二陽次乾三陽接巽一陰次坎艮二陰終坤三陰是為運行之序生者卦畫之成而行者卦氣之運也乾坤父母也震巽長男女也坎離中男女也艮兊少男女也乾統三女坤統三男本其所由生也伏羲六十四卦方圎圗右伏羲六十四卦圓圖亦就前六十四卦横圖中掲陽儀中前三十二卦自乾至復居圖左方東邉乾在南之半復在北之半揭隂儀中後三十二卦自姤至坤居圖右方西邊姤在南之半接乾坤在北之半接復先自震復而却行以至於乾乃自巽姤而順行以至於坤圖既成後坤復之間為冬至子中同人臨間為春分卯中乾姤間為夏至午中師遯間為秋分酉中自合四時運行之序朱子曰此圖若不從中起以向兩端而但從頭至尾則此等類皆不可通矣但陰陽消長較之文王十二月卦疎密不同復隔十六卦為臨臨隔八卦為泰泰隔四卦為大壯大壯隔一卦為夬為乾姤遯否觀剥坤亦然若依陰陽消長之次分節候未免疎密不齊卦氣疎密一節先人於通釋先天圓圖下論之已詳但初藁謂卦氣盈縮蓋亦有説且即内八卦以推十三月之卦坎離陰陽之中者也又為日為月周於一歳十二月之間故坎離各八卦不當月分所以疎密愈不同後以坎離日月之説太新削去不用今㸔來離日坎月乃易象正說共十六卦又誠不當月分未為不可故記於此以相參考要之伏羲卦氣自是一樣坤復乾姤與文王十二月卦適同外餘皆不同文王自是一樣不可混而觀也天道左旋其運行之序自北而東東而南南而西西而北北而復東也説卦𫝊曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之友人程直方道大引邵子曰先天學心法也故圖皆從中起萬化萬事生於心也以為皆字是指說卦天地定位及雷以動之兩節而言天地定位一節則圓圖乾坤從南北之中起山澤通氣則艮居坤之右兊居乾之左雷風相薄則震居坤之左巽居乾之右水火不相射則坎居正西離居正東是起南北之中而分於東西也雷以動之風以散之一節則方圖震巽自圖之中起雨以潤之則坎次巽日以烜之則離次震艮以止之則艮次坎兊以説之則兊次離乾以君之則乾次兊坤以藏之則坤次艮亦起圖之中而達乎西北東南也故曰皆從中起萬化萬事生於心也其論最為的當且使說卦此一節亦有歸著實𤼵啓蒙之所未𤼵然而此圖不過以前大横圖分為八節自下疊上而成第一層即横圖自乾至泰八卦第二層即横圖自履至臨八卦以至第八層即横圖自否至坤八卦圖既成後乾本在圓圖之南今轉而居西北内乾八卦居北外乾八卦居南坤本在圓圖之北今轉而居東南内坤八卦居南外坤八卦居東艮兊坎離震巽皆易其位子至亥十二辰正月至十二月四時卦氣皆右轉以應地之方泰在寅為正月乾在亥為四月否在申為七月坤在已為十月葢圓於外者為天方於内者為地地道右轉自東北至西南卦畫自然配合夫造化而震巽與恒益四卦亦適自中央而起乾坤則位乎西北東南泰否則位乎東北西南又有萬化萬事生乎心之象也邵子方圓圖起數法詳具於外篇伏羲揲蓍求卦之法說卦𫝊曰昔者聖人伏羲之作易也畫六十四卦幽賛於神明而生蓍幽賛黙助之意中庸賛化育之賛神明天地之道蓍草屬蓍形類蒿花似菊鄭氏通志史記蓍䇿𫝊天下和平王道得而蓍莖長丈餘其叢生滿百莖可以當大衍之數者三下有神龜守之上有雲氣覆之參天兩地而倚數觀變於陰陽而立卦𤼵揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命此夫子言㐲羲畫易欲教人用易故賛助天地之道而生蓍草以供卜筮之用倚數立卦生爻使人和順道徳而理義窮理盡性而至命也乾鑿度云垂皇策者羲孔穎達云伏羲始用蓍夫有卦則有蓍信然矣繫辭𫝊曰大衍之數五十蓍一叢百莖之半其用四十有九虛一象太極分而為二以象兩將四十九蓍信手中分為二兩兩儀天地之象掛一以象三掛一䇿於左手小指間三三才掛一象人生天地間參為三才揲之以四以象四時以四數蓍䇿象四時歸竒於扐以象閏竒餘也四揲左手所餘之䇿扐於左手无名指間閏閏月五歳再閏閏法五歳内无再閏此姑借言之耳故再扐又四揲右手所餘之䇿再扐左手中指間是為一變而後掛而後掛者前一變既足復掛以起第二變之端又曰四營而成易四營者謂分二掛一揲四歸竒凡四遍經營易變也四營成一變也十有八變而成卦變即易也凡三變成一爻十八變成六爻是成一卦計七十二營也此夫子論伏羲教人所以揲蓍之法也大衍數五十虚一不用取四十九蓍為一握信手中分置几左右次以左手取左策執之而以右手取右一策掛左手小指間次以右手四揲左策觀其所餘或一或二或三或四扐之左手无名指間次以右手反過揲之策於左上過揲揲過者遂取几右策執之而以左手四揲之觀所餘策如前扐之左手中指間次以右手反過揲策於几右合兩手一掛二扐之策置几之西邊是謂一變再以兩手取几左右見存之策合之復四營如第一變之儀而置掛扐之策於第一變掛扐之側是謂二變再以兩手取几左右見存之策合之復四營如前二變之儀而置掛扐之策於第二變掛扐之側是謂三變乃觀三變所得掛扐多少以畫第一爻如是每三變成爻十八變成卦視其老少之變與不變以占事之吉凶焉詳見本義筮儀揲蓍所得掛扐之䇿圖筮法初揲掛扐不五則九第二三揲不四則八五四為竒為少九八為偶為多五除掛一則四九除掛一則八老少掛扐定九八七六之數右按四象老少之由原於河圖之數一二三四五圖之生數也六七八九十圖之成數也四象九八七六之數雖就成數内見然九者一三五之積六者二四之積七者二五之積八者三五之積言九八七六則生數已在其中必以九六為老七八為少者以成數論之陽主進由七之進至九而極為陽之老陰主退由八之退至六而極為陰之老九退而為七則七為少六進而為八則八為少也進極而退所以七為少陽退極而進所以八為少陰也右案五十之蓍虚一用四十九四營之後又除初掛一只以四十八策分掛扐過揲而為此圖掛扐過揲進退各以四由老陽掛扐十二進一四為少陰掛扐十六少陰掛扐十六進一四為少陽掛扐二十少陽掛扐二十進一四為老陰掛扐二十四其進也至四十八策之中焉止矣又由老陽過揲三十六退一四為少陰過揲三十二少陰過揲三十二退一四為少陽過揲二十八少陽過揲二十八退一四為老陰過揲二十四其退也亦至四十八策之中焉止矣進退皆不過乎其中也舊說多用過揲以定九八七六之爻棄掛扐不用朱子非之用掛扐而不用過揲辨之詳矣若如舊説則四揲之後棄所餘策足矣何必一掛兩扐之多端哉朱子謂用掛扐而不用過揲葢以簡御煩以寡制衆最為得之二老過揲當期物數圗繫辭𫝊曰乾之策二百一十六乾六爻老陽過揲數坤之策百四十四坤六爻老陰過揲數凡三百六十當期之日萬有一千五百二十合乾坤與六子三百八十四爻三者過揲之數當萬物之數也此以二老過揲數論若以二少過揲數論總數亦同今為圖於左或曰何以不論掛扐曰掛扐以生爻過揲以明數而或者乃捨掛扐并以過揲生爻誤矣二老過揲計三百八十四爻數二少過揲計三百八十四爻數揲蓍占法一爻變則以本卦變爻占案左𫝊占法又不只就一爻占合本之卦體并互體觀陳宣公筮公子完之生可見二爻變則以本卦二變爻占仍以上爻為主案陳摶為宋太祖占亦旁及諸爻與卦體三爻變則占本之卦辭及卦體以卦體平分故也仍以本卦為貞之卦為悔主在本卦案啓蒙但云占本之彖辭然以晉侯屯豫之占則并占卦體可見四爻變則占之卦二不變爻仍以下爻為主愚謂仍先觀本卦二不變爻然後重在之卦二不變爻而以下爻為主方備五爻變則占之卦一不變爻愚謂仍先觀本卦一不變爻然後以之卦一不變爻為主尤為詳備六爻盡變則新成舊毁惟以之卦内外兩體占乾坤占二用餘占之卦彖辭六爻皆不變則占本卦彖辭而以内卦為貞外卦為悔并占上下兩體為全備案伏羲易无文字只占卦體卦爻之象至文王周公有辭矣就辭上占然卦爻辭固有與所占事意相應者又有全不應者自以卦體卦爻象推測之方驗大抵於辭上㑹處少於象上㑹處多也如乙亥年六月旦日食既天漆黒久漸光時愚在祈門桴溪李氏館以蓍筮之得大有之需上體三爻俱變也法當以兩卦彖辭占求之辭朱悟以本之卦體占下體乾天不動上體以離日變坎月日在天上倐變為月在天上矣以月掩日正日食象以南方之離變北方之坎獨无意乎得非本卦彖辭所謂元亨之兆歟此可以見占法矣伏羲神農黄帝堯舜十三卦制器尚象圗易繫辭𫝊下包羲氏罔罟取諸離神農氏耒耜取諸益市取諸噬嗑黄帝堯舜衣裳取諸乾坤舟楫取諸渙服牛乘馬取諸隨門柝取諸豫杵臼取諸小過弧矢取諸睽棟宇取諸大壮棺槨取諸大過書契取諸夬離下離上離重離有巽體巽繩離目有罔罟象震下巽上益巽木入於前耒象震木動於後耜象震下離上噬嗑市離虚象致民震出象聚貨艮止象又藏山海之寳象交易否初五爻得所陰陽均乾下乾上乾乾天在上衣象坤下坤上坤坤地在下裳象坎下巽上渙巽木坎亦堅木刳剡巽伏兊金象方成舟楫又巽木行坎水象震下兊上隨初至四似離牛象震馬象坤下震上豫坤為户艮為門闕重門也艮手遇震木撃柝也暴客震躁也艮下震上小過震木兊金斷之艮土震動而有兊金揉之又上動下止杵臼之象兊下離上睽兊為巽木之反有弓象巽繩又弦象坎堅木兊金剡為矢象乾下震上大壯震木在上為棟乾在天下為宇兊澤雨象震伏巽風象巽下兊上大過巽木兊反體亦為巽木四陽在中有棺槨象乾下兊上夬乾兊本同生老陽判為二卦今復合成夬有書契判合象金氣行天又有凋木之象愚謂此夫子述五聖人雖不假卜筮而用易所謂制器尚象之事也文王易朱子曰此圖若以卦畫言之震一陽居下兑一隂居上故相對坎一陽居中離一隂居中故相對㢲一隂居下艮一陽在上故相對乾純陽坤純隂故相對亦是一説見大全集説卦𫝊曰帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之㓗齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所說也故曰説言乎兊戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮右文王八卦又自取東南西北四方之位及春夏秋冬四時運行之序震東為春巽東南春夏之交離南為夏坤西南夏秋之交兊西為秋乾西北秋冬之交坎北為冬艮東北冬春之交震巽為木離為火坤艮為土兊乾為金坎為水春夏秋冬木火金水與四方俱協焉後天八卦流行以致用又如此天地之間有對待之體不可无流行之用有伏羲易不可无文王之易所以知得此為文王者文王彖坤有曰西南得朋東北喪朋正合此圖之方位也陳氏友文曰離為日大明生於東故在先天居東日正照於午日中時也故在後天居南坎為月月生於西故在先天居西月正照於子夜分時也故在後天居北在先天則居生之地在後天則居旺之地不特坎離後天卦位皆以生旺為序正南午位離火旺焉正北子位坎水旺焉震木旺於卯故震居東兊金旺於酉故兊居西土旺中央故坤位金火之間艮位水木之間兊陰金乾陽金故乾次兊居西北震陽木巽陰木故巽次震居東南皆以五行生旺為序此所謂易之用也若夫乾統三男於東北坤統三女於西南是入用之際男皆從父女皆從母各從其類也愚於說卦論之詳矣内圖文王後天八卦外圖伏羲先天八卦案圖而觀則知文王本伏羲卦位以成後天卦位者其變易之意厥有攸在矣右文王改易伏羲卦圖之意邵子𤼵明之朱子釋之已詳見啓蒙可謂得王者之心矣盤澗董先生又曰天地以中相易為坎離水火以上下相易為震兊澤雷以上下相易為巽艮風山以上下交相易為乾坤六子並以一爻變惟乾坤變其二爻陰陽之純故也故震兊横而六卦縱有自然之象矣愚案後天四隅之卦先生葢取先天艮巽震兊以縱相易為乾坤艮巽若皆就對宫取亦有說先天兊與艮對以兊下二陽易艮下二陰則為後天西北角乾矣故先天艮初三兩爻復往易兊初爻為陰三爻為陽則成後天東南角巽矣先天震與巽對以震上二爻陰易巽上二爻陽則成後天西南角坤矣故先天巽初三兩爻復往易震初爻為陰三爻為陽則成後天東北角艮矣亦未為不可若又以先天乾坤為變之主推之以定後天八卦又有可言者先天乾中爻既變坤中爻為坎故天氣下降而乾位西北坤中爻既變乾中爻為離故地氣上騰而坤位西南乾既當先天艮位故艮進位東北當先天震位艮亦震之反也坤既當先天巽位故巽退位東南當先天兊位巽亦兊之反也若後天東南二方震兊二卦亦因離既往居乾位當後天南方之卦離性炎上故先天離三爻變則為後天震矣坎既徃居坤位當後天北方之卦坎性潤下故先天坎初爻變則為兊矣亦未為不可大抵易變易也横斜曲直无往不通由人是取但未知文王初意果如何耳秖恐愈巧則愈失其真也盤澗先生此段不見梓本愚元貞乙未往先生家見其曾孫柄扁新齋首蒙以遺藁此段見敎因得推廣師說云文王序六十四卦皆以反對而成次第何謂對如上經乾與坤對頤與大過對坎與離對下經中孚與小過對陰陽爻各各相對也何謂反如屯反為蒙既濟反為未濟一卦反為兩卦也對者八卦反者二十八卦而六十四卦次序成矣試甞細考之上經三十卦一百八十爻陽爻八十六陰爻九十四下經三十四卦二百丹四爻陽爻一百丹六陰爻九十八卦爻陰陽多寡參差不齊亦甚矣今以反對計之則上經以十八卦成三十卦下經亦以十八卦成三十四卦上經五十二陽爻五十六陰爻下經五十六陽爻五十二陰爻共用三十六卦成六十四卦而卦爻陰陽均平齊整條理精密又未有如此之甚者於不齊之中而有至齊者存是亦可樂而翫之也案圖可見矣然此特姑見其反對之巧妙若夫經分上下與卦先後次第之所以然者詳見後六十四卦全圖下經正卦凡二反卦三十二亦十八卦成三十四卦右文王演易羑里取伏羲六十四卦分為上下經二篇大抵本先天圎圖以東西南北四方正卦乾坤坎離為上經之始終以西北隅艮東南隅兊合而為咸西南隅巽東北隅震合而為恒四隅反卦為下經之始而終以既濟未濟則亦坎離之交不交也故乾坤坎離四純卦皆居上經震艮巽兊四純卦皆居下經义以反對為次非復先聖之舊夫子序卦直以卦名𤼵其次第之義他則未及今觀反對之序上經自乾至離共用十八卦反對為三十卦下經自咸至未濟亦用十八卦反對為三十四卦有十八變而成卦之象乾數九二九為十八坤數六三六亦十八乾竒其畫六坤偶二六一十二合之則為三六亦十八愚已作反對圖并說附本義末今為全圖於此然上下經豈无以為之主者乎葢甞思之天地為萬物之祖乾坤為六十四卦之祖不易之論也然以六十四卦分上下經則乾坤為上經之首即為上經之主而終之以坎離餘震艮巽兊與坎離之餘卦皆其遇也故八卦各體散見於上經者乾坤最多各十有二而震艮各七巽兊各四坎八離六而已以咸恒為下經之首即為下經之主艮兊巽震是也而終之以既濟未濟亦坎離也餘乾坤坎離皆其過也故八卦各體散見於下經者兊巽最多各十有二震艮各九而乾坤各四坎八離十而已此上經自坎離以外无一卦无乾坤下經自既未濟外亦无一卦无艮兊震巽上經自乾坤而後三陰三陽之卦凡六乃乾坤之三變泰否乾坤之三陰三陽交不交也隨蠱乾坤之三陰三陽雜居也噬嗑賁乾坤之三陰三陽分布也餘則乾坤兩體各司諸卦下經自咸恒而後艮兊震巽相重之卦亦凡六乃咸恒之三變損益咸恒之首變咸變盡為損而艮上兊下恒變盡為益而巽上震下猶上經之有泰否也漸歸妹咸恒之再變咸恒之下二體艮巽合而為漸咸恒之主二體兊震合而為歸妹猶上經之有隨蠱也中孚小過咸恒之三變咸恒上下二體交互相重以咸下體艮遇恒上體震則為小過以咸上體兊遇恒下體巽則為中孚亦猶上經之噬嗑賁也餘則艮兊巽震各司諸卦焉然乾坤三變必一吉而一凶泰隨賁吉而否蠱噬嗑凶矣咸恒三變亦必一吉而一凶益漸中孚吉損歸妹小過凶矣或曰乾坤艮兊巽震分主上下經固也而上經屯蒙隨蠱噬嗑賁頤大過八卦乃艮兊巽震之合无乾坤正體下經遯大壮晉明夷夬姤萃升八卦乃有乾坤非盡艮兊巽震之合體文王序卦何不徑以十六卦兩相博易則非特上經自坎離外无一卦无乾坤正體而下經自既未濟外艮兊巽震兩兩相從正體之卦尤无間斷今下經晉明夷无艮兊巽震之正體只有互體之艮震不亦可乎曰聖人之智豈不及此而必為是者其意誠不欲使上下經截然為乾坤截然為艮兊巽震於以見男女有從父母之象父母有臨男女之象而又不害其為上下經雖不盡有主卦之正體而亦未甞无可取之乾坤艮兊巽震乎上經屯蒙有互體坤隨蠱噬嗑賁頤大過實分具乾坤三陰三陽之體下經晉明夷有艮震互體此猶分陰分陽陰陽又互為根正易之妙處衆人固不識也以此求之庶乎可以竊窺文王之心而其間關節脈理之通黙而識之又存乎其人焉今各見兩兩相從卦下吕氏曰易變易也天下有可變之理聖人有能變之道反需為訟泰為否隨為蠱晉為明夷家人為睽此不善變者也反剥為復遯為壯蹇為解損為益困為井此善變者也文王示人以可變之幾則危可安亂可治特在一轉移間爾後天之學其以人事賛天地之妙與見要指又甞合上下經始終而論之乾坤天地也坎離水火也以體言也咸恒夫婦也既未濟水火之交不交也以用言也上經以天道為主具人道於其中下經以人道為主具天道於其内三才之間坎離最為切用日月不運寒暑不成矣民非水火不生活矣心火炎燥而不降腎水涸竭而不升百病侵陵矣故上下經皆以坎離終焉又見本義後卦序圖說下文王作六十四卦卦下辭文王序卦後以伏羲易但有卦畫无文字遂以逐卦下作為卦辭名之曰彖辭左𫝊名之曰繇辭彖者斷也所以斷一卦之吉凶如乾卦元亨利貞一句坤卦元亨利牝馬之貞以下是也六十四卦皆然文王之易所以首乾次坤者葢本天地之位著君臣上下之分以紀綱人極今觀乾坤二卦彖辭利貞安貞吉之訓可以見文王之心矣此其所以三分有二道化廣及人心歸之者衆非謂已有紂三分有二之土地也以服事殷也要之文王彖辭只是卜筮占決之辭亦多取象及卦變卦變多於往來二字上見如泰小往大來否大往小來又分明易見者已解見泰卦辭下大抵皆因占以寓教如言利貞不言利不貞言貞吉不言不貞吉之類貞便是一箇正固底道理文王作卦辭雖未嘗明言太極然所謂正理是即所謂太極矣故孔子𤼵之文王九卦處憂患圗兊下乾上履徳之基也履和而至履以和行艮下坤上謙徳之柄也謙尊而光謙以制禮震下坤上復徳之本也復小而辨於物復以自知巽下震上恒徳之固也恒雜而不厭恒以一徳兊下艮上損徳之修也損先難而後易損以逺害震下巽上益徳之裕也益長裕而不設益以興利坎下兊上困徳之辨也困窮而通困以寡怨巽下坎上井徳之地也井居其所而遷井以辨義巽下巽上巽徳之制也巽稱而隱巽以行權易繫辭𫝊曰易之興也其於中古乎作易者其有憂患乎是故履徳之基也止巽以行權此夫子𤼵明文王處憂患不假卜筮用易之事豈所謂以動者尚其變之義乎一陳卦徳二陳卦材三陳聖人用卦皆有次第然易豈止此九卦可處憂患如屯否蹇剥皆可也葢道理只在聖人口頭偶然在九卦上說文義亦足初未嘗留意若更添幾卦更减幾卦皆可舊看九卦於三畫八卦内七卦有取獨無取於離以為聖人晦明之意然有互體離在焉實未甞不明也又以太巧不入之本義纂注後今姑記於此文王十二月卦自復卦一陽生為冬至子中屬十一月中臨卦二陽生為大寒丑中屬十二月中泰卦三陽生為雨水寅中屬正月中大壯四陽生為春分卯中屬二月中夬卦五陽生為穀雨辰中屬三月中乾卦六陽生為小滿已中屬四月中為純陽之卦陽極則陰生故姤卦一陰生為夏至午中屬五月中遯卦二陰生為大暑未中屬六月中否卦三陰生為處暑申中屬七月中觀卦四陰生為秋分酉中屬八月中剥卦五陰生為霜降戌中屬九月中坤卦六陰生為小雪亥中屬十月中為純陰之卦陰極則陽生又繼以十一月之復焉陰陽消長如環无端不特見之卦畫之生如此而卦氣之運亦如此自然與月之陰陽消長相為配合大𫝊所謂易與天地凖故能彌綸天地之道於此亦可見其一端所以知得十二月卦屬文王者以文王卦下之辭復卦七日來復臨卦八月有凶之類可見此圖既成以四時之氣配四方之位雖與文王序卦先後不協實自然與伏羲六十四卦圓圖之位次合卦氣流行之接卦畫對待之妙陰陽盛衰消長相為倚伏之機備於此圖十二月卦中矣案朱子本義伏羲六十四卦横圖用黑白以别陰陽爻答袁樞曰黑白之位亦非古法但今欲易曉且為此以寓之耳今愚本文公法作為此圖白者為陽黑者為陰了然在目矣周公易周公作三百八十四爻下之辭如乾卦初九潛龍勿用坤卦初六履霜堅氷至之類是也爻辭取象尤多所以明一爻之吉凶大抵卦分兩體以象言則只是兩象以人言則只是兩人爻分六爻以象言則分為六象以人言則分為六人與卦體全不同矣各據卦爻而論可也謂爻辭為周公作者易初无明文馬融王肅姚信謂周公作爻辭孔穎達正義正義易疏是也引說者云爻辭中有說文王處如升卦六四王用享于岐山之類武王克商之後始追號文王為王若爻辭並是文王作不應文王自說王用享于岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不宜豫言箕子之明夷又左傳韓宣子適魯見易象而知周公之徳晁說之曰韓宣子見易象是古人以卦爻統名之曰象也故曰易者象也其意深矣驗此諸說以為卦辭文王爻辭周公馬融陸績之徒並用此說今依而用之愚案孔氏所引諸說證據甚明而箕子之稱尤足以見其決非文王之所作也餘見後辨疑内右㐲羲六十四卦文王卦下之辭周公爻下之辭通稱曰經孔氏正義曰子夏𫝊云雖分上下二篇未有經字經字後人所加不知起自誰始案前漢孟喜易本云分上下二經是孟喜之前已題經字其篇題經字雖起於後其稱經之理久在於前矣又案陳氏臯曰六經首書皆不曰經惟易稱上下經說者楥孟喜本分上下經是喜以前已題經字矣又鉤命訣云曾子問於孔子曰孝經與易何以得稱經則孔子時已稱經矣此讖緯之言未可必信臯以為孔子始題以記之故有上下經之號也孔子易孔子作十翼之辭孔穎達曰十翼之辭以為孔子所作先儒更无異論但數十翼亦多家既文王易經本分為上下二篇則區域各别彖象釋卦亦當隨經而分故一家云上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十鄭學之徒並同此說今亦依之朱子本義亦然又案胡公旦謂彖一大象二小象三乾文言四坤文言五上繫六下繫七說卦八序卦九雜卦十且謂孔氏說非胡公瑗又謂上彖下彖大象小象文言上繫下繫說序雜為十翼皆朱子所不取今姑記以備看漢上朱氏曰十翼本與周易異卷前漢費直𫝊古文周易以彖象繫辭文言解說上下經是也費氏之易至馬融始作傳融𫝊鄭康成康成始以彖象連卦辭爻辭魏王弼又以文言附乾坤二卦故自康成而後其本加彖曰象曰王弼而後加文言曰至於文辭連屬不可附六十四卦之爻則仍其舊篇今繫辭上下說卦序卦雜卦是也魏高貴鄉公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象於經者欲便學者尋省易了孔子恐其與文王相亂是以不合則鄭未注易經之前彖象不連經文矣漢上所引證極有功東萊先生所深取觀此則十翼本與周易異卷詎不信然彖上𫝊第一上經三十卦彖下𫝊第二下經三十四卦彖𫝊如乾卦彖曰大哉乾元以下坤卦彖曰至哉坤元以下是也文王卦下之辭正是彖辭孔子於繫辭𫝊有曰彖者言乎其象也象指卦象又曰知者觀其彖辭則思過半矣所謂彖正謂文王卦下之辭也彖𫝊者乃是孔子賛易十篇之二先儒附其辭於彖下故加彖曰以别之若曰孔子賛文王卦下之辭云彖之意如此也孔子雖是賛文王卦辭然多自𤼵明已意以解伏羲卦不盡同於文王如乾元亨利貞文王本意只作占辭以為筮得此卦六爻皆不變或一卦内有三爻變皆用彖辭占若得此卦其事大亨而利在貞正耳孔子却自作四徳解又其間多說卦變此卦自某卦來說卦變凡二十卦訟秦否隨蠱噬嗑賁无妄大畜咸恒晉睽家人解升鼎漸渙節皆孔子所自𤼵其意者也文王間亦有取卦變處孔子自取尤多象上𫝊第三上經三十卦大小象象下𫝊第四下經三十四卦大小象象有大象說一卦兩體之象一卦如乾是一卦兩體如乾有乾上乾下是也乾卦大象曰天行健君子以自彊不息之類此是孔子所自取六十四卦大象如乾則統象於天坤則統象於地象屯以雲雷象蒙以山泉先聖文王周公所未甞有也漢上朱氏曰史墨對趙簡子曰在易卦雷乘乾曰大壯觀此則雷在天上大壯之類有卦則有此象矣如曰君子以非禮勿履則孔子所繫之大象也愚謂漢上說非是如雷如天等象往徃古或有之却未甞有人将作大象如此齊整若謂有卦則有此象固是如此但雷在天上大壯一句之類既非文王又非周公將屬之誰作乎且孔子小象必自為卷大象首句既非我作何故襲而取之乎必不然也史墨三字但與易象意似而文又不同使執此盡疑夫子大象最為學者之通患愚恐後進不能无惑故不可不辨或曰象述伏羲彖述文王而象在彖後者孔穎達謂象是孔子所述其肯先文王乎此論得矣看來六十四卦大象與卦彖爻義全不相蒙又别是說一道理自是孔子解說伏羲一卦兩體又不蹈文王周公之義也只合自作一處為是所有小象乃逐爻解周公三百八十四爻之辭如乾初九爻下象曰潛龍勿用陽在下也之類是也漢上曰仲尼繫三百八十四爻之象文皆中律是謂少而法多而類世罕知者故陸氏作𫝊諧音以𤼵其繫體繫辭上𫝊第五天尊地卑以下繫辭下𫝊第六八卦成列以下易始有卦爻文王繫卦辭周公繫爻辭正是繫辭而孔子所作繫辭乃是繫辭之𫝊也故繫辭𫝊中言聖人繫辭者六曰聖人設卦觀象繫辭焉而明吉凶曰聖人有以見天下之動繫辭焉以斷其吉凶兩出曰繫辭焉所以告也曰繫辭焉以盡其言曰繫辭焉而命之皆指文王周公卦爻辭言也若繫辭上下𫝊則是孔子統論一經之卦爻大體凡例如論先聖作易之由則見於包羲氏仰觀俯察及易有太極及河圖洛書數章如論用易之法則見於大衍之數五十章與夫卦爻之剛柔象數之變化三極之道幽明之故鬼神之情狀皆搜抉无隱若徒有上下經而无繫辭𫝊則象數之學不明理義之微莫顯易亦竟无以致用於萬世而適乎仁義中正之歸矣其可哉繫辭有稱大𫝊者因太史公引天下同歸而殊途一致而百慮為易大𫝊太史公受易於楊何何之屬又著易𫝊行世曰大𫝊者别楊何之徒所為𫝊耳向來科場中遇出繫辭題目於冐子後入官題處多稱大𫝊曰云云蓋本諸此今久不復見此矣吁繫辭中有稱子曰者文公本義謂疑皆後人所加也文言𫝊第七乾坤二卦文言為諸卦之例文飾其辭以言之𤼵明義理為多歐公曰文言夫子自作不應自稱子曰恐非夫子文言之全篇漢之易師擇取眞文以解卦體至有所不取則文斷不屬故以子曰起之也其先何謂而後言子曰者乃講師自為問答之言說卦𫝊第八説卦首論聖人生蓍立卦次及伏羲文王卦位不同次論八卦之象甚備其象多是夫子所自取不盡同於先聖漢儒以來千五百餘年未能勘破此義以為夫子只是櫽括前聖所取之象求之於經又不合是以言象多牽合傅㑹而不得其說愚甞謂數聖取象各有不同故說卦言象求之於經不盡合葢夫子自取之象為多不必盡同於先聖若分文王周孔之易各自求之坦然明白矣此說似足以祛古今之惑詳見本義後圖象說漢上云秦漢之際易亡說卦孝宣時河内女子𤼵老屋得說卦至後漢荀爽集解又得八卦逸象三十有一東萊呂氏家塾論云隋經籍志序云秦後惟失說卦三篇後河内女子得之今韓康伯説卦乃止一篇而别出序雜愚謂隋志疑是葢費直所𫝊不及說卦以後而所謂三篇恐并序雜言也序卦𫝊第九論文王序次六十四卦之義雜卦𫝊第十雜卦乃夫子雜論六十四卦之義而有无限㫖趣馮氏去非曰雜卦以兩兩相對為義取序卦而雜之然自乾坤三十卦而至咸恒以應上篇之卦自咸恒而下三十四卦以應下篇之卦葢有不雜者存愚謂自乾坤而下三十卦雜下經十二卦於其間自咸恒而下三十四卦亦雜上經十二卦於其間亦雜卦之義也但其所以然之理必有至妙者存此姑見其粗也乾坤咸恒比師渙節臨觀解蹇屯蒙睽家人震下艮下否上泰上損下益下大壯遯大畜无妄大有上同人上萃下升下革鼎謙豫小過中孚噬嗑賁豐旅兊下巽下離上坎上隨蠱小畜上履上剥復需上訟上晉下明夷下大過上頤上井下困下既濟未濟歸妹漸姤夬右夫子十翼皆名之曰𫝊然由夫子視前聖則二篇為經十翼為𫝊吳仁傑曰或者謂聖人之書不當捨經稱𫝊案易音義云經者常也法也𫝊以𫝊述為義經之為言以其可為萬世之常法𫝊則述前人之作如是而已非必尊經而卑𫝊十翼之文述而不作其體𫝊也其言經也豈害其為聖人之書乎況史稱孔子讀易而為之𫝊則𫝊也者孔子之所自名非後人名之也由孔子而來至於千萬世卦爻十翼通稱之曰易經也周易啓蒙翼𫝊上篇
