九二我有好爵吾與爾靡之坤六四括囊无咎无譽筮此冝隱蠱上九不事王侯高尚其事筮此冝隱君子筮與小人勝負卦泰小徃大來吉亨否不利君子貞大往小來同人利君子貞謙亨君子有終剥不利君子之占遯君子以遯而亨之占夬君子去小人之占爻否九四有命无咎疇離祉衆君子吉占觀初六小人无咎君子吝觀九五觀我生君子无咎觀上九觀其生君子无咎剥上九君子得輿小人剥廬遯九四好遯君子吉小人否明夷初九君子于行三日不食明夷六五箕子之明夷利貞睽初九見惡人无咎解六五君子維有解吉有孚于小人夬九三君子獨行遇雨若濡有愠无咎革上六君子豹變小人革靣未濟六五君子之光有孚吉出行卦坤君子有攸徃先迷後得主利西南得朋東北喪朋安貞吉屯勿用有攸徃賁亨小利有攸徃剥不利有攸徃復亨出入无疾反復其道七日來復利有攸徃无妄不利有攸徃大過利有攸徃坎有孚維心亨行有尚恒亨无咎利貞利有攸徃蹇利西南不利東北解利西南有攸往夙吉損有孚元吉无咎可貞利有攸往益利有攸往夬利有攸往萃亨利有攸往升南征吉巽小亨利有攸徃爻屯六四徃吉无不利蒙初六以徃吝小畜上九君子征凶履初九素履徃无咎泰初九以其彚征吉隨六三利居貞賁初九舎車而徒復初九不逺復復六四中行獨復无妄初九无妄徃吉无妄六二則利有攸徃无妄六三行人之得无妄上九无妄行有眚无攸利大畜初九有厲利已大畜九三利有攸徃大畜上九何天之衢亨頤六二征凶咸六二咸其腓凶居吉咸九三咸其股執其隨徃吝遯初六勿用有攸徃大壯初九壯于趾征凶晉六五徃吉无不利明夷初九有攸徃主人有言明夷六二用拯馬壯吉筮避患吉明夷六四于出門庭睽六四徃何咎睽上九徃遇雨則吉蹇初六徃蹇三四上同損初九遄徃无咎損六三三人行則損一人損上九利有攸徃夬初九徃不勝為咎夬九四臀无膚其行次且夬九五中行无咎姤初六有攸徃見凶姤九三其行次且厲无大咎萃初六徃无咎萃六三往无咎小吝困九二征凶困上六征吉革六二征吉无咎革九三征凶貞厲革上六征凶居貞吉鼎九三其行塞震六三震行无眚震九四震遂泥震六四震徃來厲震上六征凶艮初六艮其趾艮六二艮其腓艮六四艮其身漸九三夫征不復歸妹初九征吉豐初九徃有尚豐六二徃得疑疾巽初六進退渙初六用拯馬壯吉筮濟渙節初九不出户庭无咎節九二不出門庭凶節九五徃有尚小過九四徃厲必戒勿用永貞未濟六三征凶舟車卦需有孚利涉大川訟窒惕不利涉大川同人于野亨利涉大川蠱元亨利渉大川大畜利渉大川益利渉大川渙利渉大川利貞中孚利涉大川利貞爻謙初六用涉大川吉頤六五不可涉大川頤上九利涉大川未濟征凶利渉大川大有九二大車以載小畜九三輿說輹大畜九二輿說輹大壯九四壯于大輿之輹困九四困于金車吝既濟初九曳其輪无咎未濟九二曳其輪貞吉旅卦旅小亨旅貞吉爻旅初六旅瑣瑣斯其所取災旅六二旅即次懷其資得童僕貞旅九三旅焚其次喪其童僕貞厲旅九四旅于處得其資斧我心不快旅上九旅人先笑後號咷喪牛于易凶酒食卦頤貞吉自求口實大畜不家食吉爻需九五需于酒食貞吉噬嗑六三噬腊肉遇毒小吝无咎噬嗑九四筮乾胏得金矢利艱貞吉噬嗑六五噬乾肉得黄金貞厲无咎困九二困于酒食鼎九三雉膏不食疾爻豫六五貞疾恒不死无妄九五无妄之疾勿藥有喜遯九三有疾厲損六四損其疾使遄有喜无咎鼎九二我仇有疾不我能即吉豐六二往得疑疾有孚𤼵若吉兊九四商兊未寧介疾有喜祭祀卦觀盥而不薦有孚顒若損有孚曷之用二簋可用享爻萃六二孚乃利用禴升九二孚乃利用禴无咎困九二利用享祀困九五利用祭祀既濟九五東鄰殺牛不如西鄰之禴祭實受其福禱雨卦小畜亨密雲不兩自我西郊爻小畜上九既雨既處睽上九徃遇雨則吉鼎九三方雨虧悔終吉小過九五密雲不雨自我西郊寇爻蒙上九不利為宼利禦宼需九三需于泥致寇至解六三負且乗致寇至漸九三利禦寇畜卦坤元亨利牝馬之貞晉錫馬蕃庻離畜牝牛吉爻屯六二乗馬班如四上同賁六四白馬翰如大畜九三良馬逐明夷六二用拯馬壯吉渙初六同睽初九喪馬勿逐自復中孚六四馬匹亡无咎无妄六三或繋牛行人得邑人災大畜六四童牛之梏元吉遯六二執之用黄牛之革睽六三其牛掣革初九鞏用黄牛之革旅上九旅人先笑後號咷喪牛于易大壯九三羝羊觸藩羸其角大壯六五喪羊于易大壯上六羝羊觸藩不能退不能遂夬九四牽羊悔亡歸妹上六士刲羊无血大畜六五豶豕之牙吉睽上九見豕負塗姤初六羸豕孚躑躅卜筮合象占為一說案朱子語録吳必大問何以得爻辭與所占之事相應曰自有此道理如今抽籖者亦多與占意相契若爻辭與占意相契即用爻辭斷如屯利建侯屯只是卦何如去利建侯乃是占得此卦者之利晉文公曽占得此卦屯豫皆有此辭果能得國萬一占病却得利建侯又須卦爻上别討義愚謂晉文公之占可謂辭與占意相應然左傳占法亦多有只用卦爻而不用其辭者故朱子有别討義之說也而鄱陽汪深所性先人私淑之友也嘗作占例自為之序曰昔者聖人用易以明民托之卜筮然所得之辭或有懸隔者如問婚而得田獵問祭祀而得涉川問此答彼闊然不相對豈有遷就迂誕而用之者哉若是則卦爻之辭皆贅言矣傳曰其言曲而中其事肆而隱因貳以濟民行以明得失之報又曰明於天之道而察於民之故是興神物以前民用又曰探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜故繋辭焉所以告也定之以吉凶所以斷也今占筮所得之辭乃不應合而在於遷就用之則奈何哉盖嘗思之易以卜筮設教古人之卜筮盖少也非有大事不疑不卜也其見於書者虞有傳禪之筮周有征伐之卜而已故洪範曰汝則有大疑謀及乃心謀及卿士謀及庻人謀及卜筮而從逆之間人謀先之卜筮次焉盖誠以事有兩可之疑而後托之卜筮也而其占又必誠敬專一積其求決之眞情至誠以達于神明故神明感應之誠亦正告之以利害趨向而不浪漫也且易之初其以六十四卦示人以占之例亦已廣矣求君父之道於乾求臣子之道於坤㛰姻於咸恒漸歸妹待於需進於晉行師於師爭訟於訟聚於萃散於渙以至退於遯守於困安於泰鼎厄於夷蹇盈於豐大有壞於損蠱家人之在室旅之在塗既未濟損益大小過大小畜得失進退之義雖卦名之為七十九字文義明白條例具足亦可決矣此未有文王卜辭之前已可占而斷者況又三百八十四爻而示之以變乎夫人誠有大疑謀及卜筮必積其誠意備其禮物齊戒專一以占之大傳曰是以將有為也將有行也問焉而以言其受命也如響无有逺近幽深遂知來物此占筮必得應合之辭受命者神明受禱占者之命辭也如響者應之端的而不漫浪以告也儻有一毫不敬不誠不一之心則問此而告彼闊焉不與事相酬答實神明之所不主而不告者也又何受命如響之云曷不即卦辭考之文王於䝉嘗起其占筮之教矣其言曰匪我求童䝉童蒙求我初筮告再三瀆瀆則不告利貞周子曰筮者扣神也再三瀆瀆則不告矣此文王之所以起其例也夫占而揲蓍積十有八變必成一卦卦必有卦辭爻必有爻辭何以言其告不告也盖誠意專一而筮則神之告之卦辭爻辭應合所問如占㛰姻與之咸恒曰納婦吉曰勿用取女曰歸妹征凶无攸利占征伐曰利用侵伐曰在師中吉曰不利行師曰勿用師占田獵曰田獲三狐曰田獲三品曰即鹿无虞曰田无禽若此者皆所謂告也若夫卦辭爻辭不應所占之事此則誠意不至二三之瀆而所謂不告者也此即文王之所謂不告也不然則得卦爻必有辭以告之又何以有不告之云夫誠敬不至則吾心之神明不存而神明之神亦爽得不合之辭而猶曰神明之告我也必有他意揣摩臆度遷就曲推彊取以定吉凶以至狂妄僥倖悖亂之念皆自此生者古有之矣是惑之甚也況世之占者忽略滅裂䙝瀆瑣細不敬尤甚乃欲以此求神明之指其所之至於不驗又妄以為卜筮之理不可信彼豈知夫告不告之道哉余之有見乎此也乃取卦爻辭以人事分門别例編為一書俾世之占者以類求之必本乎誠敬專一之道而知占之不妄以告人也豈不有以解千古之惑而𤼵聖人之藴乎羲文周孔在天之靈不易吾言矣愚謂此論眞足以𤼵朱子之所未𤼵而且有以得文王告不告之㫖故詳識之若夫超於言辭之表而參以卦爻之象斯亦占法之所不可省云筮法集左氏傳注皆杜預本注陳宣公筮公子完之生觀否一爻變莊公二十二年陳人殺其太子禦宼宣公殺其太子陳公子完奔齊完御宼黨齊侯桓公使敬仲完字為卿辭使為工正掌百工官初懿氏小妻敬仲懿氏陳大夫其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘猶夫婦相隨適齊有媯之後媯陳姓將育于姜齊姓五世其昌並于正卿八世之後莫之與京陳厲公蔡出也姊妹之子曰出故蔡人殺五父而立之五父陳佗生敬仲其少也周史周太史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王四為諸侯變乾有國朝王之象艮為門庭乾為金玉坤為布帛諸侯朝王陳贄帛之象旅陳也百物言備猶有觀焉故曰其在後乎因觀文以博占故曰猶有觀非在己之言故知在子孫風行而著於土故曰其在異國乎若在異國必姜姓也姜太嶽之後也姜姓之先為堯四嶽山嶽則配天物莫能兩大陳衰此其昌乎變而象艮固知當興於大嶽之後及陳之初亡也昭八年楚滅陳陳桓子始大於齊桓子敬仲五世孫陳无宇其後亡也哀十七年楚復滅陳成子得政成子陳恒也敬仲八世孫卜筮者聖人所以定猶豫决疑似因生義教者也書洪範通龜筮以同卿士之教南蒯卜亂而遇元吉惠伯荅以忠信則可臧㑹卜僭遂獲其應丘明故舉諸縣應於行事者以示來世而君子志其善者逺者他皆放此注中愚謂則一挂増解下同愚謂貞觀全體夾畫艮三至五互體亦艮今必曰風為天於土上為山以天光照山之材故曰觀國之光又曰庭實玉帛具天地之羙故曰利用賔于王如此則是觀因變否有乾天之光有艮山之材有坤地之土又具乾天坤地之羙為贄而後成觀六四一爻之辭何其繆也扭合傅㑹本不足法特以其去經最近取互體甚明說象无滯碍為有補焉耳看來左氏所載占辭決非盡當時史氏之筆要皆左氏引而自文以故扭合傅㑹處尤多畢萬筮仕於晉屯比一爻變閔公元年晉侯獻公作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右為公御右也夙趙衰兄畢萬魏犫祖父以滅耿滅霍滅魏三國皆姬姓還賜畢萬魏以為大夫卜偃晉掌卜大夫曰畢萬之後必大萬盈数也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖晉大夫占之曰吉屯固比入吉孰大焉其必蕃昌屯險難所以為堅固比親密所以得入震為土變坤車從馬震車坤馬足居之震兄長之震長男母覆之坤衆歸之坤為衆六體不易一爻變六義合而能固安而能殺公侯之卦也比合屯固坤安震殺故曰公侯之卦公侯之子孫必復其始萬畢公高之後傳為魏之子孫衆多張本愚案朱子啓䝉謂一爻變則以本卦變爻辭占其下亦引畢萬所筮以今觀之未嘗不取之卦且不特論一爻兼取貞悔卦體似可為占者法也他放此魯桓公筮成季子將生大有乾一爻變閔公二年秋八月共仲使卜齮賊公于武闈宫中小門愚案共仲公子慶父通夫人哀姜故弑閔公成季以僖公適邾共仲奔莒乃入立之愚謂成季以僖公入立之成季之將生也桓公使卜楚丘魯掌卜大夫之父卜之曰男也其名曰友在公之右在右言用事間于兩社周社亳社兩社之間朝廷執政所在為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所乾為君父離變乾見敬與君同及生有文在手曰友遂以命之秦伯伐晉卜徒父筮之吉蠱六爻不變僖公九年齊師㑹秦師納晉惠公愚案晉獻公因驪姬之難太子申生死公子重耳夷吾出奔九年獻公卒秦穆公納夷吾是為惠公十五年初晉侯之入也許賂秦伯以河外列城五既而不與晉饑秦輸之粟十三年秦饑晉閉之糴十四年故秦伯伐晉卜徒父筮之吉徒父秦掌龜卜者卜人用筮據所見雜言之涉河侯車敗詰之秦軍涉河晉侯車敗秦伯不解謂敗在已故詰對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也於易利涉大川亦秦勝晉之卦今所言盖卜筮書雜辭以狐為君其義欲以諭晉君其象則未聞蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也秋風落木實則材為人取實落材亡不敗何待三敗及韓晉軍三敗壬戌戰于韓原九月十三秦伯獲晉侯以歸穆姬晉獻公女為秦穆公夫人曰晉君朝以入則婢子夕以死夕以入則朝以死惟君裁之乃舎諸靈臺許晉侯平愚案朱子啓䝉六爻不變則占本卦彖辭而以内卦為貞外卦為悔今雖不及彖辭而以貞悔分彼我亦可以見占法矣晉獻公筮嫁伯姬於秦歸妹睽一爻變僖公十五年初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘓晉卜筮史占之曰不吉其繇曰士刲羊亦无􅎺也女承筐亦无貺也上六爻辭􅎺血貺賜上六无應所求不獲故下刲无血上承无實西鄰責言不可償也嫁女遇不吉之卦故知有責讓之言不可報償愚謂西鄰責言兊象秦在西為晉之鄰震變故不償其言歸妹之睽猶无相也无相助愚謂睽故无相助震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗于宗丘丘猶邑上六爻在震則无應故車說輹在離則失位故火焚旗言失車火之用也故不利行師敗不出國近在宗邑愚謂震變離為兊澤所勝兊西方故有嬴敗姬之象歸妹睽孤宼張之弧睽上爻之辭姪其從姑震木離火火從木生離為震妹於火為姑謂我姪者我謂之姑謂子圉質秦六年其逋逃歸其國而棄其家家謂子圉婦懷嬴明年其死於高梁之虚惠公死之明年文公入殺懷公于高梁高梁晉地凡筮者用周易則其象可推非此而徃則臨時占者或取於象或取於氣或取於時日王相以成其占𫝊㑹以爻象則構虚而不經故畧言其歸趣及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗徳及可數乎史蘇是占勿從何益愚案僖公九年九月晉獻公卒公子夷吾許秦穆公重賂穆公納之十一月是為惠公十年不與秦賂十一年晉荐饑乞糴于秦秦輸之粟十四年秦饑乞糴于晉晉閉之糴十五年九月秦伯伐晉獲晉侯十一月歸晉侯十六年晉太子圉質秦秦妻之質秦應占言姪其從姑妻之即懷嬴二十二年子圉逃歸晉應占言逃歸其國而棄其家二十三年九月惠公卒子圉立是為懷公二十四年九月秦穆公納公子重耳是為晉文公二月壬寅入晉師懷公奔高梁戊申文公使殺懷公于高梁應占言死高梁之虚史蘇之占一何神也使晉侯踐言報施秦師不興占其能應乎然史蘇謂嫁伯姬不吉今乃以伯姬說身逃難惠公猶曰先君若從史蘇之占吾不及此不自反而咎先君誤矣夫晉文公筮勤王大有睽一爻變僖公二十四年冬甘昭公通於隗氏王替隗氏秋頽叔桃子奉太叔以狄師伐周王出適鄭處于汜愚案初襄王以狄師伐鄭王徳狄以狄女隗氏為后甘昭公王弟子帶也食邑於甘河南縣西南有甘水通於隗氏王廢后初王使大夫頽叔桃子以狄伐鄭至是二大夫曰狄其怨我遂奉太叔即子帶以狄伐周王適鄭汜在鄭南襄城縣太叔以隗氏居於温二十五年春正月丙午秦伯師於河上將納王狐偃言於晉侯曰文公求諸侯莫如勤王使卜偃卜之曰吉遇黄帝戰於版泉之兆公曰吾不堪也筮之筮之遇大有之睽曰吉遇公用亨於天子之卦三爻戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎乾變兊以當離日之在天垂照在澤天子在上說心在下是降心逆公之象大有去睽而復亦其義也言去睽卦還論大有亦有天子降尊之象乾尊離卑降尊下卑亦其義也晉侯辭秦師而下三月甲辰次于陽樊右師圍温左師逆王四月丁巳王入于王城取太叔于温殺之于隰城戊午晉侯朝王王享醴命之宥既行享禮而設醴酒又加之幣帛以助歡也宥助也王子伯廖引易論鄭公子豐離一爻變宣公六年鄭公子曼滿與王子伯廖語欲為卿二子鄭大夫伯廖告人曰無徳而貪其在周易豐之離豐上六變純離易尚變故雖不筮必以變言其義上六曰豐其屋蔀其家闚其户閴其无人三歲不覿凶義取无徳而大其屋不過三歲必滅亡弗過之矣不過三年間一年鄭人殺之愚謂言不可不慎也心一動於欲而形於言見吉凶焉豈伯廖舉豐上六之辭竒中哉易之變固已前知之矣觀此類其殆所謂易有聖人之道四焉其一曰以動者尚其變之謂乎夫所謂動不特謂我欲動而見諸行事也見人之善惡是非忽動其心而必尚易之變以論之亦是也吁易其神矣乎人心之靈其神矣乎晉知莊子引易論先縠之敗師臨一爻變宣公十二年春楚子莊王圍鄭前年盟辰陵而又徼事晉故克之入自皇門至於逵路塗方九軌曰逵鄭伯肉袒牽羊以逆王曰其君能下人必能信用其民矣退三十里許之平夏六月乙卯晉荀林父救鄭先縠彘季佐之及河聞鄭既及楚平桓子林父欲還彘子不可以中軍佐濟佐彘子師渡河知莊子曰荀首林父弟時為下軍大夫此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否彘子逆命不順成故應不臧之凶衆散為弱坎為衆變兊兊柔弱川壅為澤坎變兊有律以如已也如從也法行則人從法法敗則法從人坎為法象今為衆則散為川則壅是失法之用從人之象故曰律否臧則律竭也竭敗變坎為兊是法敗盈而以竭夭且不整所以凶也水遇夭塞不得整流則竭涸也不行之謂臨澤不行之物有帥而不從臨孰甚焉此之謂矣譬彘子違命不可行果遇必敗遇敵彘子尸之主此祸雖免而歸必有大咎愚案以上左傳文林父帥師及楚子戰于邲鄭地晉師敗績愚引經文一句足其義傳云丙辰楚重至于邲重輜重則戰在乙夘日明年秋赤狄伐晉及清先縠召之也邲戰不得志故召狄欲為變冬晉人討邲之敗與清之師歸罪先縠而殺之遂滅其族愚謂行不可不愼也心一動而差其所行凶悔吝已隨之況兵凶器戰危事乎救鄭之師晉人所不得已也鄭既及楚平桓子欲還當矣彘子乃不可已昧師左次之訓乖長子帥師之義犯弟子輿尸之戒又況師之臨失律否臧凶又有如知莊子之所云者乎其喪師亡身滅宗固其冝矣嗚呼以動者尚其變知莊子引易其殆所謂不假卜筮而知吉凶者歟讀易者試思之晉厲公筮擊楚子復六爻不變成公十六年春楚子共王以汝隂之田求成于鄭鄭成公汝水之南近鄭地鄭叛晉從楚子盟于武城夏四月晉侯厲公將伐鄭師起楚子救鄭五月晉楚遇於鄢陵鄭地苗賁皇賁皇楚國叔子宣四年奔晉言於晉侯曰楚之良在其中軍王族而已請分良以撃其左右而三軍萃於王卒必大敗之公筮之史曰吉其卦遇復曰南國䠞射其元王中厥目此卜者辭也復陽長之卦陽氣起子南行推隂故曰南國䠞也南國勢䠞則離受其咎離為諸侯又為目陽氣激而飛矢之象故曰射其元王中厥目國䠞王傷不敗何待公從之吕錡夢射月中之吕錡魏錡退入於泥占之曰姬姓日也異姓月也必楚王也退入於泥亦必死矣及戰射共王中目王召飬由基與之兩矢使射吕錡中項伏弢弓衣以一矢復命楚子宵遁晉入楚軍三日榖食楚粟三日愚謂此卦占辭與卦象絶不類注終未的確意者震坤拱巽離在中間楚正南國今有東方震西南角坤而无巽離西南共坤各得坤一半坤為國豈非南國䠞乎巽為白眼離為目无離无巽豈非喪目乎震為蒼筤竹豈非矢乎若只就兩體占貞我悔彼初九元吉上六迷復凶有災眚用行師終有大敗以其國君凶坤西南即南國也震木克坤土射之義也國君即元王也有災眚眚為目疾即中厥目之象也亦可以旁通矣魯穆姜筮徃東宫艮隨五爻變襄公九年穆姜薨於東宫太子宫穆姜淫僑如欲廢成公故徙東宫愚案姜成公母始徃筮之遇艮之八周禮太卜掌三易雜用連山歸藏二易皆以七八占故言遇艮之八愚案成公十六年穆姜徃東宫筮之史曰是謂艮之隨史疑古易遇八卦不利故更以周易占變爻得隨卦而論之隨其出也史謂隨非閉固之卦君必速出姜曰亡是於周易曰隨元亨利貞无咎易筮皆以變者占遇一爻變義異則論彖故姜亦以彖占也史據周易故指言周易折之元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎言不誣四徳乃遇隨无咎今我婦人而與於亂固在下位卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣淫之别名不可謂貞有四徳者隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死於此弗得出矣愚嘗謂棄位而姣等語正姜氏所諱豈肯自播其惡况其言曰是於周易曰隨元亨利貞无咎而繼之以元體之長云云則夏商所未嘗道可見此愚所以為左氏本文言語作為穆姜之言明矣一時不暇詳審徑以夫子之言為穆姜之言後之人反以為夫子引穆姜之言也詳見本義後疑文言辨姑陳其㮣於此案漢上叢説云左成公十六年穆姜徃東宫筮之襄公二十六年孔子生上距穆姜二十四年穆姜時雖已誦乾卦文言然其言與今稍異以今易考之刪改者二増益者六則古有是言孔子文之為信然矣此即本義説備參詣鄭太叔引易論楚子復頤一爻變襄公二十二年鄭伯使游吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉問鄭君應來否而以告子太叔吉歸復命告子展曰楚子將死矣不修其徳政而貪昧於諸侯以逞其願欲乆得乎周易有之在復之頤曰迷復凶其楚子之謂乎欲復其願欲鄭伯而棄其本不修徳復歸无所是謂迷復能无凶乎君其徃也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣十二年楚子昭卒崔武子筮娶齊棠公妻困大過一爻變襄公二十五年春齊棠公齊棠邑大夫之妻東郭偃之妹也東郭偃臣崔武子棠公死偃御武子以弔見棠姜而美之使偃取之偃曰男女辨姓今君出自丁齊丁公崔杼祖臣出自桓不可齊桓公偃之祖同姜姓不可昬武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風坎中男曰夫變巽曰從風風隕妻不可娶也風隕物者變而隕故妻不可娶且其繇曰困於石據於蒺藜入于其宫不見其妻凶困六三爻辭困于石徃不濟也坎水險石不可動據于蒺藜所恃傷也坎險兊之生物而險者蒺藜卦之則傷入于宫不見其妻凶无所歸也卜昬遇困六三失位无應則喪其妻失其所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉夏五月弑莊公立景公相之慶封相左景公杵臼靈公嬖人子莊公異母弟慶封崔黨二十七年初崔杼生成及彊而寡偏喪曰寡侍也娶東郭姜生明姜以孤入曰棠无咎棠公子與東郭偃相崔氏成疾廢立明崔成崔彊殺東郭偃棠无咎崔杼怒見慶封慶封使盧嫳嫳慶封屬大夫滅崔氏殺成與彊而盡俘其家其妻縊東郭姜嫳復命崔子且御而歸之為崔子御至則无歸矣乃縊終入于其宫不見其妻凶崔明夜辟諸大墓開先人冢藏也愚謂崔杼以一婦人之故弑其君滅其家殺其妻而喪其身貪色違筮之禍酷烈如此悲夫秦醫和引易對晉趙孟蠱六爻不變晉侯平公求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱在周易女惑男風落山謂之蠱少男恱長女非匹故惑山木得風則落皆同物也趙孟曰良醫也厚其禮而歸之魯莊公筮叔孫穆子之生明夷謙一爻變昭公四年初穆子去叔孫氏及庚宗遇婦人私使為食而宿焉成十六年避僑如之難奔齊庚宗魯地適齊娶於國氏齊正卿姜姓生孟丙仲壬夢天壓已弗勝顧而見人深目豭喙號之曰牛助予乃勝之旦而召其徒无之且曰志之及魯人召之歸既立魯立為卿庚宗婦人獻雉問其姓問有子否對曰余子長矣能奉雉矣襄二年竪牛五六嵗召見則所夢也號曰牛使為竪小臣𫝊言有寵長使為政公孫明知叔孫於齊公孫明齊大夫子明與叔孫相親知歸未逆國姜子明取之故怒其子長而後逆之牛譖而殺孟又譖而逐伸穆子疾病牛寘饋弗進叔孫不食卒三日絶糧牛立昭子相之昭子豹庶子叔孫婼也初穆子之生也莊叔穆子父得臣筮之遇明夷之謙以示卜楚丘卜人姓名曰是將行出奔而歸為子祀以讒人入其名曰牛卒以餒死明夷日也離日夷傷日明傷日之數十甲至癸故有十時亦當十位自王以下其二為公其三為卿日中當王食時當公平旦為卿雞鳴為士人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺隅中日出闕不在等尊王公曠其位日上其中王食日為二公旦日為三卿明夷之謙明而未融其當旦乎故曰為子祀莊叔卿也卜豹為卿故知為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食日在三又非食時故三日不食離火也艮山也離為火火焚山山敗於人為言艮為言愚謂无所本敗言為讒為離焚故言敗故曰有攸徃主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名為牛離焚山則離勝譬世亂則讒勝山焚則離獨存故知名牛竪牛非牡牛故不吉謙不足謙退飛不翔不逺翔垂不峻翼不廣故曰其為子後乎不逺翔故知不逺大吾子亞卿也抑少不終旦日正卿莊叔父子世為亞卿位不足以終盡卦體盖引而致之昭子即位朝其家衆曰牛禍叔孫氏殺適立庶罪莫大焉必速殺之牛懼奔齊孟仲之子殺之塞闗之外投其首於寧風齊地之棘上仲尼曰叔孫昭子之不勞不可能也不以立已為功勞周任有言曰為政者不賞私勞不代私怨詩云有覺徳行四國順之愚謂此卦占辭亦多傅㑹又必兼之卦以論本卦爻辭亦如前失衞孔成子筮立君屯屯比上不變下一爻變昭公七年衞襄公夫人姜氏无子宣姜嬖人婤姶生孟縶孔成子夢康叔謂已立元成子衞卿烝鉏也夢時元未生余使羈之孫圉與史茍相之羈烝鉏子茍史朝子史朝亦夢康叔謂已余將命而子茍與孔烝鉏之曽孫圉相元史朝見成子告之夢夢恊婤姶生子名之曰元在二年孟縶之足不良能行孔成子以周易筮之曰元尚享衛國主其社稷命蓍之辭遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝朝曰元亨又何疑焉屯元亨成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云謂再得屯子其建之康叔命之二卦告之筮襲於夢武王所用也太誓朕夢恊朕卜襲于休祥武王辭弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎故孔成子立靈公魯南蒯筮以費叛坤比一爻變昭公十二年季平子立不禮於南蒯蒯南遺之子季氏費邑宰南蒯欲出季氏使子仲公子憗更其位不克以費叛如齊南蒯之將叛也枚筮之遇坤之比曰黄裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外彊内温坎險故彊坤順故温忠也和以率貞水和土安貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色言非黄下不共不得其飾事不善不得其極失中徳外内倡和為忠率事以信為共供養三徳為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黄上美為元下美則裳參成可筮猶有闕也筮雖吉未也十三年費人叛南氏十四年司徒老祁慮癸二人南蒯家臣遂劫南蒯曰羣臣不忘其君季氏將不能畏子矣子何所不逞欲請送子南蒯遂奔齊司徒老祁慮癸來歸費歸魯愚案朱文公嘗謂易中都是正吉不曽有不正吉都是利正不曽説利不正又曰大率易為君子設非小人盜賊所得竊取而用又曰易中言占者有其徳則其占如是吉无其徳而得是占者却是反説如南蒯得黄裳元吉之占是也且載其事於坤六五爻而曰此可以見占法矣學者宜有見於斯晉蔡墨引易對魏獻子五卦一爻變一卦六爻變乾乾乾乾乾夬姤同人大有夬坤剥昭公二十九年秋龍見於絳郊晉國都魏獻子問於蔡墨墨晉大夫曰吾聞之矣蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏昔有飂叔安飂國叔安君名有裔子曰董父擾順也畜龍以事舜帝賜之姓曰董氏曰豢龍官名其後又有劉累學擾龍於豢龍氏以事夏孔甲賜氏曰御龍龍一雌死醢以食夏后既而使求求致龍懼而遷於魯縣龍水物也水官棄矣故龍不生得不然周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍无首吉坤之剥曰龍戰于野若不朝夕見誰能物之愚案杜氏注曰今説易者皆以龍喻陽氣如史墨之言則為皆是真龍愚謂乾六爻皆陽且變動不居故以為六龍之象最為的當豈得為皆是真龍也哉然而善易者胷次悠然與易為一居觀象翫辭動觀變翫占真見其上下无常剛柔相易是亦一真龍而已矣昩者未足與語此史墨舉易對趙簡子大壯六爻不變昭公三十二年十二月昭公薨于乾侯乾侯在魏郡斥丘縣皆境内邑愚案二十五年公伐季氏季平子請罪弗許三家遂共伐公公敗奔齊次陽州二十六年二十七年居鄆魯地二十八年次乾侯二十九年居鄆三十年三十一年三十二年在乾侯薨在外凡八年趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰扬生有兩有三有五有陪貳故天有三辰地有五行體有左右各有妃耦謂陪貳王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷无常奉君臣无常位自古以然故詩曰髙㟁為谷深谷為陵小雅三后虞夏商之姓於今為庶主所知也在易卦雷乗乾曰大壯天之道也乾為天子震為諸侯而乾在上君臣易位猶臣大强壯若天上有雷愚案昭公乾侯之事與夏王相弑商丘周厲王崩於彘皆天地間人道非常之大變也史墨乃妄引陪貳之説而謂天生季氏以貳魯侯又明言社稷君臣无常奉无常位且妄引詩易以對左氏從而書之其與春秋書公薨乾侯如青天白日不可掩蔽以誅季氏不臣之罪者異矣嗚呼春秋何等時耶功利之習壊爛人心君臣大義澌滅殆盡不惟亂臣賊子如三家者放逐其君為不知有君而惟季氏之服諸侯不知有君而惟季氏之與史墨不知有君而放言无忌趙簡子不知有君而聼言不辨左氏亦不知有君而載言不擇夫豈知陵谷遷改乃地道之變而非常雷天大壯乃天道之常初非志變况易乃崇陽抑陰之書雷在天上夫子大象但取其成四陽壯長之卦而曰君子以非禮弗履耳未必如杜氏注所謂君臣易位也史墨不求其義妄引以對可謂誣天矣天但使季氏貳君何嘗使季氏逐君哉如墨言一歸之天道則公僭王卿僭侯亂臣賊子接迹於世矣綱常安在然則春秋夫子作也易象夫子翼也道一而已請得為易大壯一洗史墨之惡論魯陽虎筮救鄭泰需一爻變哀公九年夏宋公伐鄭秋晉趙鞅卜救鄭不吉陽虎以周易筮之遇泰之需曰宋方吉不可與也宋微子後今卜得帝乙之卦故謂宋吉不可與戰微子啓帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止集國語注皆韋昭本注晉筮立成公乾否三爻變周語簡王十二年晉孫談之子周適周事單襄公談晉襄公之孫恵伯談也周談之子晉悼公名晉自獻公用驪姬讒詛不畜羣公子故周適周事單襄公襄公有疾召頃公襄公子而告之曰必善晉周將得晉國成公之歸也吾聞晉之筮也成公晉文公庶子黒臀也歸者自周歸晉也趙不弑靈公趙盾逆黒臀于周立之蓍曰之筮立成公也遇乾之否曰配而不終君三出焉乾君也故曰配配先君也不終子孫不終為君也下變坤有臣象三爻故三也上乾天子也五體不變周天子國也三爻有三變故君三出於周一既徃矣謂成公徃為君後之不知其次必此次成公而徃必周子晉仍无道而鮮胄其將失之矣仍數鮮寡胄後厲公數行无道公族後又寡少將失國也必是善晉子其當之也頃公許諾及厲公之亂謂弑召周子而立是為悼公晉公子重耳筮得國屯豫三爻變晉語秦伯穆公召公子晉重耳於楚楚子成王厚幣以送公子于秦公子親筮之曰尚有晉國命筮之辭得貞屯悔豫皆八也震在屯為貞在豫為悔八謂震兩陰爻在貞悔皆不動故曰皆八謂爻无為也筮史占之皆八不吉筮人掌三易以連山歸藏占此二卦皆言不吉愚案曰皆八便見用夏商二易閉而不通爻旡為也震動遇坎險阻則爻无所為也司空季子曰吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國告我曰利建侯得國之務也吉孰大焉震車也坎水也坤土也屯厚也豫樂也車班内外順以訓之班徧也屯内豫外皆震坤順屯豫皆有坤泉貨以資之資財屯豫皆有艮坎水在山為泉源流而不竭土厚而樂其實屯豫皆有坤故厚豫為樂不有晉國何以當之震雷也車也坎勞也水也衆也主雷與車内為主而尚水與衆車有震武車聲隆有威武衆順文也文武具厚之至也故曰屯其繇曰元亨利貞勿用有攸徃利建侯主震雷長也故曰元衆而順嘉也内有震雷故曰利貞車上水下必伯車動而上威也水動而下順也有威而衆從必伯小事不濟壅也故曰勿用有攸徃一夫之行也一夫一索男象行作足象衆順而有武威故曰利建侯復述上事坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也居樂母内出威震外居樂故利建侯出威故利行師得國之卦也十月恵公卒十二月秦伯納公子晉大夫筮公子重耳歸國泰六爻不變晉語秦伯納公子及河董因迎公於河因晉大夫辛有之後𫝊曰辛有之二子董之晉故晉有董史公問焉曰吾其濟乎對曰嵗在大梁將集天行元年始受實沈之星也在大梁謂魯僖公二十三年嵗星在大梁之次也集成也行道也言公將成天道也公以辰出晉祖唐叔所以封也而參入晉星也元年謂文公即位之年魯僖二十四年嵗在大梁在實沈之次受於大梁也自胃七度至畢十一度為大梁自畢十三度至東井十五度為實沈實沈之墟晉人所居所以興也墟次也所居居其年次所主祀也𫝊曰髙辛氏有季子曰實沈遷於大夏主祀參唐人是因成王滅唐封叔虞南有晉水子變改為晉侯故參為晉星今君當之无不濟矣當星在實沈墟君之行也嵗在大火閼伯之星也是謂大辰魯僖五年重耳奔時嵗在大火大火大辰也𫝊曰髙辛氏有子曰閼伯遷於商丘杞大火辰以成善后稷是相唐叔以封成善謂辰為農祥后稷所經緯以成善道相視也謂視農祥以成農事封者謂唐叔封時嵗在大火瞽史記曰嗣續其祖如穀之滋必有晉國臣筮之得泰之八乾下坤上泰遇泰无動爻无同侯三至五震為侯陰爻不動其數皆八故云得泰之八與貞屯悔豫皆八義同愚謂此用夏商易斷法也曰是謂天地配享小徃大來陽下陰升故曰配享小謂子圉大謂文公今及之矣何不濟之有且以辰出而參愚謂參下當有入字皆晉祥也而天之大紀也所以大紀天時濟且秉成必霸諸侯子孫賴之君无懼矣公子濟河懐公奔髙梁晉地壬寅公入於晉師甲辰秦伯還送于河而還丙午入于曲沃丁未入于絳即位于武宫戊申刺懐公于髙梁家語孔子筮得賁賁六爻不變孔子筮得賁愀然有不平之色子張進曰師聞卜者得賁卦者吉也而夫子有不平之色何也孔子對曰以其離耶在周易山下有火賁非正色之謂也夫質也黒白宜正焉今得賁非吾兆也吾聞丹漆不文白玉不雕何謂也質有餘不受飾也程舜俞筮法注云揚子雲太𤣥經礥首次二曰黄不純屈于根注易賁卦山下有火黄白色也故曰黄不純也愚謂六爻不變法宜以彖辭占而彖𫝊所謂剛柔相文觀天文以察時變觀人文以化成天下者正切夫子事也而夫子占辭乃如此此其所謂法外意衆人固不識者耶坤鑿度孔子筮得旅卦旅六爻不變易坤鑿度仲尼魯人生不知易本偶占其命得旅請益於商瞿氏曰子有聖知而无位孔子泣而曰天也命也鳯鳥不來河无圖至嗚呼天之命也歎訖而後息志停讀五十究作十翼愚案商瞿受易夫子者也夫子乃請益焉何哉至於泣无位歎息天命之不與其然豈其然乎抑鑿度乃緯書未可以為信也姑録而論之以祛惑云附抄筮法有以卦名占者有以卦字占者有以卦氣占者有以卦體卦象占者有以卦爻辭占者有以世應納甲占者不一而足今附見以備觀覽豐丘濬歩當改元宋丁未録楊繪過池陽見丘濬濬曰明年當改元以周易歩之豐卦用事必以豐字紀年果改年元豐愚謂此以卦名占者雖不筮而尚其變以歩之亦聖道以動者尚其變之義也賁宋葉助占得子洪氏夷堅宋南渡前葉助年壯无子問日者黄某筮之得賁曰今日辰居土土加賁為墳君當生子但必有悼亡之戚果生男數嵗而晁夫人卒晉葉少藴筮生子同前葉助主少藴少藴登第為淮東提刑周崇實壻嘗命一黄山人筮遇晉曰三年俊孿生二女晉卦坤離二陰也晉字兩口卦辭晝日三接三年之象也侯驗當以前程奉告少藴深惡其説己而果然遂問異時休咎曰公貴人也當徧儀清要登政府終節度使宜善自愛少藴以白父父曰三十年前有一黄氏占得汝之期不誣且謂當建節者豈比人耶試更召之真所筮者父子待之如神少藴後為尚書左丞紹興間年七十告老得觀文殿學士除崇慶軍節度使致仕二年薨竟如黄生之言愚謂前一則以卦字加日辰占此一則以卦字及卦辭占所謂建節者其亦康侯之象與泰有人筮父疾北史趙輔和𫝊有人父為刺史得書云疾是人詣館托别相知者筮遇泰筮者曰此占甚吉是人出輔和謂筮者云乾下坤則父入土矣豈得吉果凶歸妹之隨一爻變晉顧士羣筮母病郭璞洞林顧士羣母病命筮之得歸妹之隨云命盡秋節至七月遂亡歸妹女之終兊主秋至立秋日亡愚案前一則以卦體卦象占此一則以卦氣及雜卦辭占程舜俞集筮法云案六經圖下云泰天地氣交之卦也而占父者憂之父入土也歸妹男女有家之卦也而占母者患之女之終也觀此亦可見占法矣蹇東漢沛獻王筮雨東觀漢記沛獻王輔善京房易永平五年少雨上御雲臺闕自以周易占之得水山蹇卦其繇曰蟻封穴大雨將至以問輔輔曰艮下坎上蹇艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻為雨兆果如其言離之明夷二爻變宋太祖召陳摶筮宋朝類要太祖即位初年十一月甲子召陳摶問享國長短曰今年是庚申麽睡而不答太祖又問培答曰睡到五更醒方問此事回首舉杖畫地作又木字訖投杖而睡太祖命筮之得離之明夷摶變色曰陛下得國中原而得南方火盛之卦非吉兆也太祖曰卿可言之摶用杖畫灰作兩卦象太祖曰朕壽幾何竇儀在側太祖命儀為摶執帽摶取帽盖巾項拜曰萬嵗但是子年子月子日陛下終於火日之下離為火日陛下之子孫盡矣太祖愕然曰孰敢為之摶指離九三及明夷之九三曰此人為之太祖曰其人安出摶曰必在西北陛下之親也太祖又曰復若何摶曰後一百九嵗南方有妖氣入中國中國用之天下自此多事矣太祖曰宋之子孫若何曰甲午之嵗有金女者出丁酉金為妻才子孫生之其禍滋甚又六年而通於中國又六年丙午騰蛇宋其危乎明兩作乎焚如死如棄如有二君者實受其禍太祖曰然則遂亡乎摶曰宋火徳也火徳猶盛宋之子孫當有興於東北終於東南有近君者實竊其位太祖曰興於東北終於東南其人安在曰明夷之六四曰獲明夷之心于出門庭東北之位也出涕沱若興復之志也近君者雖竊其位火徳也丁已嵗其危乎太祖曰中原可復得乎曰陛下得國之初而卜得東南旺卦亦終而已矣嵗在癸巳滅我者其衰乎甲午宋徳復興有賢人扶之則可以復占如非其人雖能復之亦旋失之嵗在庚申宋之祚其衰矣自辛酉至庚申已三百年過此以徃未之或知也又指地爐中餘木曰可能復過此乎舎杖而睡解之既濟五爻變晉郭璞歲首為朝廷筮晉書郭璞𫝊璞為著作郎于時陰陽錯謬而刑獄繁興璞上疏曰臣聞春秋之義貴元慎始故分至啓閉以觀雲物所以顯天人之統存休咎之證臣不揆淺見輒依嵗首粗有所占得解之既濟案爻論思方涉春木土龍徳之時而為廢水之氣來見乗如外陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理有擁濫又去年十二月二十九日太白蝕月月者屬坎羣陰之府所以照察幽情以佐太陽者也太白金行之星而來犯之天意若曰刑理失中自壞其所以為法也臣術學庸近不綀内事卦理所及敢不盡言又去秋以來沉雨跨年雖為金家渉火之祥然亦是刑獄充溢怨歎之氣所致徃建興四年十二月中行丞相令史淳于伯刑于市而血逆流長摽伯者小人雖罪在未允何足感動靈變致若斯之怪耶明皇天所以保祐王家子愛陛下屢見災異殷勤无已陛下能側身思懼以應靈譴皇極之事不虚降不然恐將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾以益陛下旰食之勞也臣謹尋案舊經尚書有五事供禦之術京房易𫝊有消復之救所以縁咎而致愛因異而邁政故木不生庭太戊无以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招患此自然之法應不可不察也案解卦繇曰君子以赦過宥罪既濟卦繇曰君子以思患而豫防之臣愚以為宜𤼵哀矜之詔引在予之責蕩滌瑕釁賛陽布恵使幽斃之人應蒼天以恱育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也疏奏優詔報之愚謂此以卦象占要之郭璞特假卜筮以儢其拳拳忠君愛國之懐抱正嚴君平與人子言依於孝與人臣言依於忠之微意也論卜筮者又不可不察乾之同人一爻變回紇筮出師唐書回紇將朝京師筮遇乾之同人卜者曰此行當見一大人後果見郭子儀而還愚謂此以九二爻辭占朱文公本義引此云回紇謂郭子儀曰卜者言此行當見一大人而還其占盖與此合若子儀者雖未及乎夫子之所論然其至公无我亦可謂當時之大人矣乾之大有一爻變北齊神武筮室中无火而有光北史北齊神武室中无火而有光筮遇乾之大有占者曰吉易稱飛龍在天大人造也貴不可言愚謂此以九五爻辭及文言辭占睽段晦筮馬逸五代史唐藁城鎮將段晦曽夜泊郵亭有馬斷鞅而逸數曰不知所適使使詣筮者董賀筮之遇睽據初九用事應有失亡之事毋乃馬乎勿逐自復必有縶而送之者回家未曽入舎果有邊鄙惡子牽而還之愚謂此以睽初九爻辭占夬路晏筮伏盜五代史唐明宗時行肇司馬路晏夜適厠有盜伏焉晏心動取燭照之盜即告晏請勿驚某禀命有白察公正直不敢剚劍匣劍而去由是晝夜驚懼以備不虞召董賀筮遇夬二爻用事曰惕號莫夜有戎勿恤察象徴辭大有害公之心然難已過但守其中正請釋憂心晏亦終无患又案朱文公語録載王子獻占遇夬九二曰惕號莫夜有戎勿恤吉占者曰必夜有驚恐後有兵權未幾果夜遇寇旋得洪帥愚謂二筮皆用夬九二爻辭占而後占又以戎象為有兵權也小過或人筮㛰姻程沙隨外編云或人筮得此者不知其占再筮之亦得小過為占之曰内卦互得漸漸女歸吉外卦互歸妹説以動所歸妹也愚謂此以初至四互一卦再以三至上又互一卦為占雖是一法要亦占之變例大過漢武帝筮伐匈奴西漢匈奴𫝊武帝輪臺之詔曰古者出師卿大夫預謀參以蓍龜不吉不行乃筮之得大過又在九五曰匈奴困敗不可失時及占星望氣蓍龜皆吉匈奴必破今計謀卦兆皆反程聖俞集筮法載思春曰大過木兆卦也外克内應克世之兆此所以敗也愚謂此卦乃占法變例卦體本不好何縁筮者吉而彼凶卦既不言變而云又在九五必五爻變也師春又自以京房易占反指匈奴為内為世言其受克而敗亦成反説此皆不可曉豈筮者以九五君爻為主兊金克巽木而言匈奴困敗乎是亦未可知也姑記之愚弱冠時集左氏筮法一編後以兵毁今再纂于此以春秋内外傳為主并及家語鑿度及附抄史傳數條以備占法若郭氏洞林全用五行六神青龍朱雀等及年月日諸煞神占靈驗无比不可勝書余因閱杜氏春秋解後序云晉太康元年三月汲郡有發舊冢者大得古書又有一卷純集左傳卜筮事名曰師春師春似是抄集者人名也然則已有著先鞭者矣編集不可少如此夫辯疑毛漸𫝊三墳易之疑山墳為天皇伏羲氏連山易爻卦大象曰崇山君伏山臣列山民兼山物潛山陰連山陽藏山兵疊山象八卦其崇山君下則有君臣相君民官君物龍之類七卦氣墳為人皇神農氏歸藏易爻卦大象曰天氣歸地氣藏木氣生風氣動火氣長水氣育山氣止金氣殺八卦其天氣歸下有歸藏定位歸生寃歸動乗舟之類七卦形墳為地皇黄帝氏乾坤易爻卦大象曰乾形天坤形地陽形日隂形月土形山水形川雨形雲風形氣八卦其乾形天下有地天降氣日天中道月天夜明之類七卦案其篇第則天皇伏羲氏爻卦大象第一即上山墳連山易太古河圖代姓紀第二首載大古之人以女生為姓有合雄紀叙命紀紀其夀命通紀四姓有連逋紀紀男女羣居連逋通紀五姓號居方氏謂居各有方有神人提挺而治號提挺氏提挺三十五世通紀七十二姓故號通姓氏其後有有巢氏有巢子燧人氏燧人子伏羲氏因風而生故姓風河龍馬負圖始畫八卦天皇伏羲氏皇䇿辭第三有皇曰惟我老極時生人衆多欲相吞害龍馬負圖神開我心我畫八卦咸安其居等語人皇神農氏歸藏易易爻卦大象第四即上氣墳歸藏易人皇神農氏政典第五有昔在天皇肇修文教始畫八卦明君臣氏物陰陽兵象以代結繩之政出言惟辭制噐惟象動作惟變卜筮惟占天皇氏歸氣我惟代政惟若古道以立敎等語地皇軒轅氏坤乾易爻卦大象第六即上形墳坤乾易地皇軒轅氏政典第七有皇曰岐伯天師爾司日月星辰陰陽厯數爾正爾考无有差忒先時者殺不及時者殺爾惟戒哉云云等語又案毛漸正仲作三墳書序云春秋左傳云楚左史倚相能讀三墳五典八索九丘孔安國序以為伏羲神農黄帝之書漢書藝文志録古書為詳而三墳之書已不載豈當漢而亡歟元豐七年余奉使西京至唐州北陽道無郵亭得三墳書於民家三墳皆有𫝊墳乃古文而𫝊乃𨽻書復有姓紀皇䇿政典之篇文辭質畧信乎上古之遺書也好事者徃徃指為偽書𦙍征引政典曰先時者殺無赦不及時者殺無赦今政典之文頗合豈後人能偽耶愚獨以為不然案孔安國尚書序云孔子序書討論墳典斷自唐虞以下迄于周則縱有三墳亦非不經孔子所覽覽而不録後雖有存焉者亦不過如刪後之逸詩而已逸詩不可復入三百篇則雖有三墳已不得與易並况文義淺近安知非後人好事者為之而政典之文合正欲装做以取信爾故未敢以為信然又况夫子大𫝊謂伏羲始作八卦因而重之其卦次第即今先天六十四卦首乾終坤者是也使伏羲真自有文字孔子方欣喜不暇豈肯捨之而不録乎必不然也盖當是時卦爻雖立法象雖著而文字則未生至黄帝時蒼頡沮誦始作鳥跡篆字而所謂墳典者亦文字既生之後後世追述當時之事而作故安國以為言大道常道豈伏羲果自有文字乎且如生人之得姓亦始於黄帝之代而謂太古河圖代有姓紀吾不信也故録而論之以祛觀者之惑云劉牧易置圖書之疑易大𫝊曰河出圖洛出書聖人則之孔安國劉向父子班固闗子明陳希夷邵康節皆以十為河圖九為洛書至劉牧乃以已意易置以九為圖十為書托言出於希夷與諸儒舊説不合而不知希夷龍圖序固自以十數為河圖也宋藝文志亦載今觀劉牧云河圖洛書皆出於羲皇之世龍圖其位有九四象八卦皆所包緼縱横合天地自然之數洛書則惟列五行生成之數而已伏羲但則圖畫卦以垂敎而洛書五行之數未必顯故禹更陳五行而顯九類也又曰洛書之出已久累聖但相師其數未者於典墳至大禹方叙而演之劉牧易置圖書大意不過如此且牧以為圖書皆出於伏羲之世固自不妨但既謂出伏羲之世則當皆説歸伏羲取之以作易可也今云伏羲獨則九數之圖以作易而十數之書於易无預却數千年後待大禹取之以作範若使誠如牧說則大禹叙疇乃捨自然九宫之數而不則却去則十數之書不知將九疇與十數如何配合牧亦可謂臆度无理之妄談矣先儒辨之已詳在所不足惑可也牧字長民三衢人牧所注易見前𫝊注下今愚所引牧說見牧鈎隱圖平菴項氏亦曰姚小彭氏云今所𫝊戴九履一之圖乃夷與諸儒舊説不合而不知希夷龍圖序固自以十數為河圖也宋藝文志亦載今觀劉牧云河圖洛書皆出於羲皇之世龍圖其位有九四象八卦皆所包緼縱横合天地自然之數洛書則惟列五行生成之數而已伏羲但則圖畫卦以垂敎而洛書五行之數未必顯故禹更陳五行而顯九類也又曰洛書之出已久累聖但相師其數未者於典墳至大禹方叙而演之劉牧易置圖書大意不過如此且牧以為圖書皆出於伏羲之世固自不妨但既謂出伏羲之世則當皆説歸伏羲取之以作易可也今云伏羲獨則九數之圖以作易而十數之書於易无預却數千年後待大禹取之以作範若使誠如牧說則大禹叙疇乃捨自然九宫之數而不則却去則十數之書不知將九疇與十數如何配合牧亦可謂臆度无理之妄談矣先儒辨之已詳在所不足惑可也牧字長民三衢人牧所注易見前𫝊注下今愚所引牧說見牧鈎隱圖平菴項氏亦曰姚小彭氏云今所𫝊戴九履一之圖乃夷與諸儒舊説不合而不知希夷龍圖序固自以十數為河圖也宋藝文志亦載今觀劉牧云河圖洛書皆出於羲皇之世龍圖其位有九四象八卦皆所包緼縱横合天地自然之數洛書則惟列五行生成之數而已伏羲但則圖畫卦以垂敎而洛書五行之數未必顯故禹更陳五行而顯九類也又曰洛書之出已久累聖但相師其數未者於典墳至大禹方叙而演之劉牧易置圖書大意不過如此且牧以為圖書皆出於伏羲之世固自不妨但既謂出伏羲之世則當皆説歸伏羲取之以作易可也今云伏羲獨則九數之圖以作易而十數之書於易无預却數千年後待大禹取之以作範若使誠如牧說則大禹叙疇乃捨自然九宫之數而不則却去則十數之書不知將九疇與十數如何配合牧亦可謂臆度无理之妄談矣先儒辨之已詳在所不足惑可也牧字長民三衢人牧所注易見前𫝊注下今愚所引牧說見牧鈎隱圖平菴項氏亦曰姚小彭氏云今所𫝊戴九履一之圖乃易乾鑿度九宫之法詳見外篇緯書自有易以來説易師未有以此為河圖者至劉牧方以此為河圖而又以十數之圖為洛書其言不足據也劉牧指參伍以變為四十五數之疑河圖之數自一至十洛書之數自一至九漢儒以來相𫝊如此朱子本之所以知十為圖九為書者盖大𫝊天一地二章正論自一至十之數極為詳備誠以易之作由於是故詳言之而言河出圖洛出書必先圖而後書者亦可以知天一地二章當以為河圖也至於自一至九之數則易未嘗明言劉牧欲易置圖書始指參伍以變為論自一至九之數直指以為河圖而以十數者為洛書則恐其未然何則不應聖人言五十五數如此其詳而論四十五數如此其畧又不言三五以參伍兩字該四十五數殆類世間隱語者較之天一地二章何若是之不侔也所以知其不可以此當之又况造化顯自然之數當先其多而後其少先其全而後其略多而全者體數也體數不可有一之或缺少而略者用數也縱缺而无害譬則四肢百骸一不具不成全體至於用則或用手而不用足或用目而不用耳亦可見矣百數之内以五十五為天地體數即自一至十數以四十五為天地用數用數自一至九陽數圓而常動也虚十不用隂數方而常静也必體立而後用行十圖九書義亦昭矣今讀易者以為聖人皆本圖書以作易自不妨盖先後天卦與圖書合而十為圖九為書正不必易置也歐公圖書怪妄之疑歐公不信圖書以為怪妄又因圖書之疑并與繋辭不信以為非夫子作愚嘗觀溫公通鑑魏明帝青龍問張掖桞谷口水涌寳石負圖狀象靈龜立于川西有石馬鳯凰麒麟白虎犧牛璜玦八卦列宿孛彗之象唐氏曰河圖洛書之説歐陽永叔攻之甚力今觀此圖與河圖洛書亦何以異惜時无伏羲神禹故莫能通其義可勝歎哉愚亦恨不使歐公見之以祛其惑也若夫繋辭乃象數之總括義理之淵藪易无繋辭猶天无日月人旡眼目矣其可哉是何歐公无見於此也文王重卦之疑下繋𫝊首言八卦成列因而重之又曰古者包羲氏之王天下也於是始作八卦繼之以作結繩而為罔罟以佃以漁盖取諸離與下文神農黄帝堯舜取諸益至夬十三卦已是六畫之卦其為包羲自作而自重之自取之可見周禮三易並掌於太卜之官經卦皆八别皆六十有四亦昭昭矣王輔嗣虞仲翔以為伏羲重信然鄭康成之徒以為神農重孫盛以為夏禹重司馬遷揚雄又以為文王重是何其无見於繋辭所云也漢上謂先儒論重卦者六家王虞鄭孫司馬揚也孔穎達曰説卦云昔者聖人之作易也幽賛於神明而生蓍謂伏羲矣故乾鑿度云垂皇䇿者羲上繋論四營而成易十八變而成卦明用蓍在六爻之後非三畫之時伏羲用蓍則是時伏羲已重卦矣陸徳明陸希聲皆以弼論為是楊繪曰虞書龜筮協從則筮云者非八卦之可為也必六十四之然後為筮矣舜禹之際曰筮從則何文王重卦之有房審權曰舜史洪範已有龜筮從之文若三代别書方可言文王重卦今世不言神農夏禹多從輔嗣之説而言文王者尚或有之觀此諸説可以釋然矣文王作爻辭之疑馮厚齋解明夷六五爻箕子之明夷云箕字蜀本作其字此繼統而當明傷之時之象其指大君當明傷之時而𫝊之子則其子亦為明夷矣又謂文王作爻辭移置君象於上六以初登于天後入于地况明夷之主六五在下而承之明夷之主之子之象也子繼明夷之治利在於貞明不可以復夷也後世以其為箕遂傅㑹於文王與紂甚至以爻辭為周公作而非文王盖箕子之囚放在文王羑里之後方演易時箕子之明未夷也李子思名舜臣號隆山深然其説謂班馬固遷只言文王演卦又曰人更三聖世厯三古止言包羲文王孔子未嘗及周公也馬季長以下馬融陸績王肅姚信等始有周公作爻辭之説絶不經見孔頴達始引韓宣子見易象與魯春秋而知周公之徳與周之所以王為周公爻辭之證審爾謂周公作爻辭可也况春秋又將屬之周公乎此論確矣愚謂以爻辭為文王作固自有據况夫子惟曰易之興也當文王與紂之事是故其辭危言辭只説文王未嘗及周公則所謂辭者安知非卦爻之辭耶愚固已疑之矣然考箕子囚奴誠在文王羑里之後文王决无預言之理而隨之王用亨于西山升之王用亨于岐山又誠類太王文王之事夏商之王未有亨于岐山者朱子解作卜祭山川之義諸侯祭境内山川亦正二王為侯時事也以此觀之則爻辭未必果文王所作故謂之作於周公韓宣子見易象之言誠可證也李子思辨魯春秋之説盖自不曉其義宣子本意自説見易象則知周公之徳見魯春秋則知周之所以王也周之王猶能為春秋之時之主義甚昭然若厚齋因蜀本其字之誤盡疑天下之本反改而從之尤有所未可前漢趙賔正蜀人解明夷六五箕子為荄兹則蜀本箕字初未嘗作其字况厚齋謂父當暗世而𫝊子故其子亦為明夷厯考前古惟堯舜老而舜禹攝此乃明徳相繼夏商之王未見父在而子立者惟桀紂可當明夷之主其肯遽𫝊之子乎此馮氏見後世北齊末主前宋徽欽而有是説既謂文王作爻辭乃取此義乎爻辭稱帝乙箕子自是一例况明夷箕子之稱又自有夫子彖𫝊為之證據彖𫝊利艱貞箕子以之之辭與爻辭箕子之明夷利貞之辭正相應烏可傅㑹蜀本一字之誤以證爻辭為非周公作哉愚故不能无辨以祛讀者之惑云李子思曰隨上六王用亨于西山其事頗類太王文王或者遂以爻辭為非文王語然而易中王用之辭非一如王用三驅王用出征王用享于帝吉皆泛言未嘗指名其人况稱王而不稱號耶愚謂易言王用凡五如離之王用出征益之王用享於帝吉无事可指猶可謂之泛言如比之王用三驅安知其非指商湯祝罔之事然猶曰不言其地未可必也至於隨之王用享于西山升之王用享于岐山岐山即西山也岐西固皆因兊體取象而王用之辭决非泛言太王之前未見有亨於岐山者邑于岐山之下居焉自太王始就岐山稱王非太王而誰皆有證據非臆度想象之言只此便可見爻辭之非文王作明矣又何必指為泛言而遷就傅㑹之乎馮厚齋又曰今觀文王遷岐之詩披荆棘通道路竊意太王未卜宅之先必有負固不庭之國王者乃用此巽順之道以通之故著此象所謂知以藏徃也若曰文王自稱太王之徳則羑里之時文王一諸侯耳未稱王也追王太王在武王有天下之後其曰文王自稱與爻辭為非文王作則又失之甚矣愚謂厚齋竊意以下云云可謂中心疑者其辭枝矣岐山之王自有實事不據乃為此枝辭毋亦只欲傅㑹爻辭為文王作而不知其不可也若從先儒以爻辭歸之周公自无羑里時未王以下之窒礙矣以爻辭為非文王作初亦何失之有文王作文言之疑梁武帝云文言是文王所作載於陸氏釋文陳氏友文曰其意謂文言者文王之言也獨不見文言之辭一則稱子曰二則稱子曰則子非孔子而何文王始稱易名之疑馮厚齋曰皇甫氏曰文王在羑里演六十四卦著七八九六之爻謂之周易鄭少梅曰自包羲以至夏商八卦雖重而未知所謂七八九六之常變也連山始艮歸藏始坤夏商用之皆以不變為占故其數止於六十四而已文王因羑里之囚用以卜筮遂竄易繇辭更改術數立大衍之説開萬有一千五百二十之䇿使一卦可以衍六卜四卦焉故名曰易易者變也周易之義惟二氏得之其曰衍六十四卦著七八九六之爻竄易繇辭立大衍之說誠為確論又曰意夏商卦下亦各有辭故周人並存以為占文王賛述包羲之卦衍蓍之數推九六之變以生爻故卦爻各繋以辭定名曰易自孔子賛文王易而夏商之書廢矣然則名書以易自文王始文王以前曰卦而已孔子言包羲始作八卦不言易也周官三易其亦因文王之易而併稱之乎此猶夏商稱帝而因周文武併稱三王也愚謂易名始自文王之説愚既略辨於前矣今又得一證下繋十三卦自黄帝堯舜氏作之下已有易窮則變之文况説卦論伏羲因蓍求卦之法繼人推原伏羲六畫成卦六位成章之由兩以作易聖人言之至論文王與紂之事直不過曰易之興而已曰作曰興皆定名曰易謂伏羲以來不名之曰易可乎盖有不待文王演六十四卦著七八九六之變而後謂之易也鄭氏謂夏商以不變為占容或有之證以洪範占用二曰貞曰悔或只用本卦内外卦為占亦未可知然自舜官占已曰卜筮恊從箕子又曰立卜筮人才曰筮則必有蓍而後可筮不筮亦何以得不變之卦而占之乎是又不待文王在羑里始立大衍用之以卜筮也二氏既皆有聲於易馮氏又取之恐易足以惑人故不可无辨若夫夏商稱帝因文武併稱三王盖亦未之前聞也既濟東西鄰為紂與文王事之疑孔頴達曰又既濟九五東鄰殺牛不如西鄰之禴祭説者皆云西鄰謂文王東鄰謂紂文王之時紂尚南面豈容自言已徳受福勝殷又欲抗君之國遂言東西相鄰而已愚案孔氏引此以辨爻辭非文王作若是文王作必不自誇以見其作於周公也愚則謂此爻本不指紂與文王事非惟文王作時无此意周公亦无此意周家既伐而取其國又何必為是矜誇之辭載於經乎即卦言之自有此象因著其義爾先天八卦離正東坎正西此東西鄰之義也離為牛為戈兵坎性就下又有幽隂之義祭祀之象此殺牛禴祭之象也卦爻多𤼵後天八卦方位惟此一爻𤼵先天八卦方位甚明毋亦周公因離下坎上之卦有自東徂西之象特著先天之例豈得是紂與文王事乎先儒求之之過本義因仍未革亦有俟於後之人也請得而申之周公作彖象爻辭文言之疑陳友文易傳精義曰十翼先儒皆謂夫子作獨范諤昌王昭素乃謂彖象爻辭小象文言並周公作不知何證愚謂援引不明而輒易其言者同於誕妄不足為惑可也故特著之以祛其惑淇水不信序卦之疑淇水文十翼皆孔子之言乎不得而知也然有疑焉序卦者韓康伯雖已明非易之藴而未明所以然也易卦之序二二相從今序卦之文盖不恊矣有義之茍合者有義之不合而强通者是豈聖人之言耶李清臣字邦直號淇水愚謂聖人讀易超然意與易㑹而為之辭豈常人尋行數墨者可並論以此疑之非矣韓康伯謂非易之藴先儒極議其失見中篇𫝊注下談何容易而犯不韙耶易非全書之疑歐公易序云讀經解有差若毫釐繆以千里之説秦焚書時易以卜筮全然經解所引於今易旡之是未得為全書也案沙隨程氏古易章句外編云漢儒引曰君子正其始萬事理差之毫釐繆以千里此緯書通卦驗之文也亦猶先儒引左氏傳為春秋也近世儒者舉此十六字附於坤文言之中曹建大謂不然而黄魯直引為大𫝊不知何所本也愚讀沙隨外編始知易為全書而近世儒者可謂附贅縣疣者矣周易啓蒙翼傳下篇
