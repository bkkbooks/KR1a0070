大抵以誠為主也用大牲吉萃大牲坤牛兊羊象二簋可用享損象見本卦二簋之用損之時焉而已爻亨帝益二王用亨于帝吉禴祭萃二升二皆云孚乃利用禴禴祭既五東殺牛不如西鄰禴祭亨隨王用亨于西山升四王用亨于岐山本義皆作亨亨祀困二利用亨祀祭祀困五利用祭祀翼薦上帝配祖考豫大象先王以作樂崇徳殷薦之上帝以配祖考孝享萃彖王假有廟致孝享也祭主見上宗廟田園類爻田乾二菑畬无妄二耕穫同上園賁五穀果類桑附爻碩果剥上瓜姤五包桑否五翼百穀離彖百果解彖酒食類卦匕鬯震匕舉鼎實鬯芬芳條暢酒也食大畜不家食爻樽酒簋坎四樽以盛酒簋以盛食飲酒未濟上飲酒濡首酒食需五需于酒食困五困于酒食食訟三食舊徳泰三于食有福井五寒泉食訟井坎象泰互兊象飲食漸二飲食衎衎不食剥上碩果不食夷初三日不食井初井泥不食鼎三雉膏不食象各見本爻饋蒙二中饋食也腊肉噬三乾胏四乾肉五已上噬嗑卦有坎豕離雉離火乾之象餗鼎四餗鼎食雉膏之屬離象翼飲食需大象君子以飲食宴樂飲食之道序卦蒙物穉不可不養故受之以需需也者飲食之道也食雜卦噬嗑食也卜筮類卦初筮蒙原筮比象各見本爻爻占革未占有孚彖爻特𤼵卜筮之例而已六十四卦无非占筮也不習坤二徐氏曰卜不習吉之謂也翼大衍之數五十其用四十有九分二掛一揲四歸竒於扐再扐而後掛此揲蓍用掛扐之䇿分隂陽老少以定爻而成卦也乾䇿二百一十六坤䇿百四十四凡三百有六十二篇之䇿萬有一千五百二十此用過揲之䇿總計上下經六十四卦所得之䇿數也詳見本義上繋第九章觀變玩占第一章卜筮尚占第十章開物成務通志定業斷疑蓍徳圓神卦徳方知爻義易首聖人洗心退藏吉凶與民同患興人物以前民用聖人以此齋戒神明其徳定吉凶成亹亹莫大蓍龜並上繋第十一章聖人作易幽賛神明生蓍說卦首章夫子說蓍筮如此謂易非尚占之書吾不信也祐命類爻有命否四有命无咎祉同上疇離祉天祐大有上翼天休命大有大象天命无妄彖凝鼎大象一作凝命令告命類爻命師二王三錫命上大君有命告命泰上自邑告命改命革四有孚改命誡比五邑人不誡吉大號渙五渙汗其大號譽命旅五翼凝命鼎大象命或作天命申命巽大象命誥姤后以施命誥四方命亂泰上小象爵禄類卦建侯屯豫皆取侯震象爻官隨初亦取震侯象爵中孚二我有好爵吾與爾靡之卦亦有互震象翼禄否大象不可榮以禄建萬國親諸侯比大象車輿類爻車賁初舍車而徒睽上載鬼一車金車困四困于金車大車大有二大車以載乾為圜象輿師三五或輿尸小畜三輿說輻剥上君子得輿大畜二輿說輹三日閑輿衞大壯四壮于大輿之輹睽三見輿曵皆是取一陰在一陽之上又有乾坎體獨剥指坤為輿輻小畜三說輹輹大壯四大輿之輹大畜二說輹輹車下縛項平菴謂輹可說輻不可說亦當作輹皆乾象輪既初未二皆曳其輪坎象衞大畜三輿衞武衞也輻輹輿衞項氏說象詳見本爻翼輿說卦坤為輿坎於輿也為多眚輪說卦坎為輪簪服類爻簪豫四朋盍簪一陽貫衆陰象朱紱困二赤紱困五象見本爻衣袽既四三陽為乾衣象陽皆散處又有敝袽之象袂歸五三陽乾衣也中二爻陰陽互袂象黃裳坤五黃中色裳下服坤象圭益三圭玉為之三陽乾為玉又全體似圭互艮手執圭象鞶帶訟上指三三在卦中互離牛有革帶象囊坤四中空象屨噬初卦下象翼衣裳繋辭下黄帝堯舜垂衣裳而治取諸乾坤旌旗類爻沛豐三鄭云旌旗之垂者義亦為斾訟獄類刑附卦訟伏羲獄噬利用獄二陽在上下坎居中閒象又一陽居中囚象爻桎牿蒙初坎象坎亦木也校噬初上蒙本卦刑獄取象徽纆坎上獄中索名律師初坎為法律象天睽三天當作而剃須也有坎兊象劓睽三坎五皆取卦有坎象劓截鼻也又兊毁折象刖困五下坎象刖足刑刑人蒙初坎象刑剭鼎四周禮剭誅見本爻翼刑罰豫彖刑罰清而民服明罰勅法噬大象明政无敢折獄賁大象赦過宥罪解大象折獄致刑豐大象明慎用刑而不留獄旅大象議獄緩死中孚大象正法蒙初小象兵師類卦師伏羲戎夬兵戎兊金象爻師律師初坎象左次師四爻位皆陰象大師同五全體伏師卦行師謙上二至五師卦復上坤衆象又全體似師下不成坎體故用師大敗征謙上征邑國坤衆象伐謙五侵伐亦坤衆象晉上伐邑離戈兵象既三未四鬼方皆離為戈兵象狩夷三南狩亦離象戎同三伏戎離象夬二有戎上爻兊金象翼容民畜衆師大象古者寓兵於農之意除戎器戒不虞萃大象田獵類爻田有禽師五田无禽恒四田獲三狐解二田獲三品巽四三驅失前禽比五田象凡五釋象詳見師五爻下金寳類爻金蒙三金夫噬四金矢五黄金姤初金柅鼎五金鉉困四金車其象各見本爻玉鼎上玉鉉貝震二取初至四互離龜貝之象資旅二懐資巽上喪資象見本爻翼金說卦乾為金繋辭上斷金玉說卦乾為玉財節彖不傷財布說卦坤為布項氏曰古者泉貨為布幣帛類爻帛賁五束帛荀九家有坤為帛如是則卦中四爻三陰為帛一陽間之束也繻既濟四繻帛之羙者亦三陰象器用類卦鼎伏羲􅎅震舉鼎實簋損二簋繘井繩也瓶井爻牀剥初二四巽二上皆以全體取象見本爻枕坎三互震木象樽坎四酒器坎亦木象簋坎四簋成黍稷互震竹為之象筐歸上筐盛幣帛亦取震竹象柅姤初金柅止車物或謂絡絲之趺以金為之亦取巽木之象茀既二婦人蔽車之飾離為雉有翟茀之象金鉉鼎五玉鉉鼎上皆取上九一陽在上象缶比初瓦器坤土坎水伏離火象坎四離三皆取水火土象三陰爻坤土也詳見本爻甕井二亦瓦器坎水離火亦有三陰坤土象幕井上井口開有勿幕象斧旅四離戈兵象巽上亦