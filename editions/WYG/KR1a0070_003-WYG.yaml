body:
  text: 周易啓䝉翼傳下篇元胡一桂撰舉要理太極理之原朱子曰伏羲文王於易只就陰陽以下説夫子却就陰陽上𤼵岀太極來易固是如此先儒未嘗道破者盖以釋極儀象卦章從前未有分曉至康節邵子傳先天易而後此章大明朱子從而别白言之其義益著易本是卜筮書有卦爻便可占然伏羲畫卦豈但從陰陽起必有不雜乎陰陽而實不離乎陰陽者以為之本太極是也此易之有太極如木之有根水之有源必知乎此則六十四卦三百八十四爻莫不有極至之理在乎其間所謂六爻之動三極之道者是也文王周公雖嚴利貞貞吉之教貞固便是理但未嘗明說出太極來夫子恐人惟以卜筮視易則卦爻涉於粗淺故推本太極為言太極者是理至極之稱而為兩儀四象八卦六十四卦三百八十四爻之祖太極之名一立而仁義禮智性命性情道徳道義忠信誠敬中正之教發揮无餘蘊矣文言乾九二言仁誠坤六二言敬義九三言忠信乾彖言性命說卦言盡性至命文言言性情上繋言知崇禮卑言道義之門説卦言和順道徳彖𫝊小象𫝊說中正尤多程沙隨謂易以道義配禍福故為聖人之書陰陽家獨言禍福而不配以道義詭遇獲禽則曰吉得正而斃則曰凶故為技術斯言最有補於世教且使小人盜賊不得竊取而用深得夫子之遺意吁以夫子之教如是而後世猶有流為技術之歸者微夫子之教如之何其可也氣陰陽氣之始有理而後有氣氣之始莫先於陰陽天地山澤雷風水火與夫人物之萬殊何莫非陰陽之為者易卦爻辭无陰陽二字惟中孚鳴鶴在陰特以地言夫子於乾初九爻小象曰陽在下也於坤初六爻小象曰陰始凝也陰陽之稱始於此盖以六十四卦陰陽之初爻即太極所生三十二卦陽儀之一三十二卦陰儀之一以為諸卦初九初六陰陽爻之通例也陰陽之名一立而動靜健順剛柔竒偶小大尊卑變化進退往來之稱亦由是而著矣數圖書數之原乾蓍䇿數之衍物掛扐定卦爻過揲定坤䇿及朞萬之數河圖洛書為作易而出也河圖自一至十爲數五十五洛書自一至九為數四十五合之為數者百蓍䇿大衍為用易而生也王道得則其叢生滿之數亦百可當大衍之數者二則作易與用易之不外乎數者非出於聖人之私意也天也故圖書位數隱然與羲文之卦合而揲蓍掛扐之數所以定卦爻過揲之數所以定乾坤之䇿而當朞之日合二篇之䇿而當萬物之數也或曰數固不能相通歟曰圖書不過列數之文以𤼵聖人之獨知而已蓍則真可執持分合進退以求卦故不同也然圖書虚中之外其餘九六七八可以畫卦蓍䇿用全用半之後亦視九六七八以别陰陽之老少二者初未嘗不同也若夫卦爻中言數例只就六爻取别見於後易易有以理言者有以書言者以理言即太極是也以書言即兩儀四象八卦六十四卦三百八十四爻與夫文王之卦辭周公之爻辭皆書名者也曰易有太極此易字以書言謂易書之中原其始具此太極之理所以能生儀象卦也曰易與天地準此易字不専以書言矣謂易之道與天地準所以能彌綸天地之道也要之十翼中稱易字以書言者為多文王周公之辭无易字夫子於文言及上繋第二章方稱易之名周公爻辭不言易字而於周禮却有三易之名馮厚齋謂夏曰連山商曰歸蔵周曰周易則易乃周家之書名文王之所命也曰三易者夏商䝉周易之稱爾意恐未然說卦謂昔者聖人之作易非指伏羲乎繋辭謂易之興也當殷之末世周之盛徳詳其名義易之稱其來舊矣必非自文王而始也况以後䝉前可也以前䝉後可乎先天後天乾文言傳曰先天而天弗違後天而奉天時夫子本只因乾卦有下乾上乾𤼵先天後天之象至邵子引以明伏羲文王之易然朱漢上謂陳摶以先天圖𫝊种穆則其稱所從來又逺矣但邵子之意謂先天者如六十四卦天本未嘗為而伏羲畫之謂之先乎天可也曰後天者天地間已有六十四卦文王就六十四卦内又從而序之繋之謂之後乎天可也故其詩云若問先天一事无後天還始著工夫一事无只是順其自然且如畫卦不過由太極而兩儀兩儀而四象四象而八卦其重也由八而十六十六而三十二三十二而六十四只是加一倍法至如先天八卦與六十四卦圓圖亦不過揭横圖中前一截居南北之東後一截居南北之西皆未嘗致力於其間也謂之曰著工夫則文王序卦與夫八卦方位皆若出於有意為之非復包羲自然之妙然序卦與八卦方位既成之後或反對以相因或流行以致用亦莫不有自然之位置此所謂先聖後聖其揆一也何庸致區别於其間哉易尊陽卑陰天尊地卑陰陽固有自然尊卑之象然於易上欲見其尊卑處何者最為親切曰自太極生儀象卦最可見太極動而生一陽然後靜而生一陰則陽已居先矣至於陽儀之上生一陽一陰先陽固宜也陰儀之上當以陰為主矣其生一陽一陰亦以陽居先焉又至於四而八八而十六十六而三十二三十二而六十四其生一陽一陰莫不先陽而後陰於是首乾終坤乾不期尊而自尊坤不期卑而自卑於此見尊陽卑陰非聖人之私意卦畫自然之象而亦造化自然之位也卦分爻位之陰陽卦有初二三四五上為位之陰陽初三五位之陽二四上位之陰九六為爻之陰陽九陽爻六陰爻位之陰陽一定而不易爻之陰陽變易而无常或以陽爻居陽位或以陽爻居陰位或以陰爻居陰位又或以陰爻居陽位皆无常也易曰剛柔雜居而吉凶可見矣又曰上下无常剛柔相易正謂是也占法有九六七八九為老陽七為少陽六為老陰八為少陰老變而少不變易以變者名爻故稱九六不稱七八其實每卦七八九六皆具然初上兩爻陽爻不曰九一而言初九不言九六而言上九陰爻不曰六一而言初六不曰六六而言上六盖初者有始之謂上者有終之謂言初言上卦之首尾可見也又易言陰陽不言陽陰言終始不言始終猶言晦朔不言朔晦言死生不言生死取其有生生循環不窮之意也卦爻分君臣六十四卦乾卦純君象坤卦純臣象明夷卦指上六為暗君象紂六五為箕子象外餘皆五君二臣㸔來自五君外諸爻皆臣位特有逺近之分説者謂四為大臣以其近君也又多稱二為臣以其正應也六三或從王事三非臣歟初則臣之最微者所謂在野曰草莽之臣是也亦取民象蠱之上九髙尚其事又臣之隱居者焉代淵曰六十四卦皆以五為君位者此易之大略也其間或有居此位而非君義者有居他位而有君義者斯易之變盖聖人意有所存則主義在彼不可滯於常例王晦叔曰不為君位者其卦有四坤也遯也明夷也旅也坤對乾以明臣之分明夷亡國紂是也旅失國春秋書公遜天王出居是也遯去而不居太伯伯夷之事也此四卦所以不為君位也爻有應不應六爻取應與不應夫子彖𫝊例也如恒彖曰剛柔皆應恒此六爻以應言也如艮彖曰上下敵應不相與也此六爻雖居相應之位剛柔皆相敵而不相與則是雖應亦不應矣又如未濟六爻皆應故曰雖不當位剛柔應也以此例之則六爻皆應者八卦泰否咸恒損益既濟未濟是也皆不應者亦八卦乾坤坎離震㢲艮兊是也二體所以相應者下卦之初即上卦之四下卦之二即上卦之五下卦之三即上卦之上上卦之四即下卦之初上卦之五即下卦之二上卦之上即下卦之三此所以初應四四亦應初二應五五亦應二三應上上亦應三然上下體雖相應其實陽爻與陰爻應陰爻與陽爻應若皆陽皆陰雖居相應之位則亦不應矣江都李衡曰相應者同志之象志同則合是以相應然事固多變動在因時故有以有應而得者有以有應而失者亦有以无應而吉者以无應而凶者夬九三以援小人而凶剥六三以應君子而旡咎咸貴虚心而受人故六爻以有應而失所䝉四六以无應而困吝斯皆時事之使然故不可執一而定論也又觀彖辭重在二五剛中而應者凡五師臨升二以剛中應五无妄萃五以剛中應二至若比五以剛中上下五陰應之大有五以柔中上下五剛應之小畜四以柔得位上下五剛亦應之又不以六爻之應例論也爻分三才三畫卦下爻為地中爻為人上爻為天六畫卦初二為地三四為人五上為天說卦曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦是也爻分中正陽爻居陽位陰爻居陰位為正初九九三九五為陽爻之正六二六四上六為陰爻之正陽爻居陰位陰爻居陽位為不正九二九四上九為陽爻之不正初六六三六五為陰爻之不正二五為上下兩體之中三四為一卦全體之中繋辭謂非其中爻不備又指初上中間四爻言中也剛中柔中當位為正失位為不正皆彖傳所取畫爻位虚四者之别六爻則九與六矣六位則初二三四五上矣而又有六畫六虚者何也盖方畫之初則為畫畫既成於位之上則為爻爻可見而位不可見位虚而爻實也位之虚者所以受爻爻者已成之畫爻與畫先後不爭多所謂啐啄同時是也必以畫言之者見得易非死物據六爻觀之如聖人方用手畫下猶有活動之勢也位未畫則爲虚位旣畫則為爻此四者不可彊分亦不容无辨要在人活絡觀之爾卦爻變動有三易卦爻變動大率有三有變易之易有交易之易又有一卦中六爻上下无常剛柔相易之易筮而得老陽重則變而為少陰拆􅄲得老陰交則變而為少陽單一此變易之易也先天圖左一邊本都是陽右一邊本都是陰左一邊一晝陰自右一邊一晝陰來交易陽爻而成右一邊一晝陽自左一邊一晝陽往交易陰爻而成其交也乾坤各八卦自相對而相交兊艮各八卦自相對而相交離與坎對震與巽對相交亦然其實非此徃彼來只是其象如此先天八卦對交亦然先儒從來有是說此交易之易也又文王卦辭中如泰卦小徃大來否卦大徃小來之類泰本自否卦變成否三隂上徃換得三陽下來便成泰卦否本自泰卦變來泰三陽上徃換得三陰下來便成否卦孔子彖傳中如隨卦剛來下柔隨本自否卦變成否上九之剛下來變初六之柔成剛換得初六之柔上去變上九之剛成柔便成隨卦矣又如蠱卦剛上而柔下之類蠱本自泰卦變成泰初九之剛上去變上六之柔成剛換得上六之柔下來變初九之剛成柔便成蠱卦矣盖言一卦中陰陽自相上下徃來又變成一卦此所謂上下无常剛柔相易也伏羲當初畫卦六十四卦一時俱定此卦固非自彼卦變來彼卦亦非自此卦變去聖人觀卦繋辭偶然見有此象又從而取之于以見易道之變无有終窮而道理亦只在聖人口頭說出便是也卦爻之變動无出此三者矣三聖取象例易有理而後有數有數而後有卦有卦而後有象理者何太極是也數者何河圖洛書蓍大衍之數是也卦者何由八卦重為六十四卦是也象者何乾天坤地乾馬坤牛之類是也包羲未畫之先仰觀天文俯察地理近取諸身逺取諸物博求其象以畫卦既畫之後象悉在卦中此所謂有畫而後有象者指作易之後而言易中之象也然伏羲之象在卦中卦即象也文王取象猶略乾无所取象坤象牝馬離象牝牛中孚豚魚小過飛鳥之類寥寥可數周公於六爻取象甚多其要者如乾六爻象龍屯震坎象馬之類不可勝數又自有所見而取不必盡同於文王至夫子於說卦八卦取象如乾天坤地乾馬坤牛之類於六十四卦取大象如乾天坤地屯雲雷䝉山泉之類尤備其間亦有括文王周公所取例者然而同於文王周公者少而所自取者多盖夫子夢周公心文王參包羲於未畫其於名象又自有所見不必盡同於先聖也朱子詩云湏知三絶韋編者不是尋行數墨人得之矣縁自先儒分經合傳之後學者隨文茍且混殽莫别徑以孔子之象即文王周公之象遂以説卦為祖而六十四卦之彖三百八十四爻之象盡求合於説卦皆有所不通矣必知乎此而後取象之同異如揭日月而行天流河漢而注地也愚於本義後卦象圖説詳矣姑陳其概於此或曰象至夫子而大備誠如子言矣夫子以前占者取象如左傳所載固已多矣奈何愚曰左氏傳乃傳夫子春秋之經安知非取夫子之易象以文之乎借曰夫子以前如乾天坤地等象容或有之然自左傳外他无證據又不應以夫子之聖賛易區區收拾先聖所取之象為之套括略不能自出一亳所見於其間也况夏商以前易无復考究今只據易中之辭求易中之象文王所未取者周公取之周公所未取者孔子取之以文王周公所未有之象至夫子而方盡謂之曰象至夫子而大備詎不信然左傳占辭一節愚於本義復圖文言辨論之詳矣彖爻取象例易中卦爻及彖傳中取象有取變體似體互體伏體反體不一而足變體如小畜上九稱既雨无坎而取雨象者以上九變則為坎也似體如頤似離而稱龜大壯似兊而稱羊之類也互體如震九四稱遂泥以自三至四互坎也伏體如同人彖辭稱大川以下體離伏坎也反體如鼎卦初六爻稱妾以下體巽正兊之反初陰爻妾也此説愚得之婺源州判澹齋吳先生此類皆不可省象意方通卦有逐爻取象如隨二三指初為小子漸初亦稱小子大過指初為女妻噬嗑賁大壯夬鼎艮指初為趾遯既未濟指初為尾晉姤上象角大過上象頂既濟上象首皆是也他爻可類推爻有以六位取象者易六十四卦惟既濟一卦坎上離下六爻之陰陽與六位之陰陽協故曰既濟定也言爻位陰陽皆定之義餘六十三卦中皆具坎離陰陽之位焉又足以見日月為易之妙故卦中取象亦有以位之陰陽取者初不以爻拘如乾九三以位言居離位之上有終日夕象九四以位言居坎位之下有躍在淵象義則昭然矣朱漢上解乾彖傳曰六爻天地相函坎離錯居坎離者天地之用也雲行雨施坎之升降也大明終始離之徃來也愚因是推之得六位取象之説焉卦徳象體材義卦徳乾健坤順震動巽入坎陷離麗艮止兊説是也卦象乾天坤地震雷巽風坎水離火艮山兊澤是也卦體剛中柔中剛上柔下内陽外隂内健外順是也卦材剛柔健順有彊弱之分是也卦義如泰便有亨通之義蠱便有幹濟之義是也卦爻言數例凡卦爻數自初數之至上為六或以一爻為一歳一年同人三歳不興坎三歳不得凶豐三歳不覿既濟三年克之未濟三年有賞于大國或以一爻為一月臨至于八月有凶或以一爻為一日復七日來復或以一爻為一人需不速之客三人來損三人行則損一人或以一爻為一物訟鞶帶三褫晉晝三接師王三錫命比王用三驅睽載鬼一車解田獲三狐損二簋可用享萃一握為笑革言三就旅一矢亡巽田獲三品之類見先人雜著易為卜筮書易所以知為卜筮書者以周禮三易皆掌於太卜之官而知之伏羲易无文字只是教人隨所占得卦爻就卦爻之陰陽上看吉凶文王周公始有辭分明説吉凶説利不利又説神怪之象如載鬼一車見豕負塗之類以示人大概是教人以忠孝正順如所謂貞則利不貞則不利貞則吉不貞則不吉无非此意本義坤卦六五爻黄裳元吉之義便可見當時占法大㫖横渠先生謂易為君子謀不為小人謀正謂此也後之學者不説易為卜筮書者以為卜筮流於技藝為易恥談故只就理上説雖説得好但非易之本㫖與易初不相干朱子嘗謂卜筮之頃上通鬼神下通事物精及於无形粗及於有象天下道理无不包罩在其中開物成務之學正有賴此奈何以為非卜筮之書乎夫子文言彖傳之類雖多𤼵明道理然而繫辭中教人大衍之數河圖之數教人卜筮象傳説卦中教人説象極詳且備人皆由之而未察爾本義啓䝉主卜筮朱子本義啓䝉二書只教人以象占二事或者乃謂易有聖人之道四焉有辭變象占四者之分今只説卜筮乃是朱子之學易道不止是也是則然矣然文王卦辭中於䝉比二卦只發初筮原筮之義周公爻辭中於革九五只發未占有孚之義夫子繋辭曰極數知來之謂占曰大衍之數五十曰蓍之徳圓而神曰幽賛於神明而生蓍説尚占之事不一而足誠以伏羲之卦本為卜筮作文王周公彖爻无非占决之辭所以周公於周禮一書論易惟與連山歸藏並掌於太卜之官則易之所由作大抵為卜筮也審矣故論語引恒卦不恒其徳或承之羞之辭而繼之以子曰不占而已矣者又足以見夫子謂人不知尚占之學故不識不恒其徳或承之羞之義是則夫子專以易為尚占之書又可見矣奈何以為朱子獨解作卜筮乎何不知言之甚也夫子所謂聖人之道四焉亦説易道廣大其用不窮又何止於四道而原其所由作則本為教人卜筮使之决嫌疑定猶豫而不迷於吉凶悔吝之塗爾可不考其本而惟朱子之議乎周禮九簭周禮簭人掌三易以辨九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶凡國之大事先簭而後卜上春相簭凡國事共簭鄭氏注云此九巫讀皆當為筮字之誤也更謂筮遷都邑也咸猶僉也謂筮衆心歡不也式謂筮制作式法也目謂事衆筮其要所當也易謂民衆不悅筮所改易也比謂筮與民和比也祠謂筮牲與日也參謂筮御與不也環謂筮可致師不先筮後卜筮凶則止不卜相謂更選擇其蓍也蓍龜歳易者與愚案一釋云更興更化之更同國有當更不可不改圖咸謂國家有所為感人心之事目謂事目筮所當用者易謂旱乾水溢變置社稷諸侯不朝易置其人之類參謂車之參乗者或為御或為右也環謂致師將戰必使勇者挑之是也可以參看愚案先儒一講義云三代之易名不同而所占者則同於九筮徃徃國事當决不出乎九筮之外也知此亦可識所筮之概矣講義亡其姓名辭説易繫辭上傳曰易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占夫所謂辭者何也文王六十四卦卦下之辭周公三百八十四爻爻下之辭是已然愚直謂文王周公之辭不出象占二者且以乾坤二卦論之文王曰乾元亨利貞坤元亨利牝馬之貞君子有攸徃先迷後得主利西南得朋東北喪朋安貞吉乾是卦名元亨利貞是卦占此卦有占无象而卦之六畫即象矣謂筮得乾而六爻不變或一卦三爻變則以元亨利貞為占謂其事大亨通而利在貞正雖亨通而不貞正則依然不利爾坤是卦名元亨以下是卦占謂筮得坤而六爻不變或一卦三爻變則以元亨利牝馬之貞以下為占以牝馬置元亨利貞間是謂象雜占中牝馬坤之象元亨利貞者坤之占也君子指筮者謂筮者若有所徃居先則迷以坤純陰之故在後則得以坤承乾之故主利乾主義故坤主利徃西南則得朋類徃東北則喪朋類以後天八卦巽離坤兊居西南而為陰之朋震坎乾艮居東北而為陽之朋安貞吉者安於西南之貞則吉此西南東北是象而得朋喪朋安貞吉是占也又以乾初九坤初六二爻論之周公曰初九濳龍勿用初六履霜堅冰至濳龍非象乎勿用非占乎履霜堅冰至固云有象无占而占意寓於象分而言之霜冰是象履至是占亦未為不可玩二卦二爻无非象占二者而已合象占以成句而讀之粲然成文則謂之辭矣六十四卦三百八十四爻皆然易捨象占不足以成辭論辭而不及象占惟以道理解説而謂聖人自有此一種險怪之辭則亦眞不足與言易若以言者尚其辭之義林學䝉引論語舉不恒其徳或承之羞以明之朱子以為然矣但於他未見有所證爾變説夫所謂變者何也卦爻陰陽之變也説卦曰昔者聖人之作易也幽賛於神明而生蓍則伏羲畫卦固已賛神明而生蓍以用之矣有蓍筮則有九六七八九六為陰陽之老七八為陰陽之少老變而少不變易以變為占非卜筮固无由而得變然想古人用易亦不盡假卜筮而遇事之來動以應之必先隨意所𤼵主在一卦又就一卦上隨意變爻看變得何卦何爻一如筮法以斷之此所謂以動者尚其變也案春秋左氏傳宣公六年王子伯廖引易論鄭公子曼滿曰其在周易豐之離弗過之矣間一歳鄭人果殺曼滿又如宣公十二年智莊子引易論先縠與楚戰于邲曰周易有之在師之臨曰師出以律否臧凶遇敵必敗雖免而歸必有大咎及戰果敗後晉人歸罪先縠殺之之類是也然此特尚變以論他人之事爾徃徃已事亦如是尚其變以為斷决焉但於傳未見其例也二事詳見後筮法下象類説愚於本義後既分八卦為象圖而繫之以説矣大概欲見三聖人取象不同之意以今觀之尚有未備故復為此圖分天文地理人物等為類首文王卦象次周公爻象次孔子十翼中彖傳象傳説卦傳所取象以該之庻乎不致有遺朱子嘗謂易為卜筮書而所謂象者皆是假此衆人共曉之物以形容此事之理使知所取舍而已然則繋辭所謂以制器者尚其象特大約言之况十三卦制器纎悉畢備後人无復有所加矣惟於卜筮之用至于今未已也吁謂象專為制器設者愚斯之未能信也天文類卦日豐丨中晉畫丨皆取離象雲雨小畜密雲不雨雲取互兊澤之氣上蒸象不雨取互離日而坎伏之象爻天乾五大有上大畜上明夷上姤五中孚上皆五上為天象日離日昃豐日中月小畜上九歸妹六五中孚六四皆取月幾望象解見本義雲小過五密雲互兊氣上蒸象雨小畜上既丨變坎象暌上九徃遇雨下有互坎象夬九三獨行遇雨上取兊澤象鼎九三方雨變坎象小過五不雨兊上象霜坤初六初陰象斗豐二四取五上二陰爻四㸃象沫豐三沫小星亦上二隂象光未濟五離日之光天衢大畜上九象雲路也翼天乾象彖象説卦下並同雷震象風巽象月坎象雨雲並同日火電並離象天文賁彖地理類四方附卦西南坤蹇解指坤方東北坤蹇指艮方西郊小畜兊象南征升離象百里震象解見本義震卦野同人取六二地上之象大川需訟同人蠱大畜益渙中孚解各見本卦濡未濟坎象爻地夷上坤象南夷三離南方象方坤二直方坤象西山隨上西兊象山伏艮象岐山升四有互兊取象同西山林屯三取上互艮山又有震木象陵同三髙陵互巽為髙三爻變艮為陵震二九陵象見纂注漸五本爻變艮象丘頤二指上爻艮象賁五艮象渙四互艮象谷困初幽谷井二溪谷之義皆取坎下之象石豫二困三豫取艮石象困三只取爻剛象磐屯漸震艮陽象郊需初以去坎逺取象同上取國外曰郊象西郊小過五互兊象陸漸三艮路象道小畜初履二道路也只取初二為地之象荒泰二指上坤地荒逺處遐泰二取上坤逺象隂中孚二取下卦之中位柔象野坤上郊外曰野正上象也沙需二近坎水象泥需三井初震四皆取迫坎水象塗睽上泥也取互坎象干漸初水涯也近互坎象穴需四坎下象窞坎初坎穴象大川謙初近互坎頤五當坎位之中以艮止不利涉頤上亦以位取止極而動故利涉未濟三坎體象河泰二互兊澤象淵乾四亦取坎位象泉井五坎象冰坤初隂盛象指上六濡夬三上承兊澤象既濟初上互坎象既濟上坎象未濟上下互坎象浚恒初兊反體象翼地坤象剛鹵兊地為剛鹵山徑路小石皆艮象泉水溝瀆皆坎象澤兊象淵訟彖坎象方觀復大象省方四方離大象照四方姤大象誥四方歳月日時類卦八月臨以一爻為一月臨二陽長為十二月卦自三爻數起正月泰至上為四月乾而陽長已極於是一陽又生於下為五月姤六月遯七月否至八月觀則四陰長而為八月之卦亦臨之反對也七日復以一爻為一日自姤一隂生至坤上六六陰極為六日於是一陽來於下為復之初九是為七日來復矣論陽之消以月言幸其消