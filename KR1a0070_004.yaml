body:
  text: 周易啓蒙翼傳外篇元胡一桂撰所謂外篇者凡非周易傳注而自為一書皆入於此以緯書為首如焦氏易林京氏易傳郭氏洞林猶皆是易卜筮事然占法序卦已非先聖之舊衛氏元包用京卦序而卦辭皆自為魏氏參同發明二用六虛極為的當但借坎離為修飬之術至於揚雄太玄馬公潛虛關氏洞極則易之支流餘裔可謂外之又外者矣若夫邵子皇極經世書直上接伏羲先天易專用其卦不用其蓍立為推步算法大而天地之運化微而萬物之生殖逺而上下古今之世變皆妙探於卦爻中前知無窮却知無極巍乎髙哉何揚玄馬虛關洞之所可仰望者乎特其作用不同於文王周孔列諸外篇然而推明伏羲先天生卦之法與文王後天八卦及卦正反發明三十六宫之義使吾夫子繫辭極儀象卦章與説卦先後天數章各有歸著三四聖人之易至是如日月行天星陳極拱功在萬世則自元聖以來一人而已朱夫子已表章於本義啓蒙之書愚小子尚何容喙他如蔡氏皇極內篇演洛書之數易範並立天地問置諸外篇也亦宜述衆作訂後先作外篇題辭先後只作世次如後緯書周易緯九卷馮厚齋曰崇文總目周易緯九卷漢鄭康成注隋志有宋衷注唐四庫書目有宋均注又中興館閣書易緯又有李淳風續注其一推天元甲子之術其二推易天地人之元術也友人程舜俞謂唐章懷太子後漢注稱易緯有六篇一稽覽圗二乾鑿度三坤靈圗四通卦驗五類是謀六辨終備崇文總目易緯九卷外又别出乾鑿度二卷乾鑿度上下二卷題包羲氏先文公孫軒轅氏演古籀文蒼頡修為上下二篇首稱黃帝曰紹興續書目倉頡注鑿度二卷乾鑿度上文古文八卦古文天字古文地字古文風字古文山字古文水字古文火字古文雷字古文澤字大象八乾天坤地離日坎月巽風震雷艮山兊澤四門乾天門坤人門巽風門亦為地户艮鬼門四正月坎水魄日離火宫雷木震日月出入門澤金水兊日月往來門索象畫卦配身一取象二裁形三取物四法天地宜五分上下屬六象成數生天數地數卦數爻數衍天地和合數乾䇿坤䇿八䇿日力月力八象大盡數生天數天地合䇿數蓍坤鑿度下文坤元十性坤有八色坤屬坤性體坤有變化坤有四象坤有四道象卦法物程舜俞曰乾坤二鑿度序稱包羲氏作注稱其書謂序乾坤之元體與易大行者也考其問有所謂太一九宫卦宫卦氣月卦爻位之法與夫軌􅻮占算之術律厯相生之數古今術家多用之又似隂陽卜筮者流托為包羲氏書以自神其説也乾鑿度曰太一取其數以行九宫案後漢張衡疏云臣聞聖人明審律厯以定吉凶重之以卜筮雜之以九宫漢書注云易乾鑿度曰太一取其數以行九宫鄭玄注太一北扆名下行八卦之宫每四乃還中央中央者北辰所居故謂之九宫天數太分以陽出以隂入陽起子隂起午是以太一下九宫從坎宫始自此從坤宫又自此從震宫又自此從巽宫所從半矣還息中央之宫既又自此從乾宫又自此從兊宫又自此從艮宫又自此從離宫行則周矣上遊息於太一之星反子宫行起始坎終離故姚小彭云今所傳戴九履一之圖乃易乾鑿度九宫度也易通卦驗上下二卷馮厚齋曰上卷題七經第一河洛第九首稱孔子曰下卷論卦氣方位雖略本説卦至論氣候病證脈理與素問黃帝岐伯問對相類此其為假託不必辨也通卦驗曰故正其本而萬物理失之毫釐差以千里馮厚齋曰案館閣本通卦驗有曰云云漢儒引君子正其始萬事理差之毫釐繆以千里程可久曰此緯書通卦驗之文也與館閣本其文特小異爾又曰緯出漢哀平世載占驗災祥隂陽符讖光武以讖立故篤信之鄭康成何休引以解經桓談張衡之徒深疾之易正義引易緯乾鑿度等書責魯直云其中多有不可曉者獨九宫之法頗明崇文總目云皆述隂陽日辰數讖今考三書凡十一卷蓋無足深據云程舜俞曰宋大明中始禁圗讖梁天監以後又重其制隋煬帝發使收天下讖緯書悉焚之故遂散亂無復全書今行於世惟乾坤二鑿度愚嘗於正義見所引緯如乾鑿度云垂皇䇿者羲卦道演德者文成命者孔如通卦驗云昌牙通靈昌之成孔演命明道經等語皆一樣文法造句大竒非有古人渾厚體况既自伏羲説至孔子安得又是孔子以前作今曰出哀平之世安知非出當時儒者之手乎第漢去古未逺雖秦燼之餘猶或尚有祖述如羲之用蓍九宫之於洛書皆有禆於易教其尚存而未泯如鑿度乃未及見焉可吁也矣今姑拾遺紀一書之概云爾焦氏易林案易林一十六卷西漢建信天水外黃令焦延壽之所撰也延壽卦變法以一卦變為六十四卦六十四卦通變四千九十六卦而卦變之次本之文王序卦首乾坤而終既未濟且如以乾為本卦其變首坤次屯蒙以至未濟又如以坤為本卦其變首乾次屯蒙以至末濟又如以末一卦未濟為本卦其變亦首乾次屯蒙以至既濟每一卦變六十三卦通本卦成六十四卦且每一卦變成詩六十四首六十四卦變共四千九十六首以代占辭而文王周孔辭並不復用亡友王浩翁字浩古得其書於逺方而手抄之且為之跋略曰紫陽夫子以爻變多寡順而列之以定一卦所變之序又以乾卦所變之次引而伸之為六十四卦所變相承之序然後次第秩然各得其所雖出於焦而比焦尤密誠哉是言今愚録其詩數篇於左并述其變卦之例以見一書之大概云乾卦變例姑載數詩于左乾道陟多阪胡言喋謇王浩古云酉陽雜組引此作迷謇譯瘖且聾莫使道通請謁不行求事無功愚謂此乾為本卦不變而為變卦之首也坤招禍來螫害其邦國病在手足不得安息愚謂乾六爻盡變坤屯陽孤亢極多所恨惑車傾蓋亡身常憂惶乃得其願雌雄相從愚謂此乾二三四上變成屯是為乾四爻變也蒙鵠雛鳲鳩専一無尤君子是則長受嘉福愚謂此乾初三四五爻變成蒙亦為乾四爻變也需目瞤足動喜如其願舉家蒙寵缺第四句愚謂此乾四上變成需是為一卦二爻變也姑録此五詩而四千九十六首大體可見矣論分卦直日法費直作易林序引孟康曰分卦直日之法一爻主一日六十卦為三百六十日餘四卦震離坎兊為方伯監司之官所以用震離坎兊者是二至二分用事之日又是四時各専主之氣各卦主時其占法各以其日觀其善惡也又案項平菴曰焦氏卦法自乾至未濟並依易書本序以一卦直一日乾直甲子坤直乙丑至未濟直癸亥乃盡六十日而四正卦則直二分二至之日坎直冬至離夏至震春分兊秋分不在六十卦輪值之數此即京房六十卦氣之法但京主六日七分此但主一日京用太玄之序此用周易之序耳其論一卦直一日與費氏一爻直一日之説不同姑記以俟參考論易林沙隨程氏易解外編曰紹興三十一年沈丞相判明州時完顔亮入寇有窺海道者沈以易林筮之遇比之隨曰過時不歸若悲雄雌裴徊外國與叔分離亮前來洛中留今金主守國及亮馬飲江為下所殺而今金主代之所謂與叔分離者乎又有以筮之者遇解之大壯云驕胡大形造惡作凶無所能成還自滅身其占驗如此然其書於乾之姤曰仁政不暴鳳凰來舍四時順序民安其處曾不與潛龍之辭合乾之同人曰子號索哺母行求食返見空巢訾我長息亦不與見龍之辭合其泰之豫曰東鄰好女為王妃后莊公築館以尊主母歸於京師季薑説喜用事誤莊公築館豈后妃事耶其文不逮太玄逺甚愚案朱子啓蒙六十四卦變例只三十二圗每一圗反覆成兩圗共成六十四圗如以乾為主一爻變六卦二爻變十五卦三爻變二十卦四爻變十五卦五爻變六卦六爻變只一坤卦自坤反觀又成一圗其法條理精密且乾坤震巽坎離艮兊各各相對不亂其占一以卦爻辭為據今焦氏詩既不本之卦爻辭又不取之卦爻象雖其變卦次第本文王序卦而義則無取如沈丞相占略與詩應亦其偶然不過如籖辭之適中爾非真卦象然也特其以一卦變六十四卦引而為四千九十六卦則自我作古深有可取焉也費直稱其致易未見誠為過論而卦氣直日之法先儒皆不能無議云京氏易傳案京氏易傳西漢東郡頓丘人魏郡太守京房之所撰也京氏易以八宫卦為序分上中下三卷上卷首乾宫八卦乾姤遁否觀剝晉大有次震宫八卦震豫解恆升井大過隨次坎宫八卦坎節屯既濟革豐明夷師次艮宫八卦艮賁大畜損睽履中孚漸中卷首坤宫八卦坤復臨泰大壯夬師比次巽宫八卦巽小畜家人益無妄噬嗑頤蠱次離宫八卦離旅鼎未濟蒙渙訟同人次兊宫八卦兊困萃咸塞謙小過歸妹蓋専主八純卦變六十四卦也下卷雜論卜筮一篇首論聖人作易揲蓍布卦次及納甲法次二十四氣候配卦與夫天地人鬼四易一二世地易三四世人易五世八純天易遊魂歸魂鬼易父母兄弟妻子官鬼等爻龍德十一月子在坎卦左行虎刑五月午在離卦右行天官甲乙庚辛之類地官甲乙申酉之類與五行生死所寓之類寅中有生火丑中有死金之類此朝氏讀書記所謂星行氣候之學非章句也又一本題曰京氏易傳其間論積算法亦無起例可推及卜筮新條例占求官家宅之類及列六十四卦定三百八十四爻斷法與前下卷同而尤詳備者但如漢志所載京房易傳語集中咸無此豈其所謂章句者歟惜乎未之見也今姑載前書上中二卷首卦以見一書之大略云易傳三卷陸績注純陽用事象配天屬金與坤飛伏宗廟居世壬戌土癸酉金易云用九見羣龍無首吉九三三公為應有乾乾夕惕之憂甲壬配內外二象積算起己巳火至戊辰土周而復始吉凶之兆積年起月積日起時積時起卦入本宫五星從位起太白太白金星入西方麗西北居壬甲為伏位參宿從位入壬戌壬戌在世居宗廟建子起潛龍十一月冬至一陽生建已至極主元位四月龍見于辰陽極隂生吉去凶來用九吉配於人事為首為君父於類為馬為龍降五行頒六位十二辰入六位居西北之分野隂陽相戰之地易云戰乎乾乾陽西北隂陽入隂二氣盛必戰天六地六氣六象六包四象分萬物隂陽無差升降有等隂陽二十四候律吕調矣人事吉凶見乎有象造化分乎有無六位純陽隂象在中陽為君隂為臣陽為民隂為事陽實隂虛明暗之象隂陽可知水配位為福德甲子水是乾之子孫木入金鄉居寶貝甲寅木乾之財土臨內象為父母甲辰土乾父母火來四上嫌相敵壬午火乾官鬼金入金鄉木漸微壬申金同位傷木宗廟上乾本位戌亥乾位陽極隂生降之姤卦八卦例諸純隂用事象配地屬土柔道光也隂氣凝盛與乾相納臣奉君也易云黃裳元吉六二內卦隂處中臣道正也與乾為飛伏癸酉金壬戌土宗廟居世三公為應未免龍戰之災無成有終初六起履霜至于堅氷隂雖柔順氣亦堅剛建始壬午至丁亥夏至立冬積算起丁亥至丙戌周而復始五星從位起鎮星西南方之卦翼宿從位降癸酉金分氣候二十五隂中有陽氣積萬象故曰隂中陽陽中隂隂陽二氣天地交接人事吉凶見乎有象六位適變八卦分焉隂雖虛納于陽位稱實六五六三之類升降反覆不能久處千變萬化故稱乎易易者變也隂極則陽來隂消陽長哀則退盛則戰易云上六龍戰于野其血玄黃陽蕩隂坤內卦初六適變入陽曰震隂盛陽微漸來之義故稱復集京氏易姑集所知以見傳之大槩傳曰經稱觀其生觀卦上九爻辭也言大臣之義當觀賢人知其性行推而貢之否則為聞善不與兹謂不知厥異黃厥咎聾厥災不嗣西漢天文志傳曰小人剝廬剝上九爻辭也厥妖山崩兹謂隂乘陽弱勝強同上傳曰棄正作淫厥妖木斷自屬漢五行志建昭五年兖州刺史禁民私所自立社山陽橐茅鄉社有大槐樹吏伐斷之其夜樹復立其故處師古注山陽郡槖縣傳曰興兵妄誅兹謂無法厥災霜夏殺五穀同上武帝元光四年四月隕霜殺草木故引傳曰聖王在上總命羣賢以亮天功則日之光明五色備具成帝河平元年三月日出黃有黑氣大如錢居日中央云云觀日之變足以監矣同上傳曰有消復之救所以緣咎而致愛因異而邁政晉書郭璞因隂陽錯謬刑獄繁興上疏中引此以進誎傳曰河水清天下平不記何書沈存中謂納甲不知起何時愚謂納甲本自以月之晦朔弦望昏旦生消而定而京氏易傳以十甲配上八卦與之吻合雖不知所起先後亦可附論于此云漢上朱氏曰繫辭傳懸象著明莫太乎日月虞翻曰謂日月懸天成八卦象三日暮震象月出庚朱子曰三日第一節之中月生明之時也蓋始受一陽之光昏見於西方庚地八日兌象月見丁朱子曰八日第二節之中月上弦之時受二陽之光昏見於南方丁地十五日乾象月盈甲壬朱子曰十五日第三節之中月既望之時全受日光昏見於東方甲地是為乾體十六日旦巽象月退辛朱子曰十六日第四節之始始受下一隂為巽而成魄以平旦而沒於西方辛也二十三日艮象月消丙朱子曰二十三日第五節之中復生中一隂為艮而下弦以平且而沒於南方丙也三十日坤象月滅乙朱子曰三十日第六節之終全變三陽而光盡體伏於西北一月六節既盡而禪於後月復生震卦云此朱子所注參同契也真西山載之讀書記而釋之曰震一兌二乾三巽四艮五坤六每五日為一節晦夕朔旦則坎象水流戊日中則離象火就已成戊己土位象見於中西山曰朔旦震始用事為日月隂陽交感之初道家象此以為修養之法渾天六位圗即前納甲法而加十二支言氏傳曰降五行頒六位即納甲法也沈存中曰納甲未知起何時豫考之可以推見天地胎育之理乾納甲壬坤納乙癸者上下包之也震巽坎離艮兊納庚辛戊巳丙丁者六子生乾坤包中如物之處胎甲者左三剛爻乾之氣右三柔爻坤之氣也乾初爻交坤生震故震初爻納子午乾初子午故也漢上曰長子代父也中爻交坤生坎故坎初爻納寅甲震納子午順傳寅申陽道順上爻交坤生艮故艮初爻納辰戌亦順傳坤初爻交乾生巽故巽初爻納丑未坤初丑未故也漢上曰長女配長男也中爻交乾生離故離初爻納卯酉巽納丑未逆傳卯酉隂道逆漢上曰中女配中男也上爻交乾生兊故兊初爻納己亥亦逆傳漢上曰少女配少男也女從人故其位不起於未乾坤始于甲乙則長男長女乃其次宜納丙丁少男少女居其末宜納庚辛今乃反此者卦必自下生先初次中末乃至上此易之敘亦胎育之理也物處胎甲莫不倒生自下而上者卦之敘而冥合造化胎育之理至理合乎自然也項平菴曰乾初起甲子則父起黃鍾天之統也坤初起乙未則母起林鍾地之統也震初起庚子則長男從父巽初起辛丑則長女次長男也坎初起戊寅則中男次長女離初起己卯則中女次中男也艮初起丙辰則少男次中女兊初起丁已則少女次少男也大抵陽卦納陽干陽支隂卦納隂干隂支陽六干皆進隂六干皆退惟乾納二陽坤納二隂包括首尾則天地父母之道也筮法變卦説平菴項氏曰以京易考之世所傳火珠林者即其法也以三錢擲之兩背一面為拆即兩少一多少隂爻也兩面一背為單即兩多一少少陽爻也俱面為交交者拆之聚即三多老隂爻也俱背為重重者單之積即三少老陽爻也蓋以錢代蓍一錢當一揲此後人務徑截以趨卜肆之便而本意尚可考其所異者不以交重為占自以世為占故其占止於六十四爻而不能盡三百八十四爻之變爾愚案京氏所定變法八純卦只各變得五卦至於遊魂卦已是所變第五卦第四爻所變歸魂卦又是遊魂卦下體三爻連變所得者則是六十四卦內八純卦所不能變者遊歸凡十六卦而八遊卦必自各八卦內第六卦第四爻來八歸卦亦必自八遊卦內卦來而八宫卦亦不宜交互變矣至於筮卦則純卦上爻初未嘗不變他卦但未能變本宫遊歸上爻而純卦自上爻外他爻亦未嘗不能變本宫遊歸而遊歸二卦亦不必從某卦來也但得卦後某卦屬某宫幾世某卦屬某宫遊歸則不可易爾房雖不能制卦之不變卦雖能盡變亦不能不受制於房房雖自是一法終是吾聖人之法廣大周溥如天之不可及也世應例平菴項氏曰京氏易法只用八卦為本得本卦者皆以上為世爻得歸魂卦者皆以三為世爻亦因下體復得本卦而三在本卦為上也其餘六卦皆以所變之爻為世世之對為應凡其所謂變者非以九六變也皆自八純卦積而上之知其為某爻之所變耳如乾本卦上九為應乾初變姤為一世卦初六為世九四為應再變遁為二世卦六二為世九五為應三變否為三世卦六三為世上九為應四變夬為四世卦六四為世初六為應五變剝為五世卦六五為世六二為應剝之四復變為晉謂之遊魂卦九四為世初六為應愚謂九四乾之本爻又在上卦故曰遊魂晉下卦皆變為大有坤復歸乾謂之歸魂卦九三為世上九為應愚謂下體反乾本卦又在內卦故曰歸魂起月例一世卦隂主五月一隂在午也陽主十一月一陽在子也二世卦隂主六月二隂在未也陽主十二月二陽在丑也三世卦隂主七月三隂在申也陽主正月三陽在寅也四世卦隂主八月四隂在酉也陽主二月四陽在卯也五世卦隂主九月五隂在戌也陽主三月五陽在辰也八純上世隂主十月六隂在亥也陽主四月六陽在已也遊魂四世所主與四世卦同歸魂三世所主與三世同一世二世為地易三世四世為人易五世與八純為天易遊魂歸遊為鬼易飛伏例平菴項氏曰京房於世爻用飛伏法凡卦見者為飛不見者為伏其在八卦止以相反者為伏乾見伏坤之類皆以全體相反也至八卦所變世卦則不然自一世至五世同以本生純卦為伏蓋五卦皆一卦所變至遊歸二卦則又近取所從變之卦為伏如乾一世姤姤下體巽飛為巽初辛丑伏仍用乾初甲子二世遁飛遁二丙午伏仍用乾二甲寅之類至五世皆以本卦乾爻為伏者也自五世復下為遊魂卦剝四變晉為艮變其飛為離四己酉伏為艮四丙戌矣又下為歸魂卦晉下三爻變為大有自坤變乾故飛為乾三甲辰伏為坤三乙卯矣二卦皆近即所從變之卦不用本生純卦也餘卦放此卦氣直日圖內一運列四正卦二十四爻以司一歲二十四氣也中一運除四正卦外以六十卦分公辟侯大夫卿九三百六十爻以司一歲三百六十五日四分日之一也其卦次第與太玄卦氣次第同外一運又取中運內十二辟卦凡七十二爻以司一歲七十二候也案漢上朱氏易圖曰右圖李溉卦氣圖其説源於易緯在類是謀緯書六篇其四名類是謀曰冬至日在坎春分日在震夏至日在離秋分日在兊四正之卦卦有六爻爻主一氣餘六十卦卦主六日七分八十分日之七歲十二月三百六十五日四分日之一六十而一周孔穎達解七日來復云易稽覽圗卦氣别中孚故離坎震兊各主一方其餘六十卦卦有六爻主一日凡主三百六十日餘有五日四分日之一每日分為八十分五日分為四百分日之一又分為二十分是四百二十分六十卦分之六七四十二卦别各得七分每卦得六日七分也案稽覽圗係緯書內第一篇又曰二十四氣七十二候見於周公時訓呂不韋取以為月令其書則見於夏小正夏小正者夏后氏之書孔子得之於把者也夏建寅故其書始於正月周建子而授民時巡狩承享皆用夏正故其書始於立春夏小正具十二月而無中氣有候應而無日數至於時訓乃五日為候三候為氣六十日為節二書詳略雖異其大要則同豈時訓因小正而加詳歟又曰仲尼贊易時已有時訓觀七月一篇則有取於時訓可知愚謂七月自是周公詩今云此者見得周公時尚且有取於時訓則孔子贊易時有時訓明矣説卦言坎北方之卦也震東方之卦也離南方之卦也兊正秋也於三卦言方則知坎離震兊各主一方矣於兊言正秋者秋分也兊言秋分則震春分坎冬至離夏至為四正矣復大象曰先王以至日閉關所謂至日者冬至也於復言冬至日則姤為夏至而十二月消息之卦可知矣復彖曰七日來復則六十卦分主一歲卦有六爻爻主一日可知矣繫辭曰三百八十四爻當期之日愚謂繫辭自言乾坤之䇿凡三百六十當期之日非言三百八十四爻也所引誤矣蓋六十卦當三百六十日四卦主十二節十二中氣所餘五日則積分成閏也又曰此即京房卦氣直日之法也胡旦云京房以卦氣言事皆有效驗東漢郎顗明六日七分之學最為精妙論卦氣圗之非朱子曰易卦之位震東離南兊西坎北者為一説十二辟卦分屬十二辰者為一説又焦延壽為卦氣直日之法乃合二説而一之既以八卦之震離兊坎二十四爻直四時又以十二辟卦直十二月且為分四十八卦為之公侯卿大夫而六日七分之説生焉若以八卦為主則十二卦之乾不當為已之辟坤不當為亥之辟巽不當侯於申酉艮不當侯於戌亥若以十二卦為主則八卦之乾不當在西北坤不當在西南艮不當在東北巽不當在東南彼此二説互為矛盾且其分四十八卦為公侯卿大夫以附於十二辟卦初無法象而直以意言本已無所據矣不待論其減去四卦二十四爻而後可以見其失也答程大昌泰之隆山李氏曰乾坤乃諸卦之祖亦例簉乎諸卦直日曰坎離震兊之於乾坤一也坎離震兊主二十四氣而乾坤諸卦主六日七分何耶又曰朱氏依京房以六十卦主七十二候而列辟卦十二分綴其下其圗自多違戾夫既以六十卦主七十二候三百六十五度四分度之一而辟卦乃主十二月三百五十四日上下不相應其失一也六十卦每卦直六日七分辟卦亦在其中是亦六日七分矣而又列之於下使主一月上下不相應其失二也論卦氣直日之非圗象辨疑曰京房直日之説以坎離震兊各主一方以六十卦分上一歲凡三百六十五日四分之一卦得六日七分其為算固周且悉矣然以坎離震兊之與乾坤諸卦一也坎離震兊主二十四氣而乾坤諸卦主六日七分何耶合六十卦為日三百六十五四分之一附之一歲則有餘而加之閏則不足若之何其主一歲耶一歲之中贏縮餘閏初無常時而卦之所值則有定日又烏能候寒溫耶且使夫六十四卦所配之日皆惟我之所分則何獨六日七分而後可吾將合六十四卦而以一歲三百五十四日均之則一卦直五日四十二分五釐亦可也吾將損四正而用六十卦以當三百五十四日則卦直五日七十二分亦可也不然惟用八卦以當三百五十四日則卦直四十四日二十分又誰曰不可凡去取多寡惟我之所制則人皆可為矣何取乎經此房之罪也是以司馬溫公又以為一卦御六日二百四十分日之二十一而後之學者又各以已見敷而為圗配之以七十二候六十律六十甲子二十八宿所行之度環其下而分綴之詳繹其義與其所𨽻之卦初無毫釐相屬此豈六十四卦之於七十二候六十律六十甲子二十八宿曾不具是理哉去取多寡隨已分綴必欲某繫之某則不可也此其弊蓋自房始或曰房之術以候風雨寒溫各有效驗則何可貶曰非也天下之小術雖閲擇日時算布五行尋察地脈以至猥瑣邪僻之書無不借易以為説蓋天下之物無有不麗於隂陽者故淺陋之術皆得假聖人之糟粕以為精深所以眩惑斯人而取售於世房之所以用之之驗者乃其術也而非易也而不知房之所託也烏乎房之是非亦曉然可見東都無易學白虎諸儒取其説以著易緯而唐孔穎達疏復之七日來復以為六日七分之數謬誤相承以至今也専論卦氣起中孚之非京房揚雄皆以卦配氣候謂之卦氣同是卦也同是氣候也宜其所配有不可得而異者然房以六十卦配之去取之異何也房以兊應大雪而雄以坎房以兊應秋分而雄以震節候之異何也房以坎離震兊各主日九十而雄於四卦卦得四日有半房以六十卦主六日七分而雄亦以四日有半處之多寡之異何也雄之太玄以二贊配一晝一夜凡一首九贊為四日有半有以一首準一卦則得四日半矣而又以二首準一卦則是卦又得九日也雄之以卦配日又自為異如此何也茍卦為有用則隂陽之體有非人所能移者而增損遷變惟二子之所私何耶自達者觀之其為謬妄氷炭不言冷熱可知也蓋亦求二子之所同者惟以卦氣起於中孚則一耳然卦氣不自他卦始而獨起於中孚不知何義復以一陽初生謂之冬至之候猶有説也屯以一陽震動於坎離之中謂之冬至之候猶有説也至於中孚以兊巽為卦而謂之冬至則無一説而可太玄以中準中孚其辭曰陽氣潛萌於黃宫信無不在其中蓋謂中孚者信也夫以中孚為信陽氣必應於此則是取其義而不取其氣也不取其氣而取其孚信之義則謂之起於無妄可也何必中孚雄之太玄乃亦效之以首擬卦豈以首與卦皆主是氣而後擬之也以中擬中孚以飬擬頤以強擬乾以視擬觀以止擬艮以難擬蹇不過以其字之同義而取之是知其所謂起中孚者亦取其信也其於所隸之節氣何所取哉使雄獨以太初厯起於中起於冬至起於牛之一度則猶可也而反以為起中孚嘗見宋咸著論言卦氣起中孚非聖人之旨而朱氏難咸曰中孚十一月之卦也以歲言之陽起於冬至以厯言之日始於牽牛以日言之晝始於夜半以人言之慮始於心思咸謂何不起於他卦真不知者也竊謂朱氏言人之慮始於心思故起於中孚使中孚取心思之義則起於咸可也何必起於中孚而後可朱氏又言歲始於冬至厯始於牽牛日始於夜半故必始於十一月夫律厯始於十一月是矣而以中孚為十一月卦為何義不此之解而欲以折咸殆不可也使咸之説得行房與雄之言皆可寢矣太玄經云太玄經者新莽大夫揚雄之所作以擬易者也其畫四以方州部家為次自上而下最上一畫為方一長畫為一方二短畫為二方三短畫為三方州部家皆然第二畫為州第三畫為部最下第四畫為家每四畫為一首一元生三方三方生九州九州生二十七部二十七部生八十一家而成八十一首首各有名以擬易六十四卦每首雖四畫而贊則有九以初一次二次三次四次五次六次七次八上九為次而分水火木金土一六水二七火三八木四九金五土每首九贊八十一首共七百二十九贊末一首上九後獨增踦嬴二贊以擬易之三百八十四爻䇿數直日詳具于後首之下各有辭宋政和七年許良肱上太玄每首之下又增首測一卷以擬大象今分附逐首之下贊亦各有辭贊下又各有測辭以擬爻之小象又有元文以擬文言有元㰚力支反分也張也與離字同韻元瑩元棿魚稽切與輗同車木也元圗元告以擬繫辭有元數元衝元錯以擬説序雜八十一首分天地人三元七百二十九贊又加踦嬴分晝夜日星節候以直一歲三百六十五日二百三十五分以擬卦氣又有揲法筮首贊以斷事之吉凶其學不傳世罕有其書余得之友人查顔叔抄首末數首贊及日星候揲法等於左以見一書之大概若其是非得失之論又具載于後云太元方州部家八十一首圖元圖曰一元都覆三方方同九州枝載庶部分正羣家元始三方方有三州州有三部部有三家皆一生三故有三方九州二十七部八十一家也天元中周礥交耎徯間少戾從進釋上干􅕳格夷樂羡差重爭務事增鋭達地元更斷榖遇竈大裝衆密廓文禮親斂強逃唐常晬盛居度永昆法應迎人元滅吟守割止堅翕聚積成闕矢飾疑視劇馴將沈內去難勤養晦瞢窮一方一州一部一家中陽氣潛萌於黃宫信無不在其中首測曰中擬中孚天元陽家一水下下日在牽牛初許良肱注曰臣稽古本太元并前漢志參次撰成首測一卷布於八十一首辭之末愚謂此注則首測本自成卷在八十一首末今注本後人分散於逐首之下正如易經之紊亂也首序曰馴乎元渾行無窮正象天隂陽批參以一陽乘一統萬物資始方州部家三位疏成曰陳其九九以為數生贊上羣綱乃綜乎名八十一首歲事咸貞注方州部家之畫與三才之位離而疏成焉豈無自而然耶自其合而言之曰批參自其離而言之曰疏成自天元甲子朔旦冬至推一晝一夜每二贊一日而周乎三百六十五日節候日星無不備此歲事所以咸正也贊序曰盛哉日乎丙明離章五色淳光夜則測隂畫則測陽晝夜之道或否或臧陽推五福以類升隂幽六極以類降升降相關大正乃通經則有南有北緯則有西有東巡乘六甲與斗相逢厯以記歲而百穀時雍初一昆侖旁薄幽測曰昆侖旁薄思諸貞也注旁薄天之象昆侖地之形思者人之心一者思心之地舒王曰幽昧而未判也初為晝為君子思無邪故也次二神戰于元其陳隂陽測曰神戰于元善惡并也注地二與天七合于南方生火火為神舒王曰首與時為水而二火也故曰神戰于元其陳隂陽善惡并者二為夜二為小人小人心雜故也次三龍出于中首尾信可以為庸測曰龍出于中見其造也舒王曰首與時為水三為木木生於水龍亦生水故曰龍次四庳虛無因大受性命否測曰庳虛無因不能大受也注四於贊為隂為虛語曰小人不可大受言不量力而無辭辟故以否言之次五日正于天利以其辰作主測曰日正于天貴當位也舒王曰五為中位為晝陽明盛而中故曰日正于天注五六天地之中故稱日與月乘中之剛逢星之陽所以為利自子至亥皆謂之辰以辰者日月之會而建所指也愚謂五為一首之主故曰貴當位也次六月闕其博不如開明于西測曰月闕其博明其退也舒王曰首時為水六又水而在五福上氷上行而著者六又為夜故曰月注月闕其博始退之象開明于西方進之象太玄言五以上作消損盈之意可知次七酋酋大魁頤水包貞測曰酋酋之包任臣則也注衆所就謂之酋愚謂次七有大魁象卦時為水七為火水火不相射而相生息有頤水包之象下相滅息而相生息亦正道也水為主則火為臣有任臣法則之象次八黃不黃覆秋常測曰黃不黃失中德也注黃者中色諸二則中故曰黃八為夜夜為小人故曰不黃八雖上之中以木近金故有中德之失時反乎酋酋而有秋常之敗故曰黃不黃覆秋常上九巔靈氣形反測曰巔靈之反時不克也注極上則顛氣形殄滅然九為晝為君子能順性命之理而與時偕極焉具此下則係元文以擬文言文多不載右中首乃太玄第一首也故有首序贊序元文自周以下只首贊測三者而已二方二州二部二家應陽氣極于上隂信萌乎下上下相應注經白中則陽始應則隂生當應之時陽極于上隂萌乎下一隂方生上下相感氣至而鹿角解候至而蜩始鳴首測曰應擬咸地元陽家五土中中日在井二十九注月令夏至五月中鹿角解漢志曰井三十一夏至鶉首中初一六幹羅如五枝離如測曰六幹羅如附離君也注幹羅如強也枝離如弱也深根固本不可拔也周封建附離於君亦若此次二上厯施之下律和之非則否測曰上施下和匪其賔也注上厯施之足以紀歲下律和之足以和聲上下相應是則然非則否次三一從一橫天網䍚䍚測曰一從一橫經緯陳也注從橫所以瑩理也一從一橫日緯其經則天網䍚䍚疏而不失焉東西南北經緯交錯邪正以分其陳可知次四援我罘罟絓羅于野至測曰援我罘罟不能以仁也主罘罟所以絓羅飛潛空曠之地靡所不至飛潛無所容其軀矣不能以仁不能愛物次五龍翰于天貞栗其鱗測曰龍翰之栗極懼墜也注龍健也翰于天可謂健矣貞栗其鱗髙而危故也與胥靡登髙不懼遺死生異矣次六熾承于天氷萌于地測曰承天萌地陽始退也注熾承于天陽氣極于上之謂氷萌于地隂信萌于下之謂也君子道消之意次七日強其衰應蕃貞測曰日強其衰惡敗類也注應之道哀乎七日強其哀俾之不弱是天地變化草木蕃之時也君子齋戒處必掩身之類其惡敗類也如此次八陽極微隂不移日而應測曰極陽微隂應其發也注陽之召隂速若影響猶冬爨鼎夏造氷不移日而應非吾所謂道也上九元離之極君子應以大稷測曰元離之極不可遏止也注日月麗天則大而髙之極也君子於此應以大疾則明兩作離焉舜升聞類焉稷訓疾右應乃太玄第四十一首也中為陽氣之始應為隂氣之始其第五贊日當一百八十三日節為夏至星為井三十一度係之於二方二州二部二家之下也三方三州三部三家飬隂弸於野陽􆂽萬物赤之於下注陽主動動則􆂽於外隂主靜靜則弸諸內一內一外交飬而萬物紐牙焉漢志辰在丑謂之赤奮首測曰飬擬頤人元陽家九金上上日在斗二十二初一藏心于淵美厥靈根測曰藏心于淵神不外也注淵虛而靜初一之水藏心于淵則神不外精精之飬神美厥靈根夫是之謂善飬次二墨飬邪玄幽否貞測曰墨飬邪中心敗也注二逢夜况之墨隂火也次三糞以肥丘育厥根荄測曰糞以肥丘中光大也次四燕食扁扁其心􅩒􅩒利用征賈測曰燕食扁扁志在賴也注志之所賴捨五而何次五黃心在腹白骨生肉孚德不復測曰黃心在腹上得天也注黃心在腹指五白骨生肉指四黃土色心土之體而腹者心之宅白金色骨金之形而肉者骨之外捍君子為可信而已不求人之必信宜其上得天助也次六次次一日三餼祇牛之兆肥不利測曰次次之餼肥無身也注六為宗廟一日三餼祭之數也瀆矣牛兆肥不利卜牲也肥無身者物雖厚不誠其身耳次七小子牽象婦人徽猛君子飬病測曰牽象飬病不相因也注小子婦人牽象微猛柔弱勝剛強之意中飬不中才飬不才病者君子飬之測貴革而不因次八鯁不脫毒疾發上壟測曰鯁疾之發歸于墳也注禍福無不自已求之者上九星如歲如復繼之初測曰星如歲如終始飬也注月令星曰于天歲將幾終之謂復繼之初易言窮則變變則通終則有始大行也踦贊一凍登赤天晏入玄泉測曰凍登赤天隂作首也注踦屬水嬴屬火水以一贊以補其陽之不足耳踦贊陽以隂作首則嬴贊隂以陽作首可知也嬴贊二一虛一嬴踦竒所生測曰虛嬴踦竒禪無已也注飬受羣餘故以二贊繼飬之後右飬首太玄第八十一首也故繫踦嬴二贊於七百二十九贊之末今具此起中末三首亦可以見首贊測之規模次第矣元衝七愚案元始於中至第四十一首而為應中則陽始應則隂生中與應對周與迎對八十一首皆然對則相衝故元衝之文専以兩兩相衝之首論之元錯八愚案錯雜也雜八十一首論之不以其序也注衝則一往一來以序其體錯則一吉一凶以明其用縱橫交雜與八卦相雜同經曰錯絣也元㰚九愚案㰚音離分也張也極論元之為義隂陽之運日星之行度元瑩十愚案經云瑩明也泛論元義以明之也無數愚案首論天地生蓍及命筮揲法五行生成支干配數以及律吕之類此下不紀次序元棿愚案棿魚稽反擬也泛論元之所擬如一明一幽趺剛趺柔知隂者逆知陽者流棿擬之晝夜之類元圗愚案圖象也首論方州部家及天地人之三天以分八十一首之類元告愚案告示也亦多論天地人之道及隂陽晝夜與元之辭愚案司馬溫公讀玄云易有彖玄有首論一首之義易有爻玄有贊易有象玄有測以解贊易有文言玄有文解五德并中首九贊易有繫辭玄有㰚瑩棿圗告五者推贊太玄易有説卦玄有數論九贊所象易有序卦玄有衝序八十一首隂陽相對解之易有雜卦玄有錯雜八十一首説之是也又案宋政和問許良肱進表云政和七年撫州草澤臣許良肱謹録太玄經解十卷八十一首分為七卷衝錯攡瑩為第八卷數第九卷棿圗告為第十卷并序一首不見有太玄序恐即中首內首序贊序是也兼撰到首測一卷猶易大象載諸八十一首辭之末隨表上進觀此則太玄首序贊序本只自為一序許氏首測亦只自為一卷今皆附入首辭之下又元棿下有曰元之贊辭云云又曰故首者天之性也衝對其正也錯絣也測所以知其情也攡張之瑩明之數為品式文為藻飾棿擬也圗象也告其所由往也所謂文非中首內元文乎所謂測非贊下之測乎測與文本只列於衝錯之下今皆附入於首贊之下矣此後人欲便觀覽隨類分附非復許氏表進之舊明矣嗚呼鄭玄王弼亂易經於前兹非其所謂尤而效之者乎可為之三歎踦一半日之半四分度之一嬴二半日半度揲蓍法命曰假太玄假太玄孚貞爰質所疑于神于靈休則逢陽星時數辭從咎則逢隂星時數辭違凡筮有道不精不筮不疑不筮不軌不筮不以其占不若不筮神靈之曜曾越卓如日之曜卓然示人逺矣愚謂此命筮之辭三十有六而䇿視焉虛三别一以挂于左手之小指中分其餘以三搜之并餘於艻一艻之後而數其餘七為一八為二九為三六算而䇿道窮也成首之數也七愚按三揲有餘一餘二餘三而無餘餘八餘九之理解者甚多皆不通意者子雲之法以餘一準七餘二準八餘三準九只餘一二三則七八九自定矣故曰餘七為一八為二九為三只倒用一字故難曉若作餘一為七二為八三為九人無不曉矣王薦曰凡四揲而成首初揲定方二揲定州三揲定部四揲定家自挂至定畫共成一揲故四揲成首也愚謂此明揲蓍之法也逢有下中上下思也中福也上禍也思禍福各有下中上以晝夜别其休咎焉以九贊之位復各有三皆以下中上别之以晝為休夜為咎一從二從三從是謂大休一從二從三違始中休終咎一從二違三違始休中終咎一違二違三違是謂大咎元以陽家旦筮一五七大休以日中夜中筮二六休九咎夕筮三休四八咎隂家旦筮一五七大咎日中夜中筮二六咎九休夕筮三咎四八休元之筮用以三表其知來若神乎占有四或星或時或數或辭旦則用經夕則用緯觀始中決從終星者日所舍日者循星以進退者也時者命之運而歲所總也數者一二三四而厯所紀也辭者各指其所之也旦用經一五七而從夕用緯三四八而橫一水七火水火合為從三八木四九金木合金為橫占者考所逢如何耳觀始中決從終兹終吉則吉終凶刖凶之效也法愚謂此明占吉凶之也數配五行見太玄元數下三八為木四九為金二七為火一六為水五五為土五行用事者旺旺所生相故旺廢勝旺囚旺所勝死子午之數九丑未八寅申七卯酉六辰戌五己亥四注自太極函三為一故參一為三子一陽生故成於寅而備於申故自子至申其數九自丑至中其數八自寅至申其數七自卯至申其數六自辰至申其數五自己至申其數四故女起壬申午一隂生成於申而備於寅故自午至寅其數九自未至寅其數八自申至寅其數七自酉至寅其數六自戌至寅其數五自亥至寅其數四故男起丙寅甲巳之數九乙庚八丙辛七丁壬六戊癸五注自甲至壬其數九自乙至壬其數八自丙至壬其數七自丁至壬其數六自戊至壬其數五乾天道順行以壬為始自己至丁其數九自庚至丁其數八自辛至丁其數七自壬至丁其數六自癸至丁其數五坤地道逆行以丁為始愚案世俗範數算法蓋本於此而不知其所以然觀此可以見矣泰中積數見太玄元圗下元有六九之數注易老陽九老隂六準而為太玄䇿用三六一一也一二也二三也二一也二二也二三也三二也三三也天地人合之為十有八䇿也儀用二九二九亦十八元其十有八用乎泰積之要始於十有八䇿終於五十有四蓋天地人各十有八三箇十八合為五十四并終始䇿數半之為泰中并終始二者之䇿數總之為七十二蓋總上十八䇿與五十四䇿之數也半之為泰中者以七十二中分之以三十六䇿為泰中也泰中之數三十有六䇿以律七百二十九贊凡二萬六千二百四十四䇿為泰積圗象辨疑曰一首九贊一贊三十六䇿一首計三百二十四策八十一首共計二萬六千二百四十四䇿是為泰中積數愚謂此所謂以三十六䇿律七百二十九贊也每贊必三十六䇿者即揲法以三十六䇿虛三用三十三䇿故爾七十二䇿為一日凡三百六十四日有半辨疑曰兩贊直一日一夜一日一夜計七十二䇿而周天三百六十五日當二萬六千二百九十䇿又加四分度之一實於七十二䇿中得十八䇿通計二萬六千二百九十八䇿其八十一首即得二萬六千二百四十四䇿以七十二䇿為一日只得三百六十四日半踦滿焉以合歲之日而律厯行辨疑曰更欠半日當三十六䇿及四分度之一當十八䇿計欠五十四䇿遂加一踦贊計三十六䇿補其半日通成三百六十五全日又加嬴贊準十八䇿以為四分度之一則知元䇿與周天無不合矣故自子至辰自辰至申自申至子冠之以甲而章會統元與月蝕俱沒元之道也注故自子至辰八十一自辰至申八十一自申至子八十一冠之以甲而甲子至甲辰甲辰至甲申甲申至甲子千五百三十九載為一統一統周而餘分盡焉由是十九歲為一章一章而閏分盡則一朔旦冬至之首名焉若僖五年辛亥朔日南至是也共二百四十三朔旦冬至計四千六百一十七歲為一元二十七章五百一十三歲為一會一會月蝕盡八十一章千五百三十九歲為一統一統朔分盡自子至辰自辰至申自申至子几四千六百一十七歲為一元一元六甲分盡則章會統元四者之法與月食俱沒而餘分盡焉兹元之為道也星數牛八女十二虛十危十七室十六壁九奎十六婁十二胃十四昴十一畢十六觜二參九井三十二鬼四柳十五星七張十八翼十八軫十七角十二亢九氐十五房五心五尾十八箕十一斗二十六右班固律厯志凡三百六十五度不盡四分度之一一元七百二十九贊周於三百六十四度半先儒論太玄朱文公語録曰太玄經就三數起便不是易中只有隂陽竒偶便有四象揚子雲見一二三四都被聖人説了却杜撰就三上起數曼淵問溫公最喜太玄曰溫公全無見處若作太玄何似作厯又曰子雲為人深沈會去思索如隂陽消長之妙他且是去推求然而太玄亦是拙底工夫蓋天地間只有箇竒偶自二而四自四而八只恁地推去都走不得而子雲却添兩作三謂之天地人事事要分作三截又且有氣而無朔有日星而無月恐不是道理潘時舉録又曰看了易後去看那玄不成箇物事黃義剛録三山林駉德頌曰淵哉太玄之為書乎易以八玄以九易之蓍也以七玄之蓍也以六易之八也八而八之凡六十四卦然不易者八反易者五十六實以三十六卦而六十四也元之九也九而九之凡八十一家然不易者九反易者七十二實以四十五而八十一也蓍之七也七而七之凡四十九䇿其虛一也存一而虛之也蓍之六也六而六之凡三十六䇿其虛三者取其三而虛之也易以當日玄亦以當日易以當厯玄亦以當厯其闔闢變通無一而非易也至若易有彖玄則有首易有爻玄則有贊易之爻有象玄之贊有測以元文而準文言以攡瑩掜圗告而準繫辭此又其文之粗爾然亦誠有可疑者易之天五配以地十玄也有五而無十非易也易之六畫加以六位玄也有畫而無位非易也易之畫即易之爻玄之重為重元首四重方州部家贊自贊元首九贊非以四重為贊非易也玄以元文擬文言似矣然元文不加之睟元以睟準乾而加之中如其有心於卦氣也則去元文可也而何必規規於聖人也元以首名準卦似矣然或以一首當一卦而或以二首焉如其有心於厯法也則自為之名可也而何必規規於聖人也節文愚謂太玄以八十一首繫之於方州部家四畫之下於象與義初無所取特不過以四畫分之有八十一樣借以識八十一首之名又有七百二十九贊散之於八十一首之下每首九贊皆是初一次二次三次四次五次六次七次八上九首首一樣更無分別而七百二十九贊亦與八十一首象與義皆無相關以八十一首名強附於四畫之下以七百二十九贊又強附於八十一首之下然以中之初一作冬至第一日積起至飬之上九而一歲節氣三百六十四日半一周又加踦嬴二贊以足日之餘分而起閏又自冬至一日係之以牽牛星之第一度日一日躔星一度至三百六十四日半而斗星二十五度半亦周又以踦嬴二贊係斗星餘度而一歲周天之日與星湊合恰好太玄之要法全在於此而老泉又甚議其增二贊之非且曰始於中之一訖於飬之九闕焉而未見者四分日之三爾以一百八分而為日以一分而加之一首之外盡八十一首而四分日之三可以見矣又曰玄四日半以為首而以四百八十七分求合乎二十八宿之度加分而數定去踦嬴而道勝吾無憾焉爾參同契參同契者後漢魏伯陽之所作也蓋亦本之於易撰成參同契三篇復作補塞遺脫一篇大概借易以明火候煉丹修飬之法五代末孟蜀彭曉為之分章分三篇為九十章解義朱文公又隱名為之注讎定考辨正文復為上中下三篇今録序文及上中下數節以見一書之體而朱子論説并略具於左參同契序案神仙傳真人魏伯陽者會稽上虞人也世襲簮裾唯公不仕修真潛默飬志虛無博贍文詞通諸緯候恬淡守素唯道是從每視軒裳如粳粃焉不知師授誰氏得古文龍虎經盡獲妙旨乃約周易撰參同契三篇又云未盡纎微復作補塞遺脫一篇繼演丹經之玄奧所述多以寓言借事隱顯異文密示青州徐從事徐乃隱名而注之至後漢孝桓帝時公復傳授與同郡淳于叔通遂行于世公撰參同契者謂修丹與天地造化同途故托易象而論之莫不假借君臣以彰內外敘其離坎直指汞鉛列以乾坤奠量鼎器明之父母係以始終合以夫妻拘其交媾譬諸男女顯以滋主析以隂陽導之反復示之晦朔通以降騰配以卦爻形於變化隨之斗柄取以周星分以晨昏昭諸刻漏故以乾坤為鼎器以隂陽為隄防以水火為化機以五行為輔助以真鉛為藥祖以玄精為丹基以坎離為夫妻以天地為父母互施八卦驅役四時分三百八十四爻循行火候運五星二十八宿環列鼎中乃得水虎潛形寄庚辛而西轉火龍伏體逐甲乙以東旋易曰聖人有以見天下之賾而擬諸其形容象其物宜公因取象焉非天下之至通其孰能與於此哉乃見鑿開混沌擘裂鴻濛徑指天地之靈根將為藥祖明視隂陽之聖母用作丹基泄一氣變化之元漏大冶生成之本非天下之至達其孰能與於此哉其或定刻漏分晷時簇隂陽走神鬼蹙三千六百之正氣回七十二候之要津運六十四卦之隂符天關在掌鼓二十四氣之陽火地軸由心天地不能匿造化之機隂陽不能藏亭育之本致使神變無方化生純粹非天下之至明其孰能與於此哉契云混沌金鼎白黑相符龍馬降精牝牡襲氣如霜馬齒似玉犬牙水銀與姹女同名朱汞共嬰兒合體明分藥質細露丹形盡周已化之潛功大顯未萌之朕兆非天下之至神其孰能與於此哉其有假借爻象寓此事端不敢漏泄天機未忍祕藏玄理是以鋪舒不已羅縷再三欲罷不能遂成篇軸蓋欲指陳要道汲引將來痛彼有生之身竟作全隂之鬼非天下之至仁其孰能與於此哉復有通德三光遊精八極服金砂而化形質餌火汞以鍊精魂故得體變純陽神生真宅落三尸而超三界朝上清而登上仙非天下之至真其孰能與於此哉曉所分真契為章義者蓋以假借為宗上下無準文泛而道正事顯而理微後世議之各取所見或則分字而義或則合句而箋不無畎澮殊流因有妍媸互起未學尋究難便洞明既首尾之議論不同在取捨而是非無的今乃分章定句所貴道理相黏合義正文及冀藥門附就故以四篇統分三卷為九十章以應陽九之數名曰分章通真義復以朱書正文墨書旁義而顯然可覽也上卷分四十章中卷分三十八章下卷分十二章內有歌鼎器一篇謂其辭理鈎連字句零碎分章不得故獨存焉以應水一之數喻丹道隂陽之數備矣復自依約真契撰明鏡圗訣一篇附於下卷之末將以重啓真契之户牖也曉因師傳授歲久留心不敢隱蔽玄文是用課成真義庶希萬一貽及後人也昌利化飛鶴山真一子朝散郎守尚書祠部員外郎賜紫金魚袋彭曉序上篇乾坤者易之門户衆卦之父母坎離匡郭運轂正輻牝牡四卦以為橐籥覆冒隂陽之道猶工御者準繩墨執銜轡正規矩隨軌轍處中以制外數在律厯紀月節有五六經緯奉日使兼并為六十剛柔有表裏朔旦屯直事至暮蒙當受晝夜各一卦用之依次序又曰天地設位而易行乎其中矣天地者乾坤之象也設位者列隂陽配合之位也易謂坎離坎離者乾坤二用乾用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿變化於中包囊萬物為道紀綱中篇朔旦為復陽氣始通出入無疾立表微剛黃鍾建子兆乃滋彰播施柔暖黎蒸得嘗臨爐施條開路正光光耀漸進日以益長丑之大吕結正低昂仰以成泰剛柔並隆隂陽交接小往大來輻湊於寅運而趨時漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分夬隂以退陽升而前洗濯羽翮振索宿塵乾健盛明黃被四鄰陽終於已中而相干姤始紀序履霜最先井底寒泉午為蕤賔賔服於隂隂為主人遁去世位收斂其精懷德俟時栖遲昧冥否塞不通萌者不生隂伸陽屈沒陽姓名觀其權量察仲秋情任畜微稚老枯復榮薺麥牙蘖因冒以生剝爛肢體消滅其形化氣既竭亡失至神道窮則反歸乎坤元恆順地理承天布宣下篇先白而後黃兮赤黑達表裏名曰第一鼎兮食如大黍米自然之所為兮非有邪偽道若山澤氣相蒸兮興雲而為雨泥竭遂成塵兮火滅化為土若蘗染為黃兮似藍成緑組皮革煮成膠兮麴糵化為酒同類易施功兮非種難為巧惟斯之妙術兮審諦不誑語傳於億世後兮昭然自可考煥若星經漢兮昺如水宗海思之務令熟兮反覆視上下千周燦彬彬兮萬遍將可覩神明或告人兮心靈乍自悟探端索其緒兮必得其門户天道無適莫兮常傳與賢者注先白金吐液後黃液變黃牙赤黑水火號金砂黃牙第一鼎日夜一黍米三年白日沖天鼎中水火運用各歸於土藥在胎內變易無定貌龍虎上經神室者丹之樞紐衆石之父母砂汞别居出陽入隂流耀二方列數有三棲像水火制由王者武以討叛文以懷柔土德以王提劔偃戈以鎮四方坎離數一二南北獨為經故冠七十二石之長剛柔有表裏隂陽稟自然金火當直事金水相含受雄雌并一體用之有條理變化既未神終則復更始初九為期度陽和準旦暮周厯合天心陽爻畢於已正隂發離午自丁終於亥水火列一方守界成寒暑東西表仁義五行變四時如是則隂陽互用順三一而得其理神室設位變化在乎其中矣神室者上下釡也設位者列雌雄配合之密也變化謂砂汞砂汞者金土之二用二用無定位張翼飛虛危往來既不定上下亦無常獨居不改化歸中宫包囊衆石為丹祖宗有無相制朱雀炎空紫華曜日砂汞沒亡訣不輒造理不虛設約文申奧叩索神明演爻徴卦五行為諷坎雄金精離雌火光金火相伐水土相剋土王金鄉三物俱喪四海輻湊以置太平並由中宫土德黃帝之功金火者真鉛也丹術著明莫大乎金火窮微以任化陽動則隂消混沌終一九寶精更相持合有三百八十四銖銖據一斤斤謂十六兩也金精一化青龍受符當斯之時神室鍊其精火金相運推雄陽翠玄水雌隂赭黃金隂陽混交接精液包元􅉋萬象憑虛生感化各有類衆丹之靈迹長生莫不由於是元君始鍊汞神室含洞虛玄白生金公巍巍建始初冠三五以相守飛精乃濡滋玄女演其序戊已貴天符天符道漸剝難以應玄圗故演作丹意乾坤不復言丹砂流汞父戊己黃金母鍾律還二六斗樞建三九赤童戲朱雀變化為青龍神初變成震三日月出庚東西分卯酉龍虎自相尋坤再變成兊八日月出丁上弦金半斤坤三變成乾十五三陽備圎照東方甲金水溫太陽赤髓流為汞姹女㺯明璫月盈自合虧十六運將減乾初缺成巽平明月見辛乾再損成艮二十三下弦下弦水半斤月出於丙南乾三變成坤坤乙三十日東北喪其朋月沒於乙地坤乙月既晦土木金將化繼坤生震龍乾坤括始終如上三十日坤生震兊乾乾生巽艮坤八卦列布曜推移不失中調火六十日變化自為證神室有所象雞子為形容五嶽峙潛洞際會為樞轄發火初溫微亦如爻動時上戴黃金精下負坤元形中和流永情參合應三才乾動運三光坤靜含陽氣神室用施行金丹然後成可不堅乎煉化之器包括飛凝開合靈户希夷之府造化泉窟陽氣發坤日晷南極五星連珠日月合璧金砂依分呼吸相應華蓋上臨三台下輔統録之司當密其固詰責能否火煉中宫土金入北方水土金三物變化六十日自然之要先存後亡或土數多分兩違則或水銖不定同處别居剛柔抗行不相涉入非火之咎譴責於土土鎮中宫籠罩四方三光合度以致太平五藏內飬四肢調和水涸滅影含曜內朗金水相瑩閉塞沈耀調火溫水發之俱化道近可求水土獨相配翡翠生景雲黃黑混其精紫華敷太陽水能生萬物聖人獨知之金德上白煉鉛以求黃色焉感位生中宫黃金銷不飛灼土煙雲起有無互相制上有青龍居兩無宗一有靈化妙難窺鍊銀於鉛神物自生銀者金精鉛色北靈水者道樞其數名一隂陽之始故能生銀鉛化黃丹寄位五金為鉛外黑色稟北方內懷銀精被褐懷玉外似狂夫銀為鉛子子隱鉛中鉛者銀母子藏母胞素真眇邈似有似無灰池炎灼鉛沈銀浮潔白見寶可造黃金殼為金精水環黃液徑寸之質以混三才天地未分混如雞子圎髙中起狀似蓬壺關閉微密神運其中爐竈取象固塞周堅委曲相制以使無虞自然之理神化無方磁石吸鐵隔礙潛通何况雞子配合而生金土之德常與永俱火記不虛作鄭重解前文丹術既著不可更疑故演此訣以附火記庶使學者取象無惑焉朱文公書參同契考異後右周易參同契魏伯陽所作魏君後漢人篇題蓋放緯書之目詞韻皆古奧雖難通讀者淺聞妄輒更改故比他書尤多舛誤今合諸本更相讎正其間尚多疑晦未能盡祛姑據所知寫成定本其諸同異因悉存之以參訂云空同道士鄒欣愚案文公雖托名於人其實鄒欣即公姓名也又論參同參同所言坎離水火龍虎鉛汞之屬只是精氣二者精水也坎也龍也汞也氣火也離也虎也鉛也其法以神運精氣結為丹陽氣在下初融成水以火鍊之凝成丹內外異色如鴨子卵真成此物參同契文章極好讀得不枉曰二用無爻位周流行六虛用九用六亦坎離也六虛乾坤之六位言二用雖無爻位而常周流六位之間猶人精氣上下周流一身而無定所也見語録餘不盡載又論龍虎上經黃義剛問曾景建謂參同本是龍虎上經果否曰不然蓋是後人見魏伯陽傳有龍虎上經一句遂偽作此經皆是體參同而為故有説錯處如二用六虛却錯説作虛危去又曰世云龍虎經在參同之先季通亦以為好及得觀之不然乃隱括參同之語而為之也見語録郭氏洞林案洞林上中下三卷晉河東郭璞景純之所撰也本傳云璞好經術博學髙才受業郭公得青囊書九卷遂洞五行天文卜筮之術禳災轉禍通致無方嘗撰前後筮驗六十餘事名為洞林又抄京費諸家要撮更撰新林十篇卜韻一篇世皆罕有其書余從王浩古仲氏楚翁才古得洞林書撮抄其事之重大者一二於左以見一書之大概云歲在甲子正月中丞相揚州令余卦安危諸事如何得咸之井案卦東北郡縣有武名地當有銅鐸六枚一枚有龍虎象異祥兊為金金有口舌來達號令者銅鐸也山陵神氣出北則丞相創以令天下見在丑地則金墓也起之以卦為推立之應晉陵武進縣也又當犬與豬交者狗變入居中鬼與相連其事審也戌亥世應土勝水二物相交象吾和合為一體此丞相雄有江東也民當以水妖相警歲在水位而水爻復變成坎當出大水之象以此知其靈應巽木成言果又妖生二月變為鬼戎土所克果無他水乃金子來扶其母是亦丞相將興之象也西南郡縣有陽名者井水當自沸卦變入井內丙午變而犯升陽故知井湧也於分野應在歷陽虎來入州城寺兊者虎出山而入門闕正月戌為天煞即刺史宅虎屬寅與月并而來此大人將興之應東方當有蟹鼠為災必食稻稼有離體眼相連之象艮為鼠又煞隂在子子亦鼠而嵗子來寅卯故知東方有災又當以鵝應翔為瑞鵝有象烏而為徴以應象出其相其應將登其祚也其年晉陵郡武進縣民陳龍果於田中得銅鐸六枚言六者用坎數也銅者咸本家兊故也口有龍虎文又得者名龍益審陳土姓金之用進者乃生金也丹徒縣流民趙子康家有狗與吳人豬相交其年六月天連雨百姓相驚妖言云當有十丈水翕然駭動無幾自靜又衆人傳言延陵大波中有龍生草蓐復數里竟不知其信否其明年丑歲九月中吳興臨安縣民陳嘉親得石瑞此祥氣之應也六月十五己未日未時歷陽縣中井水沸湧經日乃止隂陽相感各以其類亦是金水之應也六月晦日虎來州城浴井中見覺便去其秋冬吳諸郡皆有蟹鼠為災鼠為子子水蟹亦水物皆金之子晉主初登阼五日有羣鵝之應此論一歲異事略舉一卦之意惟不得臘中行刑有血逆之變將推之不精亦自無徴不登於卦乎死者晉陵令淳于伯也攝提之歲晉王將即阼太歲在寅為攝提格余自通占國家徴瑞之事得豫之睽案卦論之曰會稽郡當出鍾以告成功王者功成作樂會稽晉王初所封國又會稽山靈祥之所興也神出於家井者子爻并知此實王者受命之事也上有銘勒坤為文章與天子爻并故知晉王受命之事準此應在民間井池中得之鍾出於民家井中者以象晉王出家而王也金以水為子子相扶而生此即家之祥徴事也由應所謂先王作樂崇德殷薦之上帝言王者祭天以告成功亦安樂無復事也其後歲在執徐會稽郡剡縣陳青井中得一鍾長七寸四分口徑四寸半器雖小形製甚精上有古文竒書十八字時人莫之能識蓋王者踐阼必有薦符塞天下之心與神物契合然後可受命觀鐸啓號於晉陵鍾造成於會稽端不失類皆出以方天人合際不可不察也愚案前一則洞林下卷之首後一則洞林下卷之終皆取其事體之重者載之以見卜筮之有關於國家也如此余鄉里曾遭危難因之災癘寇戎並作百姓遑遑靡知所投時姑涉易義頗曉分蓍遂尋思貞筮鈎求攸濟於是普卜郡內縣道可以逃死之處者皆遇明夷之象乃投䇿喟然歎曰嗟乎黔黎時漂異類桑梓之邦其為魚乎於是潛命姻妮密交得數十家與共流遁當由吳坂遇寇據之乃却回從蒲坂而之河北時草寇劉石又招集羣寇専為掠害勢不可過於是同行君子皆欲假道取便又未審所之乃令吾決其去留卦遇同人之革其林曰朱雀西北白虎東起離為朱雀兊為白虎言火能銷金之義姦猾銜璧敵人束手兊為口乾為玉玉在口中故曰銜璧占行得此是謂無咎余初為占尚未能取定衆不見從却退猗氏縣而賊遂至諸人遑窘方計舊之從此至河北有一間徑名焦丘不通車乘惟可輕步極險難過捕姦之藪然勢危理迫不可得停復自筮之如何得隨之升其林曰虎在山石馬過其左兊虎震馬五艮山石駮為功曹猾為主者駮猾能伏虎愚謂惜不注駮猾象垂耳而潛不敢來下兊虎去不能見爰升虛邑遂釋恐誤魏舒隨時制行卦義也升寇不來知無寇當魏則河北亦荒敗便以林義通示行人説欲從此道之意咸失色喪氣無有讃者或云林逮誤人不可輕信吾知衆人阻二乃更申命候一月契以禍機約十餘家即涉此徑詣河北後賊果攻猗氏合城覆沒靡有遺育昌邑不靜復南過穎由脈頭口渡去三十里所傳髙賊屯駐柵斷渡處以要流人時數百家車千乘不敢前令余占可決得泰欣然語衆曰羣類避難而得拔茅彚征之卦且泰者通也吉又何疑吾為前驅從者數十家至敵界敵已去餘皆回避樏津渡為賊所劫人僅得在悔不取余卦至淮南安豐縣諸人緬然懷悲咸有歸志令余卦決之卜住安豐得既濟其林曰小狐迄濟垂尾纍衰言垂渡而困初雖偷安終靡所依案卦言之秋吉春悲卜詣壽春得否其林曰乾坤蔽塞道消散虎刑挾鬼法凶亂十一月虎刑在午為鬼鬼即賊亂則何時時建寅火鬼生處僵尸交林血流漂火刑與鬼并此占行者入塗炭卜詣松滋不吉卜詣合淝又不吉卜詣陽泉得小過之坤其林曰小過之坤卦不竒雖有旺氣變陽離卜時立春其氣變入坤中氣廢初見勾陳被牽羈暫過則可羈不宜將見劫追事幾危賴有龍德終無疵十二月龍德在艮凡有月德終無患於是諸計皆不可伴人悉散乃獨往陽泉會壽春有事周馥反為陽泉羣凶所迫登時惶慮卒無所至乃至廬江其春三月諸家住安豐者為寇所得所謂春悲也松滋合淝殘夷更相攻人無有全者右二則前一則上卷之首後一則亦上卷內皆卜避難之事所謂林者自為韻語占決之辭也義興郡丞仍叔寶得傷寒疾積日危困令卦得遁之姤其林曰卦象出墓氣家囚艮為乾墓世主丑故卜時五月申金在囚變身見絶鬼潛遊身在丙午夏入辛亥在五月爻墓充刑鬼煞俱生戌為鬼墓而初六為戌刑刑在占故言充刑五月白虎在卯與月煞并也卜病得此歸蒿丘誰能救之坤上牛以卜爻見丑為牛丑為子能扶身克鬼之厭虎煞上令伏不動若依子色吉之尤巽主辛丑丑為白虎金色復徴以和解鬼及虎煞皆相制也案林即令求白牛而廬江荒僻卒索不得即日有大牛從西南來詣途中仍留一宿主人乃知過將去去之後復尋挽斷綱來臨叔寶叔寶驚愕起病得愈也此即救禦潛應感而遂通此一則係上卷卜疾有自然救禦之道丞相掾桓茂倫嫂病困慮不能濟令余卦得賁之豫其林曰時隂在初卦失度卜時四月降隂在初而見陽爻此為失度殺隂為刑鬼入墓四月殺隂在申申為木鬼與殺隂并又身為卯變入乙未未是木墓建未之月難得度消息卦爻為扶助馮馬之師乃寡嫗馬午午為火馮亦馬申是殺隂以火姓消之巽為寡婦自然竒救宜飱兔兔屬卯所謂破墓出身子若恤之得守故茂倫歸求得兔令嫂食之便心痛不可堪於是病愈東中郎參軍景緒病經年不瘥在丹徒遣其弟景岐來卦六月癸酉日得臨之頤其林曰卯與身世并而扶天醫六月天醫在卯案卦病法當食兔乃瘥弟歸捕獲一頭食之果瘥右二則前一則在上卷此一則在中卷皆卜病皆以食兔愈病也余至揚州從事𢎞泰言家時坐有衆客語余曰家適有祥試為卦若得吉者當作二十人主人即為卜之遇豫之解其林曰有釡之象無火形不見離也變見夜光連月精坎為月潛龍在中不遊行言蟠者案卦卜之藻盤鳴金妖所憑無咎慶藻盤非鳴或有鳴者其家至今無他𢎞泰言大駭云前夜月出盥盤忽鳴中有盤龍象也右一則亦中卷此可謂占法之竒中者卷內他皆稱是難以盡書姑録此八則亦可槩見矣洞極真經愚案洞極真經莫知作者而元魏關朗子明之所傳次也雖無預於易然序本論述聖人本河圗以畫卦朱子啓蒙之所援證其為極也又起於洛書之數以北方一為生之一西南二為育之一東方三為資之一而極有一畫矣又以東南四為生之二中央五為育之二西北六為資之二而極有二畫矣又以西方七為生之弎東北八為育之弎南方九為資之弎而極終亦猶近世蔡氏皇極內篇演洛書之數至於九九八十一也其為書也生傳一資傳二育傳三論上四敘本一明變二極數三原名四原名五論下五體用六為用七為擬八次為九互為十極圗十三子明自為之序今録序及生資育三極與二論要者于左以見一書大略云序朗業儒蓄書積數世矣自六代祖淵會鼎國之亂徙家于汾河所藏之書散逸幾盡其祕而存者唯洞極真經而已六世祖嘗謂家人曰洞極真經聖人之書也吾後數世當有賢者生如得其用功不下於稷契倘不時偶其顔淵之流乎是經之蘊當可明也朗幸生其族得聞遺言於祖父敢不勉勉以發揚先祖之意乎因伏讀纍年思以傳次然而性蒙識泥不能洞達聞崆洞山有秫先生者世之異人也故往師焉至之幾歲孜孜焉未嘗敢廢弟子之禮一日齋戒盥沐發卷以請其蘊先生乃掩卷而歎曰此天地之樞機聖賢之壼奧也潛而不傳也久矣子孰從而得之朗具以先祖之言告先生因為朗著翼以明其大端作則以指諸人事於是洞極之義煥然可詳朗既得而歸有頃聞先生已飛升矣嗚呼聖人之言將假先生而視諸人耶將不可使下民知之耶不然何先生之傳而不留矣朗以謂天以先生而啓之而不可以先生盡之使盡之者其非朗乎因以先生之翼則附于經又編其遺言為洞極論凡十一篇復作傳以釋其蘊為圗以序其為庶乎來者知洞極之道焉時太和末年正月上休日序生傳第一生一生二生弎生洪正一一冥呼傳曰冥物始生也一二形呼為傳曰形呼為質始成也一弎罔不利傳曰罔不利濟於用也翼曰陽秉日生洪哉大也明哉正哉極也惟生故能大盛而極焉則曰聖人以化育天下次萌息華茂止安燠實通九傳資傳第二資一資二資弎資天生地育而人資翼曰取天地之道曰資觀其資三極之情可見矣則曰聖人以順天地而創法立制三一資其象以制服器傳曰資其象制服器也三二資其器以闢田里以興地利傳曰資其器興地利也三弎資其用以化育兆姓傳曰資其用化育兆姓其道大也次用達興紊悖靜平序通九傳育傳第三育一育二育弎育洪明翼曰隂能成陽之生曰育育則洪洪然後正則曰君子以承君闡化以育兆姓二一女子育於家正臧傳曰女子育於家育在內也不正則否正乃藏也二二乃蟄乃萌育於田傳曰乃蟄乃萌育于田也二弎利用獲傳曰利用獲育道成也次和塞作幾抑冥通通九傳敘本論并圗生興達實萌通茂息抑煥華幾安育靜序止冥􅻲紊用和悖塞作平資子曰河圗之文七前六後八左九右聖人觀之以畫八卦是故全七之三以為離竒以為巽全八之三以為震竒以為艮全六之三以為坎竒以為乾全九之三以為兊竒以為坤正者全其位偶者盡其畫易曰四象生八卦其是之謂乎洛書之文九前一後三左七右四前左二前右八後左六後右後聖稽之以為三象是故一為生之一四為生之二七為生之弎二為育之一五為育之二八為育之弎三為資之一六為資之二九為資之弎因而變以成二十有七為明變論并圗生煥實興􅻲茂達序和資抑用作冥塞平通幾育萌華安悖止靜息紊生之象育乘其一而為煥乘其二而為實乘其弎而為興資乘其一而為􅻲二而為茂弎而為達育一資二而為序育二資一而為和育之為生乘其一而為萌二而為華弎而為安資乘其一而為悖二而為止弎而為靜生一資二而為息生二資一而為紊資之為生乘其一而為抑二而為用弎而為作育乘其一而為冥二而為塞弎而為平生一育二而為通生二育一而為幾正此之謂變為之道也極數子曰天一地二人三天四地五人六天七地八人九三極之數四十五天有十二一四七地有十五二五八人有十八三六九審其數而畫之三十有九則一除天地人六數外有三十九數歸之於天四十有二則二除人三數外有四十二歸之地四十有五則弎洛書全數歸之於人生之䇿百一十七三畫計三十九育之䇿百二十六三畫計四十二資之䇿百三十五三畫計四十五遺其餘則三百有六十當期之日愚計三䇿之數本甚不合遣其餘七六五然後合三百六十之數易計乾坤之䇿三百六十不如是也未敢以為然顯冥之道盡矣原名朗問曰經取極名之何謂也子曰形而上者謂之天日月星辰皆天也形而下者謂之地山川草木皆地也命于其中者謂之人戎狄禽魚皆人也酌其源則流可知矣視其表則影可見矣達於此者其知經之名乎愚案此唐韓文公原人之文也豈崆洞山人先得其所欲言者乎愚不能無疑原德子曰物無不受之謂洪物無不􅀢之謂明於物無欺之謂正君子體洪臨下明以修性正以治德故曰洪明正次為論并圗生萌息華茂止安煥實資用達興紊悖靜平序育和塞作渙幾抑冥通天地闢萬物生生必萌萌而後息息而華華則茂物不終茂故所以止止然後安安則得其􅻲􅻲則實實則可以資矣資必有所用用然後達達則能興物不終興興久則紊紊則悖治悖莫若靜靜則平平則有序序則可以育矣育然後吹物不終吹吹久則塞決塞必有作作則煥煥則幾乎正矣至正必有抑抑則冥物不終冥故以通而終焉衛氏元包愚案元包者後周衛元嵩之所作也祖京房易傳八宫卦以坤宫八卦為元包太隂卷一乾宫八卦為元包太陽卷二次兊宫八卦為少隂次艮宫八卦為少陽次離宫八卦為仲隂次坎宫八卦為仲陽次巽宫八卦為孟隂次震宫八卦為孟陽運蓍第九説源第十凡十卷唐蘇源明傳李江注今録其序及乾坤二卦傳于左以見一書之大槩云元包序包之為書也廣大含𢎞三才悉備言乎天道有日月焉有雷雨焉言乎地道有山澤焉有水火焉言乎人道有君臣焉有父子焉理家為政之尤者昔文質更變篇題各異夏曰連山殷曰歸藏周謂之易而唐謂之包包者藏也言善惡是非吉凶得失皆藏其書觀乎囊括萬有籠罩八紘執陶鑄之鍵啓乾坤之扃孕覆育載通幽洞冥窮天人之祕研造化之精推興亡之理察禍福之萌與鬼神齊奧將日月齊明可謂六五經而四三易雖太玄莫之與京然文字竒詭音義譎怪紛而不擇隱而不明者得非遭於離亂與作易者其有憂患乎蓋所謂憂亂而患小人也故其辭詭衛先生近之矣祕書少監武功蘇源明洗心澄思為之修傳解紛以釋之索隱以明之帝王之道顯然昭著有以見理亂之兆有以見成敗之端江考于訓詁耽于講習輒演玄義庶傳乎好學者焉國子監四門助教趙郡李江注元包太隂卷第一傳曰理亂相糾質文相化亂極而先乎太易文弊而從乎巨包聖人以道也賢人以發也易始乎乾文之昭也以行包始乎坤質之用也以靖行者所以動天下之務靖者所以默天下之機太隂太陽潛相貞也少隂少陽潛相成也㐬乎廣反􅀢英榜反衆草莫默地之輿也顚宀彌偏反覆也包馬茅反裏也盈天之昌也仍而通之極乎三十六全而劘之存乎六十四其旨微其體正語則直義則矗然而不誙觀其辭則夽危藴反髙也然而不及掜魚砥反一以布氣藏萬以植言斯道君子之幾也夫誠至君子之為也夫於戲流于睿監講於太學伏而惟之使自怡之歸人於至和示人以太朴已矣坤㐬􅀢莫默􅏨牛林反􅏨也森囷匿甲反匿靖而不躁朴而不飾羣類囮昊和反化也育庶物甡植厥施惟熙厥勳惟極傳曰㐬者春之熙􅀢者夏之茂莫者秋之落默者冬之潛母萬物者熙然足以布和茂然足以長物落然足以育衆潛然足以正極坤道備此四德故曰㐬􅀢莫默􅏨者言其衆森者言其植囷者言其受匿者言其藏皆地之性也靖而不躁隂之德也朴而不飾質之禮也羣類囮育所化者衆也庶物甡植所生者多也厥施惟熙其賚廣也厥勳惟極其功大也昔王體之以立政侔之以行簡尚乃儉務乃素無起徴修無勤動為惟爾衆􅧫不順元包太陽卷第二乾顛宀包盈夰燾斡縈揭而不憩駮而克明四敘既侖萬類既生厥造惟𢎞厥勳惟宏傳曰顚者仁之髙宀者仁之覆包者禮之拎盈者信之充育萬物者仁髙足以濟衆義覆足以利物禮拎足以崇德信充足以布氣乾道備此四德故曰顚宀包盈夰燾斡縈何謂也夰者言其大燾者言其溥斡者言其運縈者言其周皆天之象也揭而不憩陽之用也駮而克明文之照也四敘既侖寒暑變易也萬類既生品物滋長也厥造惟𢎞其惠廣也厥勳惟宏其功極也昔王揣之以行化規之以立制發聲明盛文物無略威儀無簡禮度潛虛潛虛者宋太師溫國公司馬光君實之所作也公雅好太玄自謂玄以準易虛以擬玄其作書之意可見矣朱文公謂潛虛只是吉凶藏否平生相休囚死潛虛後截是張行成續不押韻見得今録其要者于左以見一書之大槩云萬物皆祖於虛生於氣氣以成體體以受性性以辨名名以立行行以俟命故虛者物之府也氣者生之户也體者質之具也性者神之賦也名者事之分也行者人之務也命者時之遇也一等象王二等象公三等象嶽四等象牧五等象率六等象侯七等象卿八等象大夫九等象士十等象庶人一以治萬少以制衆其惟綱紀乎綱紀立而治具成矣心使身身使臂臂使指指操萬物或者不為之使則治道病矣卿詘一大夫詘二士詘三庶人詘四位愈卑詘愈多所以為順也詘雖多不及半所以為正也正順天墬之大誼也凡性之序先列十純十純既浹其次降一其次降二其次降三其次降四最後五配而性備矣始於純終於配天地之道也一六置後二七置前三八置左四九置右通以五十五行叶序卬而瞻之宿躔從度卬則為天俯則為墬卬得五宫俯得十數元餘者物之始終故無變齊者中也包斡萬物故無位至之氣起於元轉而周三百六十四變變尸一日乃授於餘而終之以步天軌以叶歲紀人之生本於虛虛然逡形形然逡性性然逡動動然逡情情然逡事事然逡德德然逡家家然逡國國然逡政政然逡功功然逡業業終則返於虛矣故萬物始於元著於裒蒲侯反存於齊消於散訖於餘五者形之運也柔剛雍昧昭性之分也容言慮聆覿動之官也繇懠箋西反得罹耽都含反情之訹恤也歬卻庸妥吐火反蠢天尹反事之變也訒刃宜忱哲戛德之塗也特偶昵續考家之綱也范徒醜隸林國之紀也禋因準資賔􅞯政之務也斆效乂績育聲功之具也興痡鋪泯造隆業之著也為人上者將何為哉飬之教之理之而已飬之故人賴以生也教之故人賴以明也治之故人賴以乂也夫如是故人愛之如父母信之如卜筮畏之如雷霆是以功成而名白也夫為人上而不能飬則人離叛矣飬而不能教則人殽亂矣教而不能治則人抵捍矣三具者亡而祈有功名可得乎卬仰天天俯俯墬地冬逡後􅞯戎行圗變圗解圗元慎於舉趾差則千里機正其矢慎於舉趾差則逺也元始也夜半口之始也朔月之始也冬至歲之始也好學智之始也力行道德之始也任人治亂之始也裒初進而逡而俟其聚不可茍必進逡也信而利用正裒聚也氣聚而物宗族聚二人倮而繁獸猛而殫人倮而繁善以道羣也而家聖賢聚而國三百毒之聚勝者為主惟物之蠱百毒之聚祇害人也四羽毛鱗介各從其彚羽毛鱗介聚以倫也五菟絲之棼附草絶根菟絲之棼不知固根也六八音和鳴祌祗是聽八音之裒感神明也上雲還于山冰泮于川雲還冰泮聚極必分也愚案自裒至散凡五十二皆然散然後有餘齊併具于左餘堯舜之德禹稷之績周規孔式終天無斁堯舜周孔垂世無窮也餘終也天過其度口之餘也朔不滿氣月之餘也日不復次歲之餘也功德垂後聖賢之餘也故天地無餘則不能變化矣聖賢無餘則光澤不逺矣齊衆星拱極萬矢湊的必不可易衆星萬矢誰能易中也齊中也隂陽不中則物不生血氣不中則體不平剛柔不中則德不成寬猛不中則政不行中之用其至矣乎元餘齊三者無變皆不占初上者事之始終亦不占揲法上下同五行相生得二十五以三才乘之得七十五為䇿虛五用七十分為二取左一挂於右揲左以十觀其餘扐之復合為一再分之挂揲右如左法左主右客先主後客陽先客後主者隂觀其所合以名命之既得其名又合蓍分之陽則置右而揲左隂則置左而揲右生純置右成純置左揲以七所揲之餘為所得之變觀吉凶臧否平而決之陽用其顯隂用其幽幽者吉凶臧否與顯戾也欲知始中終者以所筮之時占之先體為始後體為中所得之變為終變已主其大矣又有吉凶臧否平者於變之中復細别也不信不筮不疑不筮不正不筮不順不筮不蠲不筮不誠不筮必蠲必誠神靈是聽玄以準易虛以擬玄玄且覆瓿而況虛乎其棄必矣然子雲曰後世復有揚子雲必知玄吾於子雲雖未能知固好之矣安知後世復無司馬君實乎朱文公辨證紹興已巳洛人范仲彪炳文客崇安豫得從之遊炳文親唐鑑公諸孫嘗娶溫國司馬氏其多藏文正公遺墨嘗示余以潛虛别本則其所闕之文尚多問之云溫公晚著此書未竟而薨故所傳止此蓋嘗以其手藁屬景迂朝公補之而朝不敢也近得泉州季思侍郎所刻則首尾完具遂無一字之闕始復驚異以為世果自有完書而疑炳文語或不可信讀至剛行遂釋然曰此贋本也人問何以知之余曰本書所有句皆協韻如易彖文象玄首贊測其今有而昔無者行變尚協而解獨不韻此蓋不知也字處末則止字為韻之例耳此人好作偽書而尚不識其體製固為可笑然亦幸其如此不然則幾何而不遂至於逼真也耶亟以書扣季思此本果家世之舊傳否邪則報曰得之某人爾於是益知炳文為不妄嘗欲私記本末以訂其謬而未暇今復得鄉人張氏印本乃泉本之所自出於是始出舊書授學者使以相參凡非溫公之舊者悉朱識以别之使覽者有以考焉皇極經世書皇極經世書者宋康節先生邵子之所作也論己見此篇首題辭今略述先生祖先天方圎圗演數之法以見作用之大旨若夫推步之精知來之神愚何能闖於其藩所願學焉而未敏也因得友人查伯復顔叔俞邦翰孟宣相與講之粗知其説云經世本先天方圎圗説康節先天之易尚象而不尚辭觀物篇有所謂律吕圗聲音圗八卦交為十二辰圗十二辰交而為十六位圗太極圗既濟隂陽圗挂一圗三千六百年圗諸圗之傳並無一字言其所以然蓋欲示不言之教如伏羲六十四卦初無言語文字也然其圗雖多特只本之先天六十四卦方圎圗且以先天圗言之圎圗象天包於地外方圗象地處於天中是一大隂陽相配也分圎圗而觀乾兊離震居左為天卦巽坎艮坤居右為地卦分隂陽主兩儀而主運行不息之事分方圗而觀西北十六卦天卦自相交東南十六卦地卦自相交其斜行則乾兊離震巽坎艮坤自西北而東南皆隂陽之純卦也不能生物西南十六卦天去交地天卦皆在上而生氣在首故能生動物而頭向上東北十六卦地去交天天卦皆在下而生氣在根故能生植物而頭向下其斜行則泰損既濟益恆未濟咸否自東北而西南皆隂陽得偶之合也所以能生物也又合二圗而觀方圗乾處圎圗亥位謂之天門是天氣下降也方圗坤處圎圗已位謂之地户是地氣上騰也此兩十六卦所謂隂陽互藏其宅也方圗泰處圎圗寅位謂之鬼方方圗否處圎圗申位謂之人路此兩十六卦是天交地地交天而生生不息所以泰居寅而否居申所謂隂陽各從其類也夫圎圗主運行之事方圗主生物之事運行者氣也生物者質也氣非質則無所附麗質非氣則豈能生物哉康節經世書本先天方圎圗其作用大略如此查顔叔經世要旨先天之學本來只是先天六十四卦大橫圗一一八八之序橫圗者卦之所以列一一八八者數之所由肇卦之於數猶形之於影耳由是取橫圗復至乾三十二卦自北歷東以至于南取姤至坤三十二卦自南歷西以終於北以應天之運而天根月窟自然之理不假作為莫不對待而圎圗立矣取橫圗乾一宫之八卦自乾至泰橫布於圎圗之內而兊二宫之八卦自履至臨加布於乾宫八卦之上餘六卦以次橫列而乾居西北坤居東南否泰隂陽之交居於東北西南以應地之方橫斜曲直之妙理無窮而方圗立矣若夫圎圗之發用則以乾兊離震三十二卦為陽為在天日月星辰之四象為元會運世之大四象震離二宫為陽中隂兊乾二宫為陽中陽又分天道之隂陽太少坤艮坎巽三十二卦為隂為在地水火土石之四象為歲月日時之小四象巽坎為隂中陽艮坤為隂中隂又分地道之柔剛太少其數則自一一二二以至八八並以十二三十纍因而為分杪之數全數悉具觀物篇中如天地各十六象皇帝王伯走飛草木等錯綜敷暢之妙自見本篇今不繁具若夫方圗之取用則分為四片西北十六陽卦為天卦而乾主之東南十六隂卦為地卦而坤主之否泰所主各十六卦是為隂陽之交既濟之卦其圎圗陽卦主元會運世凡三百六十運四千三百二十世十二萬九千六百年皆有當時直事之卦泝其始如星甲辰子之直事卦所謂畫前有易也直事卦者即挂一卦也運世年月皆有之以挂一全卦之序分去如每運每世每年每月並用四爻直之其餘爻即閏爻也為説甚多今不繁具或以世卦配運卦或以年卦配世卦須合方圗天地卦分位置左右若世卦配運則運卦居左年卦配世則世卦居左左為天卦右為地卦須變爻變卦以合方圗考大四象挂一之卦以求分數考大四象元會運世是何位即合挂一何卦亦得其位之分數矣但案挂一本圗可見也以此所得之挂一某卦而質於圎圗以察理亂休咎而圎圗隂卦為歲月日時主動植事物自有律吕聲音數合方圗天地卦位置左右聲陽居左音隂居右橫看既濟卦考大小四象而得挂一之卦以求分杪二數人用分物用杪亦質於圎圗以觀臧否謂得挂一卦以質之圎圗在何處如陽中陽則極治之時事物皆美隂中隂極亂之時事物皆惡隂中陽亂而將治事物終美陽中隂治而將亂事物終惡又察其隂陽進退饒乏卦氣發斂屈伸之類凡古今治迹只是憑一定之卦以推步動植事物則隨時取聲音數以求卦而占測也一定卦者挂一之序也聲音者方圗天地卦以求得挂一卦也所謂經者猶言經緯之經亦有經綸之義觀天之數以元經會者猶以十二會為經而三百六十運以下為緯觀地之數以會經運者猶以二百五十運為經而以二千九百八十世以下為緯觀人之數以運經世者猶以一百二十世為經而以三千六百年為緯謂一元則經之以會九會則經之以運十運則經之以世也雖曰斷自唐虞以下而百世亦可推也邵子志存斯世故惟以經世人事名篇但動植事物之數雖屬圎圗隂卦而歲月日時之下分杪太細故以四卷載律吕聲音之變而悉歸之方圗矣蓋方圎二圗錯綜而用變動不居不可為典要也皇極取河圗天五地六二中以立數取圎圗太少隂陽剛柔之倡和得一萬七千二十四凡日月星辰之變水火土石之化律吕聲音之實數同歸于此以此一萬七千二十四自乘得二萬八千九百八十一萬六千五百七十六是為動植通數而用之以取挂一卦二百五十六者也以圎圗大四象每元之元一大位各全具六十四卦係十六之乘十六又四其六十四也取挂一卦之法乃用前數二萬八千九百八十一萬六千五百七十六是為九位挂其中五之位看左右位隂陽進退消息虛張其説繁晦今故略之學者但案邵子所傳挂一卦之定序考之似不須布籌以自惑也挂一卦起於元之元蓋元之元泰卦乃方圗東北之位終始萬物之義故運世與年各用挂一全卦之序而直事仍取合於方圗天地卦圎圗大小四象而後分杪之數歸宿矣今當一元之午會癸運酉世即一歲之五月初十日酉時也是謂大小四象俞孟宣經世與易名位不同祝涇甫曰易以占為神極以算為智占者聽圗變之蓍以求將見之象算者布一定之卦以御無窮之數占則取驗於天神之研幾也算則斷在人智之極深也神以知來而未嘗不藏往智以藏往而未始不知來惟易之與極其旨若相似而致用實不同易與極之八卦名同而位殊爻同而旨異位之殊今先天後天之圗可識矣旨之異則易之乾為天為金而極則為日為水之類也易之坤為地為土而極則為水為雨之類也易之震為雷為木而極則為辰為夜也易之巽為風為木而極則為石為雷也坎為水為月者易也極則為土為露矣離為火為日者易也極則為星為晝矣艮為山而今為火為風兊為澤而今為月為寒矣自是充之非惟八卦取象之異於易而吉凶悔吝亦大不同觀物斷決發題愚謂極只取伏羲卦畫不用文王周孔之亂故其作用之不同固無怪其然矣皇極內篇案皇極內篇者蔡九峰先生之所作也先生名沈字仲默朱文公門人其意謂河圗更四聖而象已著洛書錫神禹而數不傳故作是書以究極其數其演數之法縱橫皆九位經之以一一一二至於九一九二亦終之以九九緯之以一一二一至於九一九二亦終之以九九其筮法或以蓍或以木惜變數之法不傳莫能適諸用也今姑録其要旨以見一書之槩云序節文體天地之撰者易之象紀天地之撰者範之數數者始於一象者成於二一者竒二者偶也竒者數之所以行偶者象之所以立故二而四四而八八者八卦之象也一而三三而九九者九疇之數也由是重之八而六十四六十四而四千九十六而象備矣九而八十一八十一而六千五百二十一而數周矣易更四聖而象已著範錫神禹而數不傳先君子曰洛書者數之原也余讀洪範而有感焉上稽天文下察地理中參人物古今之變窮義理之精微究興亡之徴兆微顯闡幽彛倫攸敘秩然有天地萬物各得其所之妙歲月侵尋粗述所見辭雖未備義則著矣嘉定戊寅長至蔡沈仲默父序原一之一原元吉幾君子有慶數曰原誠之原也幾繼之善也君子見幾有終慶也愚案此以後八十數皆依前圖次序而吉咎祥吝平悔災休凶亦如此圖排定即此圖可以例其餘矣筮筮者神之所為乎其蓍五十虛一分二挂一以三揲之視左右手歸餘於扐兩竒為一兩偶為二竒偶三也初揲綱也再揲目也綱一函三以虛待目目一為一以實從綱兩揲而九數具八揲而六千五百六十一之數備矣分合變化如環無端天命人事由是較焉吉凶禍福由是彰焉大人得乏而申福小人得之而避禍君子曰筮者神之所為乎大事用年其次用月其次用日其次用時周易啓蒙翼傳外篇
